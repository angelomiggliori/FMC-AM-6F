<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>FMC-AM-6F V2.1</title>

<style>
    :root {
        --neon: #00ff9c;
        --bg: #050505;
        --panel: #111111;
        --panel-border: #222222;
        --text-dim: rgba(0, 255, 156, 0.5);
    }

    body {
        margin: 0;
        background: var(--bg);
        color: var(--neon);
        font-family: 'Courier New', Courier, monospace;
        overflow: hidden;
        text-align: center;
        user-select: none;
        -webkit-user-select: none;
    }

    #screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
        width: 100vw;
        padding-top: 5vh;
        box-sizing: border-box;
    }

    /* Painel do Display */
    .dashboard {
        background: #000;
        border: 2px solid var(--neon);
        border-radius: 12px;
        padding: 20px 40px;
        margin-bottom: 30px;
        box-shadow: 0 0 20px rgba(0, 255, 156, 0.1), inset 0 0 15px rgba(0, 255, 156, 0.05);
        min-width: 250px;
    }

    #display {
        font-size: clamp(60px, 12vw, 100px);
        font-weight: bold;
        text-shadow: 0 0 10px var(--neon);
        line-height: 1;
    }

    #mode {
        font-size: 14px;
        color: var(--text-dim);
        margin-top: 10px;
        letter-spacing: 2px;
    }

    #bpm {
        font-size: 18px;
        font-weight: bold;
        margin-top: 15px;
        color: #fff;
        text-shadow: 0 0 5px #fff;
    }

    /* Grid de Botões */
    #grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
        padding: 0 20px;
        max-width: 800px;
    }

    /* Layout Específico para os de baixo */
    .controls-row {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 20px;
        width: 100%;
    }

    /* Os "Stompboxes" */
    .switch {
        width: clamp(60px, 15vw, 100px);
        height: clamp(80px, 20vw, 120px);
        background: var(--panel);
        border-radius: 8px;
        border: 2px solid var(--panel-border);
        box-shadow: 0 8px 0 #000, 0 10px 10px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 15px 5px;
        box-sizing: border-box;
        transition: transform 0.1s, box-shadow 0.1s;
        position: relative;
    }

    .switch:active {
        transform: translateY(6px);
        box-shadow: 0 2px 0 #000, 0 4px 5px rgba(0,0,0,0.5);
    }

    button {
        all: unset;
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        cursor: pointer;
        z-index: 10;
    }

    .label {
        font-size: clamp(12px, 3vw, 16px);
        font-weight: bold;
        pointer-events: none;
    }

    /* LEDs */
    .led {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #021;
        border: 2px solid #000;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        transition: background 0.1s, box-shadow 0.1s;
        pointer-events: none;
    }

    .on {
        background: var(--neon);
        box-shadow: 0 0 15px var(--neon), inset 0 0 5px #fff;
        border-color: rgba(0, 255, 156, 0.5);
    }

    /* Monitor MIDI Console */
    #monitor {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 80px;
        background: rgba(0, 0, 0, 0.8);
        border-top: 1px solid var(--text-dim);
        font-size: 11px;
        color: var(--text-dim);
        padding: 5px 10px;
        box-sizing: border-box;
        overflow-y: auto;
        text-align: left;
    }

    @media (max-width: 500px) {
        #grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .switch { height: 90px; }
    }
</style>

</head>
<body oncontextmenu="return false">

<div id="screen">
    <div class="dashboard">
        <div id="display">A0</div>
        <div id="mode">NORMAL</div>
        <div id="bpm">BPM 120</div>
    </div>

    <div id="grid">
        <div class="switch"><div id="led1" class="led"></div><span class="label">FS1</span><button id="btn-fs1"></button></div>
        <div class="switch"><div id="led2" class="led"></div><span class="label">FS2</span><button id="btn-fs2"></button></div>
        <div class="switch"><div id="led3" class="led"></div><span class="label">FS3</span><button id="btn-fs3"></button></div>
        <div class="switch"><div id="led4" class="led"></div><span class="label">FS4</span><button id="btn-fs4"></button></div>
        <div class="switch"><div id="led5" class="led"></div><span class="label">FS5</span><button id="btn-fs5"></button></div>
    </div>

    <div class="controls-row">
        <div class="switch"><div id="led6" class="led"></div><span class="label">BANK</span><button id="btn-fs6"></button></div>
        <div class="switch"><div id="ledtap" class="led"></div><span class="label">TAP</span><button id="btn-tap"></button></div>
    </div>
</div>

<div id="monitor">Aguardando interação para iniciar MIDI...<br></div>

<script>
/* BLOQUEIO ZOOM */
document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("dblclick", e => e.preventDefault());

/* EEPROM SIMULADA */
let memory = JSON.parse(localStorage.getItem("fmcmem")) || { bank: 0, patch: 0 };

function saveMemory() {
    localStorage.setItem("fmcmem", JSON.stringify(memory));
}

/* MIDI */
let midiOut = null;
let midiStarted = false;

async function initMIDI() {
    if(midiStarted) return;
    try {
        const access = await navigator.requestMIDIAccess();
        for (let o of access.outputs.values()) {
            midiOut = o;
        }
        log(midiOut ? "MIDI Conectado: " + midiOut.name : "Nenhuma saída MIDI encontrada.");
        midiStarted = true;
    } catch(err) {
        log("Erro de permissão MIDI.");
    }
}

function midiSend(data) {
    if (midiOut) midiOut.send(data);
    let hex = data.map(b => "0x" + b.toString(16).toUpperCase().padStart(2, '0')).join(" ");
    log("TX: " + hex);
}

/* MONITOR */
function log(txt) {
    let m = document.getElementById("monitor");
    m.innerHTML = txt + "<br>" + m.innerHTML;
}

/* CONTROLADORA */
const banks = ["A","B","C","D","E","F","G","H","I","J"];
let bank = memory.bank;
let patch = memory.patch;
let bankGroup = 0;
let preselect = false;
let preBank = 0;

const display = document.getElementById("display");
const mode = document.getElementById("mode");

function updateDisplay() {
    display.innerText = banks[bank] + patch;
}

/* LED */
function clearLED() {
    for (let i = 1; i <= 5; i++) {
        document.getElementById("led" + i).classList.remove("on");
    }
}

function setLED(p) {
    clearLED();
    document.getElementById("led" + (p + 1)).classList.add("on");
}

/* PATCH */
function selectPatch(p) {
    if (preselect) {
        bank = preBank;
        patch = p;
        preselect = false;
        mode.innerText = "NORMAL";
        document.getElementById("led6").classList.remove("on");
    } else {
        patch = p;
    }
    
    memory.bank = bank;
    memory.patch = patch;
    saveMemory();
    setLED(p);
    updateDisplay();

    // Envia Program Change
    let pc = (bank * 10) + patch;
    // Cap em 127 pra não quebrar a especificação MIDI
    if(pc > 127) pc = 127; 
    midiSend([0xC0, pc]);
}

/* BANK (HOLD/TAP FIXED) */
let holdTimer;
let isHold = false;

function bankTap() {
    bankGroup = bankGroup ? 0 : 1;
    mode.innerText = bankGroup ? "BANK F-J" : "BANK A-E";
}

function bankHold() {
    preselect = true;
    preBank = bankGroup ? 5 : 0;
    display.innerText = banks[preBank] + "?";
    mode.innerText = "SELECT PATCH";
    document.getElementById("led6").classList.add("on");
}

/* EVENTOS BANK */
const btnFs6 = document.getElementById("btn-fs6");
btnFs6.addEventListener("pointerdown", (e) => {
    isHold = false;
    holdTimer = setTimeout(() => {
        isHold = true;
        bankHold();
    }, 500);
});

btnFs6.addEventListener("pointerup", (e) => {
    clearTimeout(holdTimer);
    if (!isHold) bankTap();
});

btnFs6.addEventListener("pointerleave", (e) => {
    clearTimeout(holdTimer); // Previne disparo se o dedo deslizar pra fora
});

/* TAP TEMPO */
let taps = [];
let blinkTimer;

function tapTempo() {
    let now = Date.now();
    taps.push(now);
    
    // Limpa array se demorar muito (mais de 2 segundos)
    if(taps.length > 1 && (now - taps[taps.length - 2] > 2000)) {
        taps = [now];
    }
    if (taps.length > 5) taps.shift();

    if (taps.length >= 2) {
        let intervals = [];
        for (let i = 1; i < taps.length; i++) {
            intervals.push(taps[i] - taps[i-1]);
        }
        let avg = intervals.reduce((a, b) => a + b) / intervals.length;
        let bpm = Math.round(60000 / avg);
        
        // Limites de BPM
        if(bpm > 300) bpm = 300;
        if(bpm < 30) bpm = 30;

        document.getElementById("bpm").innerText = "BPM " + bpm;
        
        // Envia CC genérico de tap (Valor 127) em vez de um BPM ilegal (se > 127)
        midiSend([0xB0, 64, 127]); 
        blink(bpm);
    }
}

function blink(bpm) {
    clearInterval(blinkTimer);
    let led = document.getElementById("ledtap");
    
    blinkTimer = setInterval(() => {
        led.classList.add("on");
        setTimeout(() => led.classList.remove("on"), 100); // Flash rápido, mais realista
    }, 60000 / bpm);
}

/* DEBOUNCE */
function debounce(fn) {
    let last = 0;
    return function() {
        let now = Date.now();
        if (now - last > 50) { // Aumentei de 20 pra 50ms pra evitar bounce duplo no touch
            last = now;
            fn();
        }
    }
}

/* FOOTSWITCHES BINDINGS */
document.getElementById("btn-fs1").addEventListener("pointerdown", debounce(() => selectPatch(0)));
document.getElementById("btn-fs2").addEventListener("pointerdown", debounce(() => selectPatch(1)));
document.getElementById("btn-fs3").addEventListener("pointerdown", debounce(() => selectPatch(2)));
document.getElementById("btn-fs4").addEventListener("pointerdown", debounce(() => selectPatch(3)));
document.getElementById("btn-fs5").addEventListener("pointerdown", debounce(() => selectPatch(4)));
document.getElementById("btn-tap").addEventListener("pointerdown", debounce(tapTempo));

/* INIT */
updateDisplay();
setLED(patch);
document.body.addEventListener("pointerdown", initMIDI, {once: true});

</script>
</body>
</html>
