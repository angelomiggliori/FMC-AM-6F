<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G1on Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a2e;
      --surface:   #16213e;
      --surface2:  #0f3460;
      --accent:    #e94560;
      --accent2:   #533483;
      --text:      #eaeaea;
      --text-muted:#8888aa;
      --success:   #22c55e;
      --warning:   #f59e0b;
      --error:     #ef4444;
      --info:      #3b82f6;
      --radius:    8px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
      grid-template-columns: 300px 1fr;
      grid-template-areas:
        "header  header"
        "toolbar toolbar"
        "sidebar editor";
    }

    /* ── Header ── */
    header {
      grid-area: header;
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
    #device-info { font-size: 0.8rem; color: var(--text-muted); margin-left: auto; }

    /* ── Toolbar ── */
    .toolbar {
      grid-area: toolbar;
      background: var(--surface2);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    button {
      padding: 7px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn-connect  { background: var(--accent);  color: #fff; }
    #btn-read-all { background: var(--info);     color: #fff; }
    #btn-backup   { background: var(--success);  color: #fff; }
    #btn-restore  { background: var(--warning);  color: #000; }
    button:not(:disabled):hover { opacity: 0.85; }

    /* Progress */
    .progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .progress-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .progress-fill  { height: 100%; background: var(--info); border-radius: 3px; width: 0; transition: width 0.2s; }
    #progress-text  { font-size: 0.72rem; color: var(--text-muted); }

    /* Status */
    .status { font-size: 0.82rem; padding: 4px 10px; border-radius: var(--radius); }
    .status.success { background: rgba(34,197,94,0.15);  color: var(--success); }
    .status.error   { background: rgba(239,68,68,0.15);  color: var(--error); }
    .status.warning { background: rgba(245,158,11,0.15); color: var(--warning); }
    .status.info    { background: rgba(59,130,246,0.15); color: var(--info); }

    /* ── Sidebar (patch list) ── */
    #patch-list {
      grid-area: sidebar;
      background: var(--surface);
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .patch-item {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.1s;
    }
    .patch-item:hover    { background: rgba(255,255,255,0.04); }
    .patch-item.selected { background: rgba(233,69,96,0.15); border-left: 3px solid var(--accent); }
    .patch-num   { font-size: 0.72rem; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .patch-name  { font-size: 0.88rem; font-weight: 500; }
    .patch-fx    { font-size: 0.72rem; color: var(--text-muted); }

    /* ── Editor Panel ── */
    #editor-panel {
      grid-area: editor;
      overflow-y: auto;
      padding: 20px;
    }
    .placeholder { color: var(--text-muted); font-size: 0.9rem; padding: 40px; text-align: center; }

    .editor-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .editor-header label { font-size: 0.8rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px; }
    .editor-header input[type=text] {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      padding: 6px 10px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      width: 160px;
    }
    #btn-send-to-pedal  { background: var(--accent);  color: #fff; }
    #btn-select-on-pedal{ background: var(--accent2); color: #fff; }

    /* FX chain */
    .fx-chain {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .fx-slot {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 12px;
      transition: border-color 0.15s;
    }
    .fx-slot.enabled  { border-color: rgba(233,69,96,0.4); }
    .fx-slot.disabled { opacity: 0.45; }

    .fx-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .fx-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .fx-category { font-size: 0.7rem; color: var(--text-muted); }

    .fx-params { display: flex; flex-direction: column; gap: 6px; }
    .fx-params label {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: grid;
      grid-template-columns: 80px 1fr 30px;
      align-items: center;
      gap: 6px;
    }
    .fx-params input[type=range] {
      accent-color: var(--accent);
      width: 100%;
    }
    .param-val { font-size: 0.75rem; color: var(--text); text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <header>
    <h1>⬡ G1on Editor</h1>
    <span id="device-info">No device connected</span>
  </header>

  <div class="toolbar">
    <button id="btn-connect">Connect Pedal</button>
    <button id="btn-read-all" disabled>Read All Patches</button>
    <button id="btn-backup"   disabled>Download Backup</button>
    <button id="btn-restore"  disabled>Restore Backup</button>
    <input type="file" id="file-restore" accept=".json" style="display:none" />

    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
      <span id="progress-text"></span>
    </div>

    <span class="status info" id="status">Ready — connect your Zoom pedal via USB</span>
  </div>

  <div id="patch-list"></div>

  <div id="editor-panel">
    <p class="placeholder">Connect a device to start editing patches</p>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
