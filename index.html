<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FMC-AM Web Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;--surface:#1e1e30;--surface2:#252540;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#ff3c6e;--accent2:#7c3aed;--accent3:#00ffff; /* Ajustado para o Neon Blue */
  --text:#e8e8f0;--text2:#9090b0;--text3:#5a5a7a;
  --green:#10b981;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --r:6px;--r2:10px;--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);
  display:grid;grid-template-rows:56px 52px 1fr;grid-template-columns:280px 1fr;
  grid-template-areas:"hdr hdr""bar bar""side main";height:100vh;overflow:hidden}
header{grid-area:hdr;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:14px}
.logo{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--accent3);letter-spacing:2px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent3);box-shadow:0 0 8px var(--accent3);animation:pulse 2s ease-in-out infinite}
.dot.off{background:var(--text3);box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#badge{font-size:.72rem;font-family:var(--mono);color:var(--text2);background:var(--surface);border:1px solid var(--border2);padding:3px 10px;border-radius:20px}
#status{margin-left:auto;font-size:.72rem;font-family:var(--mono);padding:4px 12px;border-radius:20px}
.s-info{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.s-ok{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.s-err{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.s-warn{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.toolbar{grid-area:bar;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px}
.btn{font-family:var(--mono);font-size:.72rem;font-weight:700;letter-spacing:.5px;padding:6px 14px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.btn:not(:disabled):hover{filter:brightness(1.2);transform:translateY(-1px)}
#bc{background:var(--accent3);color:#000;border-color:var(--accent3)}
#br{background:transparent;color:var(--blue);border-color:rgba(59,130,246,.4)}
#bb{background:transparent;color:var(--green);border-color:rgba(16,185,129,.4)}
#brs{background:transparent;color:var(--amber);border-color:rgba(245,158,11,.4)}
#bd{background:transparent;color:var(--text3);border-color:rgba(255,255,255,.1);margin-left:auto}
.pw{flex:1;display:flex;flex-direction:column;gap:3px;margin:0 10px}
.pt{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent3));width:0;transition:width .2s;border-radius:2px}
#pt{font-size:.65rem;font-family:var(--mono);color:var(--text3)}
#sidebar{grid-area:side;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sh{padding:12px 16px 8px;font-family:var(--mono);font-size:.65rem;color:var(--text3);letter-spacing:1.5px;border-bottom:1px solid var(--border);text-transform:uppercase}
#pl{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
.pi{display:grid;grid-template-columns:30px 1fr 28px;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;position:relative}
.pi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent3);opacity:0;transition:opacity .15s}
.pi:hover{background:rgba(255,255,255,.025)}
.pi.active{background:rgba(0,255,255,.1)}
.pi.active::before{opacity:1}
.pn{font-family:var(--mono);font-size:.65rem;color:var(--text3)}
.pm{font-size:.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pm.e{color:var(--text3);font-style:italic;font-weight:300}
.pfx{font-family:var(--mono);font-size:.6rem;color:var(--text3);background:var(--surface2);border-radius:4px;padding:1px 5px;text-align:center}
#main{grid-area:main;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3)}
.ei{font-size:3rem;opacity:.3}
.es p{font-family:var(--mono);font-size:.75rem;letter-spacing:1px}
.et{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.en{font-family:var(--mono);font-size:1.4rem;font-weight:700;color:var(--accent3);min-width:40px}
.ni{font-family:var(--mono);font-size:.95rem;font-weight:700;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:var(--r);width:180px;letter-spacing:1px;transition:border-color .15s}
.ni:focus{outline:none;border-color:var(--accent3)}
.bw{background:var(--accent3);color:#000;font-family:var(--mono);font-size:.72rem;padding:7px 16px;border-radius:var(--r);border:none;cursor:pointer;transition:all .15s}
.bs{background:transparent;color:var(--accent3);border:1px solid rgba(0,255,255,.3);font-family:var(--mono);font-size:.72rem;padding:7px 16px;border-radius:var(--r);cursor:pointer;transition:all .15s}
.bw:hover,.bs:hover{filter:brightness(1.15);transform:translateY(-1px)}
.fl{font-family:var(--mono);font-size:.65rem;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.fc{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.fs{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px;transition:border-color .2s,opacity .2s;position:relative;overflow:hidden}
.fs::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent3));opacity:0;transition:opacity .2s}
.fs.on{border-color:rgba(0,255,255,.4)}
.fs.on::before{opacity:1}
.fs.off{opacity:.45}
.fh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.tl{display:flex;align-items:center;gap:8px;cursor:pointer;flex:1;min-width:0}
.tl input[type=checkbox]{display:none}
.tt{width:28px;height:15px;background:var(--surface2);border-radius:10px;position:relative;transition:background .2s;flex-shrink:0;border:1px solid var(--border2)}
.tt::after{content:'';position:absolute;left:2px;top:2px;width:9px;height:9px;border-radius:50%;background:var(--text3);transition:all .2s}
.tl input:checked+.tt{background:var(--accent3);border-color:var(--accent3)}
.tl input:checked+.tt::after{left:15px;background:#000}
.fn{font-size:.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fc2{font-family:var(--mono);font-size:.58rem;color:var(--text3);background:var(--bg3);padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.fp{display:flex;flex-direction:column;gap:7px}
.pr{display:grid;grid-template-columns:70px 1fr 28px;align-items:center;gap:6px}
.pl2{font-size:.68rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ps{-webkit-appearance:none;appearance:none;height:3px;background:var(--surface2);border-radius:2px;outline:none;cursor:pointer}
.ps::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--accent3);box-shadow:0 0 4px var(--accent3);cursor:pointer}
.pv{font-family:var(--mono);font-size:.65rem;color:var(--text2);text-align:right}
.ptag{font-family:var(--mono);font-size:.5rem;padding:1px 3px;border-radius:3px;background:rgba(124,58,237,.2);color:var(--accent2);margin-left:3px;vertical-align:middle}
.ptag.t{background:rgba(0,255,255,.2);color:var(--accent3)}
.fdesc{font-size:.65rem;color:var(--text3);margin-bottom:8px;line-height:1.4;font-style:italic}
#dbg{position:fixed;bottom:0;left:0;right:0;background:#0a0a10;border-top:2px solid var(--accent3);padding:8px 16px;font-family:var(--mono);font-size:.65rem;color:var(--text2);max-height:200px;overflow-y:auto;display:none;z-index:999}
.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dt{color:var(--accent3);font-weight:700;letter-spacing:1px}
.dr{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.dr span{margin-right:8px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot off" id="dot"></div>FMC-AM</div>
  <span id="badge">no device</span>
  <span id="status" class="s-info">ready</span>
</header>
<div class="toolbar">
  <button class="btn" id="bc">CONNECT</button>

  <button class="btn" id="brs" disabled>RESTORE</button>

  <div class="pw"><div class="pt"><div class="pf" id="pb"></div></div><span id="pt"></span></div>
  <button class="btn" id="bd">DEBUG</button>
</div>
<div id="sidebar"><div class="sh">PATCHES</div><div id="pl"></div></div>
<div id="main">
  <div class="es" id="es">
    <div class="ei">⬡</div>
    <p>CONNECT YOUR ZOOM PEDAL VIA USB</p>
    <p style="font-size:.65rem;opacity:.5">chrome or edge · allow midi when prompted</p>
  </div>

</div>

  <div class="dh">
    <span class="dt">◈ MIDI RAW LOG</span>
    <div style="display:flex;gap:12px;align-items:center">
      <span id="ds" style="cursor:pointer;color:var(--accent3)">SEND IDENTITY REQ</span>
      <span id="dc" style="cursor:pointer;color:var(--text3)">✕</span>
    </div>
  </div>
  <div id="dl"></div>
</div>
<script>
const ZOOM_MFR=0x52;

// BUG CORRIGIDO AQUI: A G1on usa o code 0x5A, não 0x61!
const DEVS={
  0x5A:{key:'G1on',   name:'Zoom G1on / G1Xon',   fxSlots:5,presets:100},
  0x5B:{key:'B1on',   name:'Zoom B1on / B1Xon',   fxSlots:5,presets:100},
  0x5F:{key:'MS50G',  name:'Zoom MS-50G', fxSlots:6,presets:50},
  0x60:{key:'MS60B',  name:'Zoom MS-60B', fxSlots:7,presets:50},
  0x69:{key:'MS70CDR',name:'Zoom MS-70CDR',fxSlots:6,presets:50},
};
const F1ON=new Set([0x5A,0x5B]);

const FX_BY_KEY = {

  // ── desempate por b5 ──

function gfx(b0,b1,b3,b4,b5){
  const b1m=b1&0x7F;
  return FX_BY_KEY[`${b0},${b1m},${b3},${b4},${b5}`]
      || FX_BY_KEY[`${b0},${b1m},${b3},${b4}`]
      || FX_BY_KEY[`${b0},${b1m},${b3}`]
      || {n:`Eff(${b0},${b1m},${b3})`,c:'?'};
}

function zoomUnpack(pl){
  const out=[];
  for(let i=0;i<pl.length;i+=8){
    if(i>=pl.length)break;
    const msb=pl[i];
    out.push(msb&0x7F); 
    for(let j=1;j<8&&i+j<pl.length;j++) out.push(pl[i+j]|(((msb>>(j-1))&1)<<7));
  }
  return out;
}

function decode(pl,slots,slotIdx,rawPl){
  const u=zoomUnpack(pl);
  const fx=[];
  for(let i=0;i<slots;i++){
    const s=i*23; 
    const b0=u[s],b1=u[s+1],b3=u[s+3],b4=u[s+4],b5=u[s+5];
    const isEmpty=(b0===0&&b3===0)||(b0===1&&(b1&0x7F)===0&&b3===0);
    const en=(b1&0x80)!==0; 
    const p=u.slice(s,s+23);
    const info=isEmpty?{n:'Empty',c:null}:gfx(b0,b1,b3,b4,b5);
    fx.push({b0,b1,b3,isEmpty,en,p,name:info.n,cat:info.c});
  }
  const n=u.slice(slots*23, slots*23+10); 
  const name=String.fromCharCode(...n.filter(b=>(b&0x7F)!==0).map(b=>b&0x7F)).trimEnd();
  return{slot:slotIdx,name,effects:fx,raw:rawPl?Array.from(rawPl):null};
}

function sx(did,pl){return new Uint8Array([0xF0,ZOOM_MFR,0x00,did,...pl,0xF7]);}
function idReq(){return new Uint8Array([0xF0,0x7E,0x00,0x06,0x01,0xF7]);}

function parseId(d){
  if(d.length<11||d[0]!==0xF0||d[1]!==0x7E||d[3]!==0x06||d[4]!==0x02)return null;
  if(d[5]!==ZOOM_MFR)return null;
  const id=d[6];
  const fw=String.fromCharCode(d[9],d[10],d[11],d[12]);
  return{id,fw};
}

function parsePatch(data,devId){
  const d=Array.from(data);
  const fxSlots = DEVS[devId] ? DEVS[devId].fxSlots : 5;
  for(const [cmd] of [[0x28]]){
    if(d[4]!==cmd)continue;
    const pl=d.slice(6,-1);
    if(pl.length>50)return decode(pl,fxSlots,d[5],d.slice(6,-1));
  }
  return null;
}

// ── MIDI ─────────────────────────────────────────────────────────────
let acc=null,inp=null,out=null,dev=null,pend=null;
const evs={};
function on(e,f){(evs[e]=evs[e]||[]).push(f);}
function em(e,d){(evs[e]||[]).forEach(f=>f(d));}

function wait(ms=3000){
  return new Promise((res,rej)=>{
    if(pend){pend.rej(new Error('superseded'));}
    const t=setTimeout(()=>{pend=null;rej(new Error('Device response timeout'));},ms);
    pend={res,rej,t};
  });
}

function onMsg(e){
  const d=new Uint8Array(e.data);
  log('←rx',hex(d),'var(--accent3)');
  if(pend){clearTimeout(pend.t);pend.res(d);pend=null;}
  if(d[0]===0xF0&&d[1]===ZOOM_MFR&&d[4]===0x28){
    const p=parsePatch(d,dev?.id);if(p)em('pu',p);
  }
}

async function connect(){
  if(!navigator.requestMIDIAccess)throw new Error('Web MIDI API not supported. Use Chrome or Edge.');
  try{acc=await navigator.requestMIDIAccess({sysex:true});}
  catch(e){throw new Error('MIDI access denied. Allow MIDI when prompted.');}
  const ins=Array.from(acc.inputs.values()),outs=Array.from(acc.outputs.values());
  if(!ins.length||!outs.length)throw new Error('No MIDI ports found. Connect pedal via USB.');
  st('scanning...','s-info');
  const f=await probe(ins,outs);
  if(!f)throw new Error('No Zoom device found.');
  inp=f.i;out=f.o;inp.onmidimessage=onMsg;
  const id=f.id,d=DEVS[id.id]||{key:'unknown',name:`Zoom 0x${id.id.toString(16).toUpperCase()}`,fxSlots:5,presets:50};
  dev={...d,id:id.id,fw:id.fw};
  acc.onstatechange=e=>{if((e.port===inp||e.port===out)&&e.port.state==='disconnected')disconnect();};
  return dev;
}

async function probe(ins,outs){
  for(const o of outs){const r=await probeOut(o,ins);if(r)return r;}
  return null;
}

async function probeOut(o,ins){
  return new Promise(res=>{
    const orig=ins.map(i=>i.onmidimessage);
    const done=r=>{ins.forEach((i,x)=>{i.onmidimessage=orig[x];});clearTimeout(t);res(r);};
    const t=setTimeout(()=>done(null),1200);
    ins.forEach(i=>{
      i.onmidimessage=e=>{
        const d=new Uint8Array(e.data);
        log('←rx',hex(d),'var(--accent3)');
        if(d.length>=6&&d[0]===0xF0&&d[1]===0x7E&&d[3]===0x06&&d[4]===0x02&&d[5]===ZOOM_MFR)
          done({i,o,id:parseId(d)});
      };
    });
    try{
      const m=idReq();
      log('→tx',hex(m),'var(--accent2)');
      o.send(m);
    }catch(e){done(null);}
  });
}

function disconnect(){if(inp)inp.onmidimessage=null;inp=out=dev=null;em('dc');}
function send(msg,wait2=false,ms=2000){
  if(!out)throw new Error('Not connected');
  const p=wait2?wait(ms):null;
  log('→tx',hex(msg),'var(--accent2)');
  out.send(msg);
  return wait2?p:null;
}
function sendRaw(msg){
  if(!out) return;
  log('probe',`→ raw: ${hex(msg)}`,'var(--accent2)');
  out.send(msg);
}

// ── LÓGICA DO TAP TEMPO ────────────────────────────────────────────────
let tapTimes = [];
function handleTapTempo() {
  const now = performance.now();
  tapTimes.push(now);
  if(tapTimes.length > 4) tapTimes.shift(); // Guarda apenas os últimos 4 taps

  if(tapTimes.length > 1) {
    let sum = 0;
    for(let i=1; i<tapTimes.length; i++) {
      sum += (tapTimes[i] - tapTimes[i-1]);
    }
    let avgTime = Math.round(sum / (tapTimes.length - 1));

    // Procura no patch atual se existe algum efeito com rate/time (flag pm.t === true)
    const p = patches[slot];
    if(p && dev) {
      let target = null;
      for(let i=0; i<p.effects.length; i++) {
        let fx = p.effects[i];
        if(!fx.isEmpty && fx.en) {
          let db = fxInfo(fx.name);
          if(db && db.params) {
            let paramIdx = db.params.findIndex(pm => pm.t === true);
            if(paramIdx !== -1) {
              target = { slot: i, param: paramIdx, time: avgTime };
              break; // Manda pro primeiro efeito que aceita tempo/rate
            }
          }
        }
      }

      if(target) {
        // Limita o tempo para não dar crash na pedaleira (Delay máximo costuma ser 4000)
        let t = Math.min(Math.max(target.time, 1), 4000);
        let lo = t & 0x7F;
        let hi = (t >> 7) & 0x7F;
        
        // Dispara o comando de edição de parâmetro real-time (0x31) direto pra G1On!
        sendRaw(new Uint8Array([0xF0, 0x52, 0x00, dev.id, 0x31, target.slot, target.param, lo, hi, 0xF7]));
        
        log('tap', `Tap tempo enviado: ${t}ms (Slot ${target.slot+1})`, 'var(--accent3)');
        st(`Tap Tempo: ${t}ms (Slot ${target.slot+1})`, 's-ok');
        
        // Atualiza a barrinha visual no editor, se estiver aberta
        let sl = document.querySelector(`[data-fi="${target.slot}"][data-pi="${target.param}"]`);
        if(sl) { 
            sl.value = t; 
            sl.nextElementSibling.textContent = t; 
            // Atualiza no cache de memória do patch também
            p.effects[target.slot].p[target.param] = t;
        }
      } else {
        st('Nenhum efeito com controle de Tempo/Rate ativo neste patch', 's-warn');
      }
    }
  }
}

BR.onclick=async()=>{
  if(!dev||reading)return;
  reading=true;BR.disabled=true;
  $('dbg').style.display='block';
  const probeCmd=await probeReadCmd(dev.id);
  if(probeCmd===null){
    st('pedal não respondeu — veja DEBUG','s-err');
    reading=false;BR.disabled=false;return;
  }
  st(`cmd 0x${probeCmd.toString(16).toUpperCase()} ok — lendo...`,'s-ok');
  sp(0,dev.presets);
  try{
    for(let s=0;s<dev.presets;s++){
      await send(pc(s));
      await sleep(60);
      sendRaw(sx(dev.id,[0x50]));
      await sleep(80);
      const r=await send(sx(dev.id,[probeCmd]),true,2000);
      const p=parsePatch(r,dev.id);
      if(p){p.slot=s;patches[s]=p;renderItem(s,p);}
      sp(s+1,dev.presets);
      await sleep(80);
    }
    const n=patches.filter(Boolean).length;
    st(`${n}/${dev.presets} patches loaded`,n>0?'s-ok':'s-warn');
  }catch(e){st(e.message,'s-err');}
  finally{reading=false;BR.disabled=false;}
};

async function probeReadCmd(did){
  const editEnable  = sx(did,[0x50]);
  const editDisable = sx(did,[0x51]);
  const reqPatch    = sx(did,[0x29]); 

  log('────','0x50 enable → 0x29 request','var(--text3)');
  await sendRaw(pc(0));
  await sleep(150);
  sendRaw(editEnable);
  await sleep(150);
  let r=null;
  try{ r=await send(reqPatch,true,2000); }catch{}
  if(r && r.length>7){ return 0x29; }
  sendRaw(editDisable);
  await sleep(200);

  log('probe','--- fallback: sem enable → 0x29','var(--accent2)');
  await sendRaw(pc(0));
  await sleep(150);
  r=null;
  try{ r=await send(reqPatch,true,2000); }catch{}
  if(r && r.length>7){ return 0x29; }

  return null;
}

function pc(s){return new Uint8Array([0xC0,s&0x7F]);}

function writeMsg(did,slot,p){
  if(!p.raw||p.raw.length<127){st('no raw payload stored','s-err');return null;}
  const pl=p.raw.slice(); 
  const nm=(p.name||'').padEnd(10,' ').slice(0,10);
  for(let i=0;i<4;i++) pl[115+i]=nm.charCodeAt(i)&0x7F;
  pl[119]=0x00;
  for(let i=4;i<9;i++) pl[115+i+1]=nm.charCodeAt(i)&0x7F;
  pl[125]=0x20; 

  const fxSlots = dev ? dev.fxSlots : 5;
  for(let s=0;s<fxSlots;s++){
    const ui=s*23+1; 
    const group=Math.floor(ui/8);
    const bitInMsb=(ui%8)-1; 
    const msbPos=group*8;    
    if(p.effects[s]&&!p.effects[s].isEmpty){
      if(p.effects[s].en) pl[msbPos]|=(1<<bitInMsb);
      else pl[msbPos]&=~(1<<bitInMsb);
    }
  }
  return new Uint8Array([0xF0,0x52,0x00,did,0x28,slot,...pl,0xF7]);
}

function renderItem(s,p){
  let el=PL.querySelector(`[data-s="${s}"]`);
  if(!el){
    el=document.createElement('div');el.className='pi';el.dataset.s=s;
    el.onclick=()=>openEd(s);
    let ins=false;
    for(const it of PL.querySelectorAll('.pi')){if(+it.dataset.s>s){PL.insertBefore(el,it);ins=true;break;}}
    if(!ins)PL.appendChild(el);
  }
  const n=p.effects.filter(f=>!f.isEmpty).length,e=!p.name||p.name.trim()===''||p.name.toLowerCase().includes('empty');
  el.innerHTML=`<span class="pn">${String(s+1).padStart(2,'0')}</span><span class="pm${e?' e':''}">${esc(p.name||'empty')}</span><span class="pfx">${n}</span>`;
  if(s===slot)el.classList.add('active');
}

function openEd(s){
  const p=patches[s];if(!p)return;
  slot=s;
  PL.querySelectorAll('.pi').forEach(el=>el.classList.remove('active'));
  PL.querySelector(`[data-s="${s}"]`)?.classList.add('active');
  ES.style.display='none';EC.style.display='block';
  
  // INSERIDO O BOTÃO DE TAP TEMPO AQUI
  EC.innerHTML=`
    <div class="et">
      <span class="en">${String(s+1).padStart(2,'0')}</span>
      <input class="ni" id="ni" type="text" maxlength="10" value="${esc(p.name)}" spellcheck="false"/>
      <button class="bw" id="bw">WRITE</button>
      <button class="bs" id="bse">SELECT</button>
      <button class="bs" id="bvol" title="Ajustar volume do patch" style="color:var(--amber);border-color:rgba(245,158,11,.3)">VOL</button>
      <button class="bs" id="btap" title="Bater o ritmo para Delay/Modulação" style="color:var(--accent3);border-color:rgba(0,255,255,.5)">TAP</button>
      <button class="bs" id="bclr" title="Limpar patch" style="color:var(--red);border-color:rgba(239,68,68,.3)">CLR</button>
    </div>
    <div id="vol-row" style="display:none;align-items:center;gap:10px;margin-bottom:12px;padding:8px 12px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border)">
      <span style="font-family:var(--mono);font-size:.65rem;color:var(--amber)">VOLUME</span>
      <input type="range" id="vol-sl" min="0" max="127" value="100" style="flex:1;height:3px;accent-color:var(--amber)"/>
      <span id="vol-val" style="font-family:var(--mono);font-size:.65rem;color:var(--amber);min-width:24px">100</span>
    </div>
    <div class="fl">FX CHAIN · ${p.effects.length} SLOTS</div>
    <div class="fc" id="fc"></div>`;
  
  const fc=$('fc');
  p.effects.forEach((fx,i)=>fc.appendChild(mkSlot(fx,i,p)));
  
  // Ligar a função Tap Tempo ao botão
  $('btap').onclick = handleTapTempo;
  
  $('bw').onclick=async()=>{
    p.name=$('ni').value.slice(0,10);
    const msg=writeMsg(dev.id,s,p);
    if(!msg)return; 
    try{
      sendRaw(pc(s));              
      await sleep(60);
      sendRaw(sx(dev.id,[0x50])); 
      await sleep(80);
      await send(msg,true,2000);  
      st(`patch ${s+1} written`,'s-ok');renderItem(s,p);
    }catch(e){st(e.message,'s-err');}
  };
  $('bse').onclick=async()=>{
    try{await send(pc(s));st(`switched to patch ${s+1}`,'s-info');}
    catch(e){st(e.message,'s-err');}
  };

  $('bvol').onclick=()=>{
    const row=$('vol-row');
    const showing=row.style.display==='flex';
    row.style.display=showing?'none':'flex';
    if(!showing){
      const v=getPatchVolume(p);
      if(v){$('vol-sl').value=v.value;$('vol-val').textContent=v.value;}
      else{st('Nenhum efeito ativo com parâmetro Level','s-warn');}
    }
  };
  $('vol-sl').oninput=()=>{
    const v=parseInt($('vol-sl').value);
    $('vol-val').textContent=v;
    setPatchVolume(p, v);
    const vol=getPatchVolume(p);
    if(vol){
      const sl=document.querySelector(`[data-fi="${vol.slotIdx}"][data-pi="${vol.paramIdx}"]`);
      if(sl){sl.value=v;sl.nextElementSibling.textContent=v;}
    }
  };

  $('bclr').onclick=()=>{
    if(!confirm('Limpar este patch? Todos os efeitos e o nome serão apagados.'))return;
    clearPatch(p);
    $('ni').value='';
    openEd(s);
    st(`patch ${s+1} limpo`,'s-warn');
  };
}
