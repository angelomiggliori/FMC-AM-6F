<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>FMC-AM-6F V2</title>

<style>

body{
margin:0;
background:#050505;
color:#00ff9c;
font-family:monospace;
overflow:hidden;
text-align:center;
}

#screen{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

height:100vh;
width:100vw;

}

#display{

font-size:clamp(50px,9vw,90px);
margin:20px;

}

#mode{

opacity:.7;
margin-bottom:10px;

}

#bpm{

margin-bottom:20px;

}

#grid{

display:flex;
flex-wrap:wrap;
justify-content:center;

}

.switch{

width:clamp(80px,12vw,130px);
height:clamp(80px,12vw,130px);

margin:10px;

background:#111;

border-radius:14px;

border:3px solid #00ff9c;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

}

button{

all:unset;
cursor:pointer;
width:100%;
height:100%;

}

.led{

width:18px;
height:18px;
border-radius:50%;
margin-bottom:6px;
background:#021;

}

.on{

background:#00ff9c;
box-shadow:0 0 12px #00ff9c;

}

#monitor{

position:fixed;
bottom:0;
left:0;

width:100%;

max-height:120px;

overflow:auto;

background:#000;
font-size:12px;

}

</style>

</head>

<body oncontextmenu="return false">

<div id="screen">

<div id="display">A0</div>

<div id="mode">NORMAL</div>

<div id="bpm">BPM 120</div>

<div id="grid">

<div class="switch"><div id="led1" class="led"></div><button id="fs1">FS1</button></div>
<div class="switch"><div id="led2" class="led"></div><button id="fs2">FS2</button></div>
<div class="switch"><div id="led3" class="led"></div><button id="fs3">FS3</button></div>
<div class="switch"><div id="led4" class="led"></div><button id="fs4">FS4</button></div>
<div class="switch"><div id="led5" class="led"></div><button id="fs5">FS5</button></div>

<div class="switch"><div id="led6" class="led"></div><button id="fs6">BANK</button></div>
<div class="switch"><div id="ledtap" class="led"></div><button id="tap">TAP</button></div>

</div>

</div>

<div id="monitor"></div>

<script>

/* BLOQUEIO ZOOM */

document.addEventListener("gesturestart",e=>e.preventDefault())
document.addEventListener("dblclick",e=>e.preventDefault())

/* EEPROM SIMULADA */

let memory=JSON.parse(localStorage.getItem("fmcmem"))||{

bank:0,
patch:0

}

function saveMemory(){

localStorage.setItem("fmcmem",JSON.stringify(memory))

}

/* MIDI */

let midiOut=null

async function initMIDI(){

try{

const access=await navigator.requestMIDIAccess()

for(let o of access.outputs.values()){

midiOut=o

}

}catch{}

}

function midiSend(data){

if(midiOut)midiOut.send(data)

log("MIDI "+data)

}

/* MONITOR */

function log(txt){

let m=document.getElementById("monitor")

m.innerHTML=txt+"<br>"+m.innerHTML

}

/* CONTROLADORA */

const banks=["A","B","C","D","E","F","G","H","I","J"]

let bank=memory.bank
let patch=memory.patch

let bankGroup=0

let preselect=false
let preBank=0

const display=document.getElementById("display")
const mode=document.getElementById("mode")

function updateDisplay(){

display.innerText=banks[bank]+patch

}

/* LED */

function clearLED(){

for(let i=1;i<=5;i++)
document.getElementById("led"+i).classList.remove("on")

}

function setLED(p){

clearLED()
document.getElementById("led"+(p+1)).classList.add("on")

}

/* PATCH */

function selectPatch(p){

if(preselect){

bank=preBank
patch=p

preselect=false

mode.innerText="CONFIRM"

}else{

patch=p

}

memory.bank=bank
memory.patch=patch

saveMemory()

setLED(p)

updateDisplay()

let pc=(bank*10)+patch

midiSend([0xC0,pc])

}

/* BANK */

function bankTap(){

bankGroup = bankGroup?0:1

mode.innerText=bankGroup?"BANK F-J":"BANK A-E"

}

function bankHold(){

preselect=true

preBank = bankGroup?5:0

display.innerText=banks[preBank]+"?"

mode.innerText="SELECT BANK"

}

/* TAP TEMPO */

let taps=[]

function tapTempo(){

let now=Date.now()

taps.push(now)

if(taps.length>5)taps.shift()

if(taps.length>=2){

let intervals=[]

for(let i=1;i<taps.length;i++){

intervals.push(taps[i]-taps[i-1])

}

let avg=intervals.reduce((a,b)=>a+b)/intervals.length

let bpm=Math.round(60000/avg)

document.getElementById("bpm").innerText="BPM "+bpm

midiSend([0xB0,64,bpm])

blink(bpm)

}

}

let blinkTimer

function blink(bpm){

clearInterval(blinkTimer)

blinkTimer=setInterval(()=>{

let led=document.getElementById("ledtap")

led.classList.toggle("on")

},60000/bpm)

}

/* DEBOUNCE */

function debounce(fn){

let last=0

return function(){

let now=Date.now()

if(now-last>20){

last=now
fn()

}

}

}

/* FOOTSWITCH */

fs1.onclick=debounce(()=>selectPatch(0))
fs2.onclick=debounce(()=>selectPatch(1))
fs3.onclick=debounce(()=>selectPatch(2))
fs4.onclick=debounce(()=>selectPatch(3))
fs5.onclick=debounce(()=>selectPatch(4))

let holdTimer

fs6.onmousedown=()=>{

holdTimer=setTimeout(bankHold,500)

}

fs6.onmouseup=()=>{

clearTimeout(holdTimer)

bankTap()

}

tap.onclick=debounce(tapTempo)

/* INIT */

updateDisplay()

document.body.onclick=initMIDI

</script>

</body>
</html>
