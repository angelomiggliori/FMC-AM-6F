<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G1on Editor — ToneLib Web</title>
<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
</head>
<body>

<!-- ══ NOTIFICATION TOAST ═══════════════════════════════════════ -->
<div class="notif" id="notif"></div>

<!-- ══ HEADER ════════════════════════════════════════════════════ -->
<header class="app-header">

  <div class="logo">
    <span class="logo-main">G1ON EDITOR</span>
    <span class="logo-sub">TONELIB WEB · ZDL v1.0</span>
  </div>

  <div class="header-center">
    <div class="patch-slot-badge" id="slotBadge">P00</div>
    <input
      class="patch-name-input" id="patchNameInput"
      value="INIT PATCH" maxlength="10"
      spellcheck="false" autocomplete="off"
      oninput="window._ui?.patchNameChange()">
    <div class="header-patch-actions">
      <button class="btn btn-ghost btn-sm" title="Ctrl+Z"     onclick="window._ui?.undo()">↩</button>
      <button class="btn btn-secondary btn-sm"                onclick="window._ui?.receivePatch()">↓ RECEBER</button>
      <button class="btn btn-primary btn-sm" title="Ctrl+Enter" onclick="window._ui?.sendPatch()">▶ ENVIAR</button>
      <button class="btn btn-save btn-sm"    title="Ctrl+S"    onclick="window._ui?.savePatch()">✦ SALVAR</button>
    </div>
  </div>

  <div class="header-right">
    <div class="midi-bar">
      <select class="midi-select" id="midiInputSel"><option value="">— MIDI IN —</option></select>
      <select class="midi-select" id="midiOutputSel"><option value="">— MIDI OUT —</option></select>
      <button class="btn btn-connect btn-sm" onclick="window._ui?.connectMidi()">CONECTAR</button>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">DESCONECTADO</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="window._ui?.toggleLog()">LOG</button>
  </div>

</header>

<!-- ══ APP LAYOUT ════════════════════════════════════════════════ -->
<div class="app-layout">

  <!-- ── LEFT SIDEBAR — PATCH LIST ── -->
  <aside class="sidebar-left">
    <div class="sidebar-section-header">
      <span>PATCHES</span>
      <div class="sidebar-count" id="patchCount">100</div>
    </div>
    <div class="sidebar-search-wrap">
      <input class="sidebar-search" id="patchSearch"
        type="text" placeholder="Buscar patch..." autocomplete="off">
    </div>
    <div class="patch-list" id="patchList"></div>
    <div class="sidebar-footer">
      <button class="btn btn-secondary btn-sm" onclick="window._ui?.newPatch()">+ NOVO</button>
      <button class="btn btn-secondary btn-sm" onclick="window._ui?.exportBank()">↑ EXPORT</button>
      <button class="btn btn-secondary btn-sm" onclick="window._ui?.importBank()">↓ IMPORT</button>
    </div>
  </aside>

  <!-- ── CENTER — SIGNAL CHAIN ── -->
  <main class="center-panel">
    <div class="chain-section-label">
      <span>CADEIA DE EFEITOS</span>
      <div class="chain-slot-info" id="chainSlotInfo">— / 5 SLOTS</div>
    </div>
    <div class="chain-io-label chain-io-in">
      <svg width="10" height="10" viewBox="0 0 10 10">
        <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <circle cx="5" cy="5" r="1.8" fill="currentColor"/>
      </svg>
      INPUT
    </div>
    <div class="signal-chain" id="signalChain"></div>
    <div class="chain-io-label chain-io-out">
      OUTPUT
      <svg width="10" height="10" viewBox="0 0 10 10">
        <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <circle cx="5" cy="5" r="1.8" fill="currentColor"/>
      </svg>
    </div>
  </main>

  <!-- ── RIGHT SIDEBAR — PARAM EDITOR ── -->
  <aside class="sidebar-right">
    <div id="paramPanel" style="display:contents"></div>
  </aside>

</div>

<!-- ══ EFFECT BROWSER MODAL ══════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Selecionar Efeito">

    <div class="modal-header">
      <span class="modal-title">SELECIONAR EFEITO</span>
      <div class="modal-header-right">
        <span class="modal-count" id="browserCount"></span>
        <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
      </div>
    </div>

    <div class="modal-search">
      <input class="modal-search-input" id="effectSearch"
        type="text" placeholder="Buscar por nome, categoria ou parâmetro..." autocomplete="off">
      <div class="cat-filters" id="catFilters"></div>
    </div>

    <div class="effect-browser" id="effectBrowser"></div>

  </div>
</div>

<!-- ══ SYSEX LOG ══════════════════════════════════════════════════ -->
<div class="sysex-log" id="sysexLog">
  <div class="sysex-log-header">
    <span class="sysex-log-title">
      <span class="led-blink"></span>
      SYSEX MONITOR
    </span>
    <div class="sysex-log-actions">
      <label class="log-filter-label">
        <input type="checkbox" id="logFilterTx" checked onchange="filterLog()"> TX
      </label>
      <label class="log-filter-label">
        <input type="checkbox" id="logFilterRx" checked onchange="filterLog()"> RX
      </label>
      <button class="btn btn-ghost btn-xs" onclick="window._ui?.clearLog()">LIMPAR</button>
      <button class="btn btn-ghost btn-xs" onclick="window._ui?.toggleLog()">✕</button>
    </div>
  </div>
  <div class="sysex-log-body" id="sysexLogBody"></div>
</div>

<!-- ══ SCRIPTS ════════════════════════════════════════════════════ -->
<!-- Entry point — carrega todos os módulos via ES6 imports -->
<script type="module" src="app.js"></script>

<!-- Helpers inline não dependentes de módulo -->
<script>
  // Filtro TX/RX no log
  function filterLog() {
    const showTx = document.getElementById('logFilterTx')?.checked;
    const showRx = document.getElementById('logFilterRx')?.checked;
    document.querySelectorAll('#sysexLogBody .log-entry').forEach(el => {
      const isTx = !!el.querySelector('.dir-tx');
      el.style.display = (isTx ? showTx : showRx) ? '' : 'none';
    });
  }

  // Atualiza contador de slots no header da cadeia
  // (escuta evento customizado emitido pelo state_manager via DOM)
  document.addEventListener('state:patch-changed', (e) => {
    const effects = e.detail?.patch?.effects || [];
    const used    = effects.filter(Boolean).length;
    const el      = document.getElementById('chainSlotInfo');
    if (el) el.textContent = `${used} / 5 SLOTS`;
  });
</script>

</body>
</html>
