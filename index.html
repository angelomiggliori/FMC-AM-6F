<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FMC-AM 6F - GOD MONOLITH</title>

<style>
body {
    margin:0;
    background:#0b0b0b;
    color:#0f0;
    font-family:monospace;
}

#top {
    padding:10px;
    border-bottom:1px solid #0f0;
}

button {
    background:#000;
    color:#0f0;
    border:1px solid #0f0;
    padding:6px;
    margin:3px;
    cursor:pointer;
}

#chain {
    display:flex;
    gap:10px;
    padding:10px;
    overflow-x:auto;
}

.fx {
    border:2px solid #0f0;
    padding:10px;
    min-width:120px;
    cursor:grab;
}

.fx.active {
    background:#0f0;
    color:#000;
}

#editor {
    padding:10px;
    border-top:1px solid #0f0;
}

.knob {
    display:inline-block;
    margin:10px;
    text-align:center;
}

.knobCircle {
    width:60px;
    height:60px;
    border:2px solid #0f0;
    border-radius:50%;
    position:relative;
    cursor:pointer;
}

.knobIndicator {
    width:2px;
    height:25px;
    background:#0f0;
    position:absolute;
    top:5px;
    left:50%;
    transform-origin:bottom;
}

#library {
    border-top:1px solid #0f0;
    padding:10px;
    max-height:150px;
    overflow:auto;
}
</style>
</head>

<body>

<div id="top">
    <button onclick="connect()">CONNECT</button>
    <button onclick="read()">READ</button>
    <button onclick="save()">SEND</button>
    <button onclick="addFX()">+FX</button>
    <button onclick="removeFX()">-FX</button>
    <button onclick="saveLocal()">SAVE LIB</button>
    <button onclick="exportJSON()">EXPORT</button>
    <input type="file" onchange="importJSON(event)">
</div>

<div id="chain"></div>
<div id="editor"></div>
<div id="library"></div>

<script>

// =====================
// ESTADO
// =====================
let midiOut=null, midiIn=null;
let patch=null;
let selectedFX=0;
let dragIndex=null;
let sendTimer=null;

let library = JSON.parse(localStorage.getItem("lib")||"[]");

// =====================
// MIDI
// =====================
async function connect(){
    const access = await navigator.requestMIDIAccess({sysex:true});
    midiOut=[...access.outputs.values()][0];
    midiIn=[...access.inputs.values()][0];

    if(midiIn) midiIn.onmidimessage=onMIDI;

    alert("MIDI conectado");
}

function send(d){ if(midiOut) midiOut.send(d); }

// =====================
// SYS
// =====================
function read(){
    send([0xF0,0x52,0x00,0x61,0x08,0xF7]);
}

function save(){
    clearTimeout(sendTimer);
    sendTimer=setTimeout(()=>{
        send(build(patch));
    },80);
}

function build(p){
    let d=[0xF0,0x52,0x00,0x61,0x09];
    d.push(0,0);

    p.effects.forEach(f=> d.push(f.id,...f.params));

    let name="PATCH".padEnd(10," ");
    for(let c of name) d.push(c.charCodeAt(0));

    d.push(0xF7);
    return d;
}

// =====================
// PARSER
// =====================
function onMIDI(msg){
    let d=[...msg.data];
    if(d[3]===0x28){
        patch=parse(d);
        render();
    }
}

function parse(data){
    let p={effects:[]};
    let i=7;

    while(i < data.length-11){
        let id=data[i++];
        let params=data.slice(i,i+6);
        i+=6;
        p.effects.push({id,params});
    }

    return p;
}

// =====================
// UI
// =====================
function render(){

    if(!patch) return;

    // CHAIN
    let c="";
    patch.effects.forEach((fx,i)=>{
        c+=`<div class="fx ${i===selectedFX?"active":""}"
                draggable="true"
                ondragstart="dragStart(${i})"
                ondragover="event.preventDefault()"
                ondrop="dropFX(${i})"
                onclick="selectFX(${i})">
                FX ${i}<br>ID:${fx.id}
            </div>`;
    });
    chain.innerHTML=c;

    // EDITOR
    let fx=patch.effects[selectedFX];
    let e="";

    fx.params.forEach((p,i)=>{
        let angle = (p/127)*270 -135;

        e+=`
        <div class="knob">
            <div class="knobCircle"
                onmousedown="knobStart(event,${i})">
                <div class="knobIndicator"
                    style="transform:rotate(${angle}deg)">
                </div>
            </div>
            <div>${p}</div>
        </div>`;
    });

    editor.innerHTML=e;

    // LIBRARY
    let l="";
    library.forEach((p,i)=>{
        l+=`<div onclick="loadLib(${i})">Preset ${i}</div>`;
    });
    libraryDiv.innerHTML=l;
}

// =====================
// DRAG
// =====================
function dragStart(i){ dragIndex=i; }

function dropFX(i){
    let tmp = patch.effects[dragIndex];
    patch.effects.splice(dragIndex,1);
    patch.effects.splice(i,0,tmp);
    save();
    render();
}

// =====================
// FX
// =====================
function selectFX(i){ selectedFX=i; render(); }

function addFX(){
    patch.effects.push({id:1,params:[0,0,0,0,0,0]});
    render();
}

function removeFX(){
    patch.effects.splice(selectedFX,1);
    selectedFX=0;
    render();
}

// =====================
// KNOB
// =====================
let activeKnob=null;

function knobStart(e,i){
    activeKnob=i;
    document.onmousemove = knobMove;
    document.onmouseup = knobEnd;
}

function knobMove(e){
    if(activeKnob===null) return;

    let val = patch.effects[selectedFX].params[activeKnob];
    val += (e.movementY * -1);

    val = Math.max(0,Math.min(127,val));

    patch.effects[selectedFX].params[activeKnob]=val;

    save();
    render();
}

function knobEnd(){
    activeKnob=null;
    document.onmousemove=null;
}

// =====================
// LIBRARY
// =====================
function saveLocal(){
    library.push(JSON.parse(JSON.stringify(patch)));
    localStorage.setItem("lib",JSON.stringify(library));
    render();
}

function loadLib(i){
    patch = JSON.parse(JSON.stringify(library[i]));
    render();
}

function exportJSON(){
    let blob=new Blob([JSON.stringify(library)],{type:"application/json"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="presets.json";
    a.click();
}

function importJSON(e){
    let file=e.target.files[0];
    let r=new FileReader();
    r.onload=()=>{
        library=JSON.parse(r.result);
        localStorage.setItem("lib",JSON.stringify(library));
        render();
    };
    r.readAsText(file);
}

// =====================
const chain=document.getElementById("chain");
const editor=document.getElementById("editor");
const libraryDiv=document.getElementById("library");

</script>
</body>
</html>
