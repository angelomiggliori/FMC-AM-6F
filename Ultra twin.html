<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>FMC-AM 6F ULTRA V4 DIGITAL TWIN</title>

<style>

body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
touch-action:none;
}

#display{

position:absolute;
top:4vh;
left:50%;
transform:translateX(-50%);

font-size:clamp(40px,8vw,90px);
color:#00ff66;
font-weight:900;
text-shadow:0 0 30px #00ff66;

}

#mode{

position:absolute;
top:13vh;
left:50%;
transform:translateX(-50%);
color:white;

}

</style>

</head>

<body>

<div id="display">A0</div>
<div id="mode">EXEC</div>

<script src="lib/three.min.js"></script>
<script src="twin_engine.js"></script>

<script>

/* proteção */

document.addEventListener("contextmenu",e=>e.preventDefault())

/* twin */

const twin=new FMC_TWIN()

/* MIDI */

let midiOut=null

if(navigator.requestMIDIAccess){

navigator.requestMIDIAccess().then(midi=>{

for(let o of midi.outputs.values()){
midiOut=o
break
}

})

}

function sendPC(pc){

if(!midiOut)return

midiOut.send([0xC0,pc])

}

/* THREE */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,8,14)

const renderer=new THREE.WebGLRenderer({
antialias:false
})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

/* luz */

scene.add(new THREE.AmbientLight(0xffffff,.5))

let light=new THREE.PointLight(0xffffff,2)

light.position.set(5,10,5)

scene.add(light)

/* chassis */

let body=new THREE.Mesh(

new THREE.BoxGeometry(14,1.5,8),

new THREE.MeshStandardMaterial({
color:0x111111,
metalness:.8,
roughness:.3
})

)

scene.add(body)

/* switches */

let switches=[]
let leds=[]

function createSwitch(x,z,id){

let sw=new THREE.Mesh(

new THREE.CylinderGeometry(.9,.9,.6,32),

new THREE.MeshStandardMaterial({
color:0x777777,
metalness:1
})

)

sw.position.set(x,1,z)
sw.userData.id=id

scene.add(sw)
switches.push(sw)

/* LED */

let led=new THREE.Mesh(

new THREE.RingGeometry(1.1,1.4,32),

new THREE.MeshBasicMaterial({
color:0x000000,
side:THREE.DoubleSide
})

)

led.rotation.x=-Math.PI/2
led.position.set(x,.7,z)

scene.add(led)

leds.push(led)

}

createSwitch(-4,2,1)
createSwitch(0,2,2)
createSwitch(4,2,3)

createSwitch(-4,-2,4)
createSwitch(0,-2,5)
createSwitch(4,-2,6)

/* raycaster */

const ray=new THREE.Raycaster()
const mouse=new THREE.Vector2()

let holdTimer=null

window.addEventListener("pointerdown",down)
window.addEventListener("pointerup",up)

function down(e){

mouse.x=(e.clientX/window.innerWidth)*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

ray.setFromCamera(mouse,camera)

let hit=ray.intersectObjects(switches)

if(!hit.length)return

let sw=hit[0].object
let id=sw.userData.id

animate(sw)

if(id===6){

holdTimer=setTimeout(()=>{

twin.enterBankMode()
updateUI()

},900)

}else{

execute(id)

}

}

function up(){

clearTimeout(holdTimer)

}

/* lógica */

function execute(id){

let program=twin.press(id)

updateUI()

if(program!==null)
sendPC(program)

}

/* UI */

function updateUI(){

document.getElementById("display").innerText=
twin.getPatchLabel()

document.getElementById("mode").innerText=
twin.mode

leds.forEach(l=>l.material.color.set(0x000000))

let pos=Math.floor(twin.patch/2)

leds[pos].material.color.set(0x00ff66)

}

/* animação */

function animate(sw){

sw.position.y=.6

setTimeout(()=>{

sw.position.y=1

},120)

}

/* resize */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

/* render */

function loop(){

requestAnimationFrame(loop)

renderer.render(scene,camera)

}

updateUI()

loop()

</script>

</body>

</html>
