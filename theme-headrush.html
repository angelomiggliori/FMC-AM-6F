<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FMC-AM 6F · HeadRush</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap');

:root {
  --bg:        #0d0d0f;
  --surface:   #141418;
  --surface2:  #1c1c22;
  --border:    #2a2a38;
  --border2:   #363648;
  --accent:    #7c6aff;   /* roxo HeadRush */
  --accent2:   #00c8ff;   /* ciano neon */
  --green:     #00e87a;
  --red:       #ff3355;
  --yellow:    #ffc840;
  --text:      #e8e8f0;
  --text-dim:  #6868888;
  --text-dim:  #686880;
  --tap-color: #00c8ff;
  --fs-w: 88px;
  --fs-h: 88px;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter', sans-serif;
  overflow:hidden;
  user-select:none; -webkit-user-select:none;
  touch-action:manipulation;
}
body { display:flex; flex-direction:column; align-items:center; justify-content:center; }

/* Subtle grid background like HeadRush screen */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(124,106,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,106,255,.03) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events:none; z-index:0;
}

/* ── Chassis — tablet-like bezel ─────────────── */
.chassis {
  position:relative; z-index:1;
  width:min(98vw, 820px);
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:16px 18px 14px;
  box-shadow:
    0 0 0 1px #111116,
    0 0 60px rgba(124,106,255,.12),
    0 20px 60px rgba(0,0,0,.9),
    inset 0 1px 0 rgba(255,255,255,.05);
  display:flex; flex-direction:column; gap:12px;
  min-height:0; overflow:hidden;
}

/* Subtle corner indicators like HeadRush screen edges */
.chassis::before {
  content:'';
  position:absolute; inset:0;
  border-radius:16px;
  background:linear-gradient(135deg, rgba(124,106,255,.06) 0%, transparent 40%, transparent 60%, rgba(0,200,255,.04) 100%);
  pointer-events:none;
}

/* ── Top bar ─────────────────────────────────── */
.top-bar { display:flex; align-items:center; gap:10px; }

.logo {
  font-family:'Exo 2', sans-serif;
  font-weight:800; font-size:clamp(12px,2vw,16px);
  letter-spacing:.06em; color:#fff;
  white-space:nowrap;
}
.logo-sub { font-weight:300; color:var(--accent); margin-left:4px; }

/* ── Main display — like HeadRush touchscreen ── */
.display {
  flex:1; background:#0a0a0e;
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 16px;
  display:flex; align-items:center; gap:14px;
  min-width:0;
  box-shadow:inset 0 0 30px rgba(0,0,0,.6), 0 0 0 1px #08080c;
  position:relative; overflow:hidden;
}
/* Left accent bar — color-coded by bank */
.display::before {
  content:''; position:absolute; left:0; top:8px; bottom:8px; width:3px;
  background:var(--bank-color,var(--accent));
  border-radius:0 3px 3px 0;
  box-shadow:0 0 12px var(--bank-color,var(--accent));
  transition:background .3s, box-shadow .3s;
}
/* Scanline subtle */
.display::after {
  content:'';
  position:absolute; inset:0;
  background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.08) 3px, rgba(0,0,0,.08) 4px);
  pointer-events:none; border-radius:10px;
}

.display-main { flex:1; min-width:0; padding-left:8px; }

.patch-id {
  font-family:'Exo 2', sans-serif;
  font-size:clamp(22px,5vw,40px); font-weight:800;
  color:var(--bank-color, #fff);
  text-shadow:0 0 20px var(--bank-color,transparent), 0 0 60px var(--bank-color,transparent);
  letter-spacing:.06em; line-height:1;
  transition:color .2s, text-shadow .2s;
}
.patch-id.blink { animation:blink-hr .4s linear infinite; }
@keyframes blink-hr { 50%{opacity:.05;} }

.patch-name {
  font-family:'Inter', sans-serif; font-weight:400;
  font-size:clamp(9px,1.5vw,12px); color:var(--text-dim);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:3px; letter-spacing:.04em; text-transform:uppercase;
}
.fx-indicators { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
.fx-tag {
  font-family:'Share Tech Mono',monospace; font-size:8px;
  padding:1px 6px; border-radius:3px; border:1px solid;
  letter-spacing:.08em; transition:all .2s;
}
.fx-tag.delay    { color:#00e5ff; border-color:#00e5ff33; background:rgba(0,229,255,.06); }
.fx-tag.mod      { color:#b388ff; border-color:#b388ff33; background:rgba(179,136,255,.06); }
.fx-tag.reverb   { color:#82b1ff; border-color:#82b1ff33; background:rgba(130,177,255,.06); }
.fx-tag.drive    { color:#ff8a65; border-color:#ff8a6533; background:rgba(255,138,101,.06); }
.fx-tag.dynamics { color:#ffd740; border-color:#ffd74033; background:rgba(255,215,64,.06); }
.fx-tag.off      { opacity:.25; filter:grayscale(1); }

.bpm-display {
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(9px,1.5vw,12px); color:var(--accent2);
  white-space:nowrap; border-left:1px solid var(--border);
  padding-left:14px; line-height:1.5; text-align:center;
}
.bpm-val { font-size:clamp(18px,3vw,28px); font-weight:700; display:block; font-family:'Exo 2',sans-serif; }

/* ── Middle ─────────────────────────────────── */
.middle { display:flex; min-height:0; }

/* ── FS Grid ─────────────────────────────────── */
.fs-grid {
    flex:1; display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);
    gap:clamp(8px,2vw,16px); 
    align-content:center;
    justify-items:center; 
    padding:6px 4px;
    width:100%;
  }
.fs-col { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }

/* HeadRush-style: rounded rectangle buttons, not circles */
.fs-btn {
    width:clamp(72px, 22vw, 110px); height:clamp(72px, 22vw, 110px);
  width:var(--fs-w); height:var(--fs-h);
  background:linear-gradient(180deg, #1e1e28 0%, #141418 100%);
  border:1px solid var(--border2);
  border-radius:10px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Exo 2', sans-serif;
  font-size:clamp(10px,1.6vw,13px); font-weight:600;
  color:var(--text-dim); letter-spacing:.04em;
  position:relative;
  transition:border-color .12s, box-shadow .12s, background .12s, transform .08s;
  box-shadow:0 2px 8px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
  touch-action:none; -webkit-tap-highlight-color:transparent; flex-shrink:0; overflow:hidden;
}
.fs-btn:active, .fs-btn.pressed {
  transform:scale(.95);
  box-shadow:0 1px 3px rgba(0,0,0,.8), inset 0 2px 8px rgba(0,0,0,.5);
}

/* Top LED strip — par */
.fs-btn.lit-top {
  border-color:var(--bank-color,var(--green));
  background:linear-gradient(180deg, #1e1e30 0%, #141418 100%);
  color:#e8e8f0;
  box-shadow:0 -3px 12px -2px var(--bank-color,var(--green)), 0 2px 8px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
}
.fs-btn.lit-top::after {
  content:''; position:absolute; top:0; left:8px; right:8px; height:2px;
  background:var(--bank-color,var(--green));
  border-radius:0 0 3px 3px;
  box-shadow:0 0 8px var(--bank-color,var(--green));
}
/* Bottom LED strip — ímpar */
.fs-btn.lit-bottom {
  border-color:var(--bank-color,var(--green));
  background:linear-gradient(180deg, #141418 0%, #1e1e30 100%);
  color:#e8e8f0;
  box-shadow:0 3px 12px -2px var(--bank-color,var(--green)), 0 2px 8px rgba(0,0,0,.6), inset 0 -1px 0 rgba(255,255,255,.04);
}
.fs-btn.lit-bottom::before {
  content:''; position:absolute; bottom:0; left:8px; right:8px; height:2px;
  background:var(--bank-color,var(--green));
  border-radius:3px 3px 0 0;
  box-shadow:0 0 8px var(--bank-color,var(--green));
  z-index:1;
}

.fs-btn.preselect-mode {
  border-color:var(--accent);
  animation:preselect-hr .5s ease-in-out infinite alternate;
}
@keyframes preselect-hr { from{opacity:.6;} to{opacity:1;} }

/* FS6 tap */
.fs-btn.tap-btn { border-color:var(--border); }
.fs-btn.tap-btn.tap-beat {
  background:linear-gradient(180deg, #0e1e2e 0%, #0a1420 100%);
  border-color:var(--tap-color); color:var(--tap-color);
  box-shadow:0 0 20px rgba(0,200,255,.5), 0 2px 8px rgba(0,0,0,.6), inset 0 1px 0 rgba(0,200,255,.1);
}
.fs-btn.tap-btn.tap-off {
  border-color:#1e1e28;
  background:linear-gradient(180deg, #111116 0%, #0d0d10 100%);
  color:#282838;
  box-shadow:0 2px 4px rgba(0,0,0,.8);
}
.fs-btn.tap-btn.delay-sync { --tap-color:#00e5ff; }
.fs-btn.tap-btn.rate-sync  { --tap-color:#b388ff; }

.fs-label {
  font-family:'Inter',sans-serif; font-size:clamp(7px,1vw,9px);
  color:var(--text-dim); letter-spacing:.04em; text-align:center;
  max-width:84px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  text-transform:uppercase;
}



/* ── Status bar ─────────────────────────────── */
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:5px 10px; background:#0a0a0e;
  border:1px solid var(--border); border-radius:8px; gap:6px;
}
.status-item { display:flex; align-items:center; gap:5px; font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); }
.midi-indicator { width:7px; height:7px; border-radius:50%; background:#333; transition:background .2s, box-shadow .2s; flex-shrink:0; }
.midi-indicator.sim       { background:#444455; }
.midi-indicator.connected { background:var(--green); box-shadow:0 0 6px var(--green); }
.midi-indicator.error     { background:var(--red); box-shadow:0 0 6px var(--red); }
.midi-indicator.activity  { background:var(--accent2); box-shadow:0 0 8px var(--accent2); }

.mode-badge {
  font-family:'Exo 2',sans-serif; font-size:9px; font-weight:600;
  padding:2px 8px; border-radius:4px; letter-spacing:.08em; text-transform:uppercase;
}
.mode-badge.normal     { background:rgba(124,106,255,.1); color:var(--accent); border:1px solid rgba(124,106,255,.25); }
.mode-badge.banksel    { background:rgba(0,200,255,.1); color:var(--accent2); border:1px solid rgba(0,200,255,.3); animation:preselect-hr .5s ease-in-out infinite alternate; }
.mode-badge.confirming { background:rgba(255,200,64,.1); color:var(--yellow); border:1px solid rgba(255,200,64,.3); animation:preselect-hr .45s ease-in-out infinite alternate; }

.confirm-ring { position:absolute; inset:-4px; border-radius:10px; border:2px solid rgba(124,106,255,.4); animation:confirmRing-hr .4s ease forwards; pointer-events:none; }
@keyframes confirmRing-hr { 0%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(1.08);} }

.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(14,14,22,.95); border:1px solid var(--accent);
  color:var(--accent); font-family:'Share Tech Mono',monospace; font-size:11px;
  padding:7px 18px; border-radius:6px; letter-spacing:.1em;
  opacity:0; transition:all .3s; pointer-events:none; z-index:100; white-space:nowrap;
  box-shadow:0 0 20px rgba(124,106,255,.2);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media(max-width:600px){ :root{--fs-w:60px;--fs-h:60px;} }
@media(max-width:400px){ :root{--fs-w:50px;--fs-h:50px;} }
@media(max-height:500px) and (orientation:landscape){ :root{--fs-w:56px;--fs-h:56px;} .chassis{padding:8px 12px;gap:8px;} }

  /* ── Barra MIDI externa (abaixo do chassis) ─── */
  .midi-bar {
    position:relative; z-index:2;
    width:min(98vw, 820px);
    margin-top:10px;
    background:#0a0a0e;
    border:1px solid #2a2a35;
    border-radius:10px;
    padding:8px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    box-shadow:0 4px 20px rgba(0,0,0,.6);
  }

  .midi-bar-dot {
    width:9px; height:9px; border-radius:50%;
    flex-shrink:0;
    background:#2a2a35;
    transition:background .3s, box-shadow .3s;
  }
  .midi-bar-dot.off        { background:#2a2a35; }
  .midi-bar-dot.aguardando { background:#555566; animation:pulse-wait .9s ease-in-out infinite alternate; }
  .midi-bar-dot.conectado  { background:#00ff66; box-shadow:0 0 8px #00ff66; }
  .midi-bar-dot.g1on       { background:#00ffcc; box-shadow:0 0 10px #00ffcc; animation:pulse-g1on 1.2s ease-in-out infinite alternate; }
  .midi-bar-dot.erro       { background:#ff2244; box-shadow:0 0 8px #ff2244; }
  @keyframes pulse-wait  { from{opacity:.3;} to{opacity:1;} }
  @keyframes pulse-g1on  { from{box-shadow:0 0 6px #00ffcc;} to{box-shadow:0 0 16px #00ffcc;} }

  .midi-bar-texto {
    font-family:'Share Tech Mono', monospace;
    font-size:11px;
    color:#666677;
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:.04em;
  }
  .midi-bar-texto strong { color:#aaaacc; }
  .midi-bar-texto.g1on   { color:#00ffcc; }
  .midi-bar-texto.erro   { color:#ff4455; }

  .midi-bar-btn {
    font-family:'Share Tech Mono', monospace;
    font-size:10px;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding:5px 14px;
    border-radius:6px;
    border:1px solid #333344;
    background:#111118;
    color:#888899;
    cursor:pointer;
    flex-shrink:0;
    transition:all .2s;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  }
  .midi-bar-btn:hover   { border-color:#555566; color:#aaaacc; }
  .midi-bar-btn.loading { border-color:#ffaa00; color:#ffaa00; animation:pulse-wait .6s ease-in-out infinite alternate; }
  .midi-bar-btn.ok      { border-color:#00ff6633; color:#00ff66; pointer-events:none; }
  .midi-bar-btn.g1on    { border-color:#00ffcc55; color:#00ffcc; pointer-events:none; }


  /* ── Build badge ─────────────────────────── */
  .build-badge {
    font-family:'Share Tech Mono',monospace;
    font-size:8px; letter-spacing:.12em;
    color:#ffffff; background:#2a2a3a;
    border:1px solid #3a3a50;
    border-radius:3px;
    padding:1px 6px;
    white-space:nowrap;
    flex-shrink:0;
  }


  /* ── Volume display ──────────────────────── */
  .vol-display {
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(10px,1.8vw,13px);
    white-space:nowrap;
    border-right:1px solid var(--border);
    padding-right:12px;
    line-height:1.4;
    text-align:center;
    color:var(--text-dim);
    transition:color .3s;
  }
  .vol-val {
    font-size:clamp(14px,2.5vw,20px);
    font-weight:700;
    display:block;
    font-family:'Orbitron',sans-serif;
  }
</style>
</head>
<body>
<div class="chassis">
  <div class="top-bar">
    <div class="logo">FMC·AM<span class="logo-sub">6F</span></div>
    <div class="display" id="mainDisplay">
      <div class="vol-display">
        <span class="vol-val" id="patchVolume">---</span>
        <span>VOL</span>
      </div>
      <div class="display-main">
        <div class="patch-id" id="patchId">A0</div>
        <div class="patch-name" id="patchName">CLEAN BOOST</div>
        <div class="fx-indicators" id="fxIndicators"></div>
      </div>
      <div class="bpm-display">
        <span class="bpm-val" id="bpmVal">120</span>
        <span>BPM</span>
      </div>
    </div>
  </div>
  <div class="middle">
    <div class="fs-grid" id="fsGrid"></div>
  </div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-item">
      <div class="midi-indicator sim" id="midiIndicator"></div>
      <span id="midiPortLabel">SIM</span>
    </div>
    <div class="mode-badge normal" id="modeBadge">EXECUÇÃO</div>
    <div class="status-item">
      <div class="midi-indicator connected"></div>
      <span id="memStatus">MEM OK</span>
    </div>
  </div>
  <div class="status-bar" style="margin-top:-6px;border-top:none;border-radius:0 0 5px 5px;padding:2px 8px;justify-content:space-between;">
    <span class="build-badge" title="Build ID">v4.2-b20260316-volfix</span>
    <span style="cursor:pointer;font-size:9px;color:#ff6b00;letter-spacing:.08em;padding:2px 6px;border:1px solid #ff6b00;border-radius:3px;" onclick="limparCachePatches()" title="Apaga cache de patches e recarrega seed">↺ CACHE</span>
    <span class="flash-health" id="flashHealth" onclick="mostrarDetalhesSaude()" title="Clique para detalhes">◌ carregando…</span>
  </div>

<!-- Barra de status MIDI — fora do chassis -->
<div class="midi-bar" id="midiBar">
  <div class="midi-bar-dot off" id="midiBarDot"></div>
  <div class="midi-bar-texto" id="midiBarTexto">MIDI não iniciado</div>
  <button class="midi-bar-btn" id="midiBarBtn" onclick="conectarMIDI()">CONECTAR MIDI</button>
</div>

</div>
<div class="toast" id="toast"></div>


<script>

</script>
<script src="fmc-engine.js"></script>
