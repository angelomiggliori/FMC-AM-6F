<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FMC-AM 6F · HeadRush</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap');

:root {
  --bg:        #0d0d0f;
  --surface:   #141418;
  --surface2:  #1c1c22;
  --border:    #2a2a38;
  --border2:   #363648;
  --accent:    #7c6aff;   /* roxo HeadRush */
  --accent2:   #00c8ff;   /* ciano neon */
  --green:     #00e87a;
  --red:       #ff3355;
  --yellow:    #ffc840;
  --text:      #e8e8f0;
  --text-dim:  #6868888;
  --text-dim:  #686880;
  --tap-color: #00c8ff;
  --fs-w: 88px;
  --fs-h: 88px;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter', sans-serif;
  overflow:hidden;
  user-select:none; -webkit-user-select:none;
  touch-action:manipulation;
}
body { display:flex; flex-direction:column; align-items:center; justify-content:center; }

/* Subtle grid background like HeadRush screen */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(124,106,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,106,255,.03) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events:none; z-index:0;
}

/* ── Chassis — tablet-like bezel ─────────────── */
.chassis {
  position:relative; z-index:1;
  width:min(98vw, 820px);
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:16px 18px 14px;
  box-shadow:
    0 0 0 1px #111116,
    0 0 60px rgba(124,106,255,.12),
    0 20px 60px rgba(0,0,0,.9),
    inset 0 1px 0 rgba(255,255,255,.05);
  display:flex; flex-direction:column; gap:12px;
  min-height:0; overflow:hidden;
}

/* Subtle corner indicators like HeadRush screen edges */
.chassis::before {
  content:'';
  position:absolute; inset:0;
  border-radius:16px;
  background:linear-gradient(135deg, rgba(124,106,255,.06) 0%, transparent 40%, transparent 60%, rgba(0,200,255,.04) 100%);
  pointer-events:none;
}

/* ── Top bar ─────────────────────────────────── */
.top-bar { display:flex; align-items:center; gap:10px; }

.logo {
  font-family:'Exo 2', sans-serif;
  font-weight:800; font-size:clamp(12px,2vw,16px);
  letter-spacing:.06em; color:#fff;
  white-space:nowrap;
}
.logo-sub { font-weight:300; color:var(--accent); margin-left:4px; }

/* ── Main display — like HeadRush touchscreen ── */
.display {
  flex:1; background:#0a0a0e;
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 16px;
  display:flex; align-items:center; gap:14px;
  min-width:0;
  box-shadow:inset 0 0 30px rgba(0,0,0,.6), 0 0 0 1px #08080c;
  position:relative; overflow:hidden;
}
/* Left accent bar — color-coded by bank */
.display::before {
  content:''; position:absolute; left:0; top:8px; bottom:8px; width:3px;
  background:var(--bank-color,var(--accent));
  border-radius:0 3px 3px 0;
  box-shadow:0 0 12px var(--bank-color,var(--accent));
  transition:background .3s, box-shadow .3s;
}
/* Scanline subtle */
.display::after {
  content:'';
  position:absolute; inset:0;
  background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.08) 3px, rgba(0,0,0,.08) 4px);
  pointer-events:none; border-radius:10px;
}

.display-main { flex:1; min-width:0; padding-left:8px; }

.patch-id {
  font-family:'Exo 2', sans-serif;
  font-size:clamp(22px,5vw,40px); font-weight:800;
  color:var(--bank-color, #fff);
  text-shadow:0 0 20px var(--bank-color,transparent), 0 0 60px var(--bank-color,transparent);
  letter-spacing:.06em; line-height:1;
  transition:color .2s, text-shadow .2s;
}
.patch-id.blink { animation:blink-hr .4s linear infinite; }
@keyframes blink-hr { 50%{opacity:.05;} }

.patch-name {
  font-family:'Inter', sans-serif; font-weight:400;
  font-size:clamp(9px,1.5vw,12px); color:var(--text-dim);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:3px; letter-spacing:.04em; text-transform:uppercase;
}
.fx-indicators { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
.fx-tag {
  font-family:'Share Tech Mono',monospace; font-size:8px;
  padding:1px 6px; border-radius:3px; border:1px solid;
  letter-spacing:.08em; transition:all .2s;
}
.fx-tag.delay    { color:#00e5ff; border-color:#00e5ff33; background:rgba(0,229,255,.06); }
.fx-tag.mod      { color:#b388ff; border-color:#b388ff33; background:rgba(179,136,255,.06); }
.fx-tag.reverb   { color:#82b1ff; border-color:#82b1ff33; background:rgba(130,177,255,.06); }
.fx-tag.drive    { color:#ff8a65; border-color:#ff8a6533; background:rgba(255,138,101,.06); }
.fx-tag.dynamics { color:#ffd740; border-color:#ffd74033; background:rgba(255,215,64,.06); }
.fx-tag.off      { opacity:.25; filter:grayscale(1); }

.bpm-display {
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(9px,1.5vw,12px); color:var(--accent2);
  white-space:nowrap; border-left:1px solid var(--border);
  padding-left:14px; line-height:1.5; text-align:center;
}
.bpm-val { font-size:clamp(18px,3vw,28px); font-weight:700; display:block; font-family:'Exo 2',sans-serif; }

/* ── Middle ─────────────────────────────────── */
.middle { display:flex; min-height:0; }

/* ── FS Grid ─────────────────────────────────── */
.fs-grid {
    flex:1; display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);
    gap:clamp(8px,2vw,16px); 
    align-content:center;
    justify-items:center; 
    padding:6px 4px;
    width:100%;
  }
.fs-col { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }

/* HeadRush-style: rounded rectangle buttons, not circles */
.fs-btn {
    width:clamp(72px, 22vw, 110px); height:clamp(72px, 22vw, 110px);
  width:var(--fs-w); height:var(--fs-h);
  background:linear-gradient(180deg, #1e1e28 0%, #141418 100%);
  border:1px solid var(--border2);
  border-radius:10px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Exo 2', sans-serif;
  font-size:clamp(10px,1.6vw,13px); font-weight:600;
  color:var(--text-dim); letter-spacing:.04em;
  position:relative;
  transition:border-color .12s, box-shadow .12s, background .12s, transform .08s;
  box-shadow:0 2px 8px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
  touch-action:none; -webkit-tap-highlight-color:transparent; flex-shrink:0; overflow:hidden;
}
.fs-btn:active, .fs-btn.pressed {
  transform:scale(.95);
  box-shadow:0 1px 3px rgba(0,0,0,.8), inset 0 2px 8px rgba(0,0,0,.5);
}

/* Top LED strip — par */
.fs-btn.lit-top {
  border-color:var(--bank-color,var(--green));
  background:linear-gradient(180deg, #1e1e30 0%, #141418 100%);
  color:#e8e8f0;
  box-shadow:0 -3px 12px -2px var(--bank-color,var(--green)), 0 2px 8px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
}
.fs-btn.lit-top::after {
  content:''; position:absolute; top:0; left:8px; right:8px; height:2px;
  background:var(--bank-color,var(--green));
  border-radius:0 0 3px 3px;
  box-shadow:0 0 8px var(--bank-color,var(--green));
}
/* Bottom LED strip — ímpar */
.fs-btn.lit-bottom {
  border-color:var(--bank-color,var(--green));
  background:linear-gradient(180deg, #141418 0%, #1e1e30 100%);
  color:#e8e8f0;
  box-shadow:0 3px 12px -2px var(--bank-color,var(--green)), 0 2px 8px rgba(0,0,0,.6), inset 0 -1px 0 rgba(255,255,255,.04);
}
.fs-btn.lit-bottom::before {
  content:''; position:absolute; bottom:0; left:8px; right:8px; height:2px;
  background:var(--bank-color,var(--green));
  border-radius:3px 3px 0 0;
  box-shadow:0 0 8px var(--bank-color,var(--green));
  z-index:1;
}

.fs-btn.preselect-mode {
  border-color:var(--accent);
  animation:preselect-hr .5s ease-in-out infinite alternate;
}
@keyframes preselect-hr { from{opacity:.6;} to{opacity:1;} }

/* FS6 tap */
.fs-btn.tap-btn { border-color:var(--border); }
.fs-btn.tap-btn.tap-beat {
  background:linear-gradient(180deg, #0e1e2e 0%, #0a1420 100%);
  border-color:var(--tap-color); color:var(--tap-color);
  box-shadow:0 0 20px rgba(0,200,255,.5), 0 2px 8px rgba(0,0,0,.6), inset 0 1px 0 rgba(0,200,255,.1);
}
.fs-btn.tap-btn.tap-off {
  border-color:#1e1e28;
  background:linear-gradient(180deg, #111116 0%, #0d0d10 100%);
  color:#282838;
  box-shadow:0 2px 4px rgba(0,0,0,.8);
}
.fs-btn.tap-btn.delay-sync { --tap-color:#00e5ff; }
.fs-btn.tap-btn.rate-sync  { --tap-color:#b388ff; }

.fs-label {
  font-family:'Inter',sans-serif; font-size:clamp(7px,1vw,9px);
  color:var(--text-dim); letter-spacing:.04em; text-align:center;
  max-width:84px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  text-transform:uppercase;
}



/* ── Status bar ─────────────────────────────── */
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:5px 10px; background:#0a0a0e;
  border:1px solid var(--border); border-radius:8px; gap:6px;
}
.status-item { display:flex; align-items:center; gap:5px; font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); }
.midi-indicator { width:7px; height:7px; border-radius:50%; background:#333; transition:background .2s, box-shadow .2s; flex-shrink:0; }
.midi-indicator.sim       { background:#444455; }
.midi-indicator.connected { background:var(--green); box-shadow:0 0 6px var(--green); }
.midi-indicator.error     { background:var(--red); box-shadow:0 0 6px var(--red); }
.midi-indicator.activity  { background:var(--accent2); box-shadow:0 0 8px var(--accent2); }

.mode-badge {
  font-family:'Exo 2',sans-serif; font-size:9px; font-weight:600;
  padding:2px 8px; border-radius:4px; letter-spacing:.08em; text-transform:uppercase;
}
.mode-badge.normal     { background:rgba(124,106,255,.1); color:var(--accent); border:1px solid rgba(124,106,255,.25); }
.mode-badge.banksel    { background:rgba(0,200,255,.1); color:var(--accent2); border:1px solid rgba(0,200,255,.3); animation:preselect-hr .5s ease-in-out infinite alternate; }
.mode-badge.confirming { background:rgba(255,200,64,.1); color:var(--yellow); border:1px solid rgba(255,200,64,.3); animation:preselect-hr .45s ease-in-out infinite alternate; }

.confirm-ring { position:absolute; inset:-4px; border-radius:10px; border:2px solid rgba(124,106,255,.4); animation:confirmRing-hr .4s ease forwards; pointer-events:none; }
@keyframes confirmRing-hr { 0%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(1.08);} }

.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(14,14,22,.95); border:1px solid var(--accent);
  color:var(--accent); font-family:'Share Tech Mono',monospace; font-size:11px;
  padding:7px 18px; border-radius:6px; letter-spacing:.1em;
  opacity:0; transition:all .3s; pointer-events:none; z-index:100; white-space:nowrap;
  box-shadow:0 0 20px rgba(124,106,255,.2);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media(max-width:600px){ :root{--fs-w:60px;--fs-h:60px;} }
@media(max-width:400px){ :root{--fs-w:50px;--fs-h:50px;} }
@media(max-height:500px) and (orientation:landscape){ :root{--fs-w:56px;--fs-h:56px;} .chassis{padding:8px 12px;gap:8px;} }

  /* ── Barra MIDI externa (abaixo do chassis) ─── */
  .midi-bar {
    position:relative; z-index:2;
    width:min(98vw, 820px);
    margin-top:10px;
    background:#0a0a0e;
    border:1px solid #2a2a35;
    border-radius:10px;
    padding:8px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    box-shadow:0 4px 20px rgba(0,0,0,.6);
  }

  .midi-bar-dot {
    width:9px; height:9px; border-radius:50%;
    flex-shrink:0;
    background:#2a2a35;
    transition:background .3s, box-shadow .3s;
  }
  .midi-bar-dot.off        { background:#2a2a35; }
  .midi-bar-dot.aguardando { background:#555566; animation:pulse-wait .9s ease-in-out infinite alternate; }
  .midi-bar-dot.conectado  { background:#00ff66; box-shadow:0 0 8px #00ff66; }
  .midi-bar-dot.g1on       { background:#00ffcc; box-shadow:0 0 10px #00ffcc; animation:pulse-g1on 1.2s ease-in-out infinite alternate; }
  .midi-bar-dot.erro       { background:#ff2244; box-shadow:0 0 8px #ff2244; }
  @keyframes pulse-wait  { from{opacity:.3;} to{opacity:1;} }
  @keyframes pulse-g1on  { from{box-shadow:0 0 6px #00ffcc;} to{box-shadow:0 0 16px #00ffcc;} }

  .midi-bar-texto {
    font-family:'Share Tech Mono', monospace;
    font-size:11px;
    color:#666677;
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:.04em;
  }
  .midi-bar-texto strong { color:#aaaacc; }
  .midi-bar-texto.g1on   { color:#00ffcc; }
  .midi-bar-texto.erro   { color:#ff4455; }

  .midi-bar-btn {
    font-family:'Share Tech Mono', monospace;
    font-size:10px;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding:5px 14px;
    border-radius:6px;
    border:1px solid #333344;
    background:#111118;
    color:#888899;
    cursor:pointer;
    flex-shrink:0;
    transition:all .2s;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  }
  .midi-bar-btn:hover   { border-color:#555566; color:#aaaacc; }
  .midi-bar-btn.loading { border-color:#ffaa00; color:#ffaa00; animation:pulse-wait .6s ease-in-out infinite alternate; }
  .midi-bar-btn.ok      { border-color:#00ff6633; color:#00ff66; pointer-events:none; }
  .midi-bar-btn.g1on    { border-color:#00ffcc55; color:#00ffcc; pointer-events:none; }

</style>
</head>
<body>
<div class="chassis">
  <div class="top-bar">
    <div class="logo">FMC·AM<span class="logo-sub">6F</span></div>
    <div class="display" id="mainDisplay">
      <div class="display-main">
        <div class="patch-id" id="patchId">A0</div>
        <div class="patch-name" id="patchName">CLEAN BOOST</div>
        <div class="fx-indicators" id="fxIndicators"></div>
      </div>
      <div class="bpm-display">
        <span class="bpm-val" id="bpmVal">120</span>
        <span>BPM</span>
      </div>
    </div>
  </div>
  <div class="middle">
    <div class="fs-grid" id="fsGrid"></div>
  </div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-item">
      <div class="midi-indicator sim" id="midiIndicator"></div>
      <span id="midiPortLabel">SIM</span>
    </div>
    <div class="mode-badge normal" id="modeBadge">EXECUÇÃO</div>
    <div class="status-item">
      <div class="midi-indicator connected"></div>
      <span id="memStatus">MEM OK</span>
    </div>
  </div>

<!-- Barra de status MIDI — fora do chassis -->
<div class="midi-bar" id="midiBar">
  <div class="midi-bar-dot off" id="midiBarDot"></div>
  <div class="midi-bar-texto" id="midiBarTexto">MIDI não iniciado</div>
  <button class="midi-bar-btn" id="midiBarBtn" onclick="conectarMIDI()">CONECTAR MIDI</button>
</div>

</div>
<div class="toast" id="toast"></div>
<script>
'use strict';
// ═══════════════════════════════════════════
// FMC-AM 6F · TEMA HEADRUSH PEDALBOARD
// Motor v4 completo — apenas visual muda
// ═══════════════════════════════════════════
const DEBOUNCE_MS=30,HOLD_MS=900,TAP_AVG_N=4,TAP_TIMEOUT=2000,BPM_MIN=30,BPM_MAX=240,SYSEX_IDLE_MS=600,SYSEX_DELAY=40,PC_TO_DUMP_MS=400,MEM_CHECK_MS=5000,MIDI_CH=0;
const ZOOM_MFR_ID=0x52,ZOOM_DEV_ID=0x00,ZOOM_MODEL_ID=0x5E,ZOOM_CMD_DUMP_REQ=0x29,ZOOM_CMD_DUMP_RESP=0x28;
const BANKS_ALL=['A','B','C','D','E','F','G','H','I','J'];
const BANK_COLOR={A:'#00e87a',B:'#ffaa00',C:'#ff3355',D:'#00c8ff',E:'#ffffff',F:'#00e87a',G:'#ffaa00',H:'#ff3355',I:'#00c8ff',J:'#ffffff'};
const PATCH_NAMES={A:['CLEAN BOOST','TUBE DRIVE','OCTO VERB','SHIMMER PAD','TAPE ECHO','HEAVY GATE','DUAL CHORUS','POLY DETUNE','PITCH SHIFT','DIRT BOX'],B:['BLUES JR','TWEED 4X10','AC SPANK','VOX CLEAN','BRIT CRUNCH','PLEXI ROAR','MESA TIGHT','SOLDANO HI','FRIEDMAN BE','BOGNER ECST'],C:['SMALL ROOM','LARGE HALL','PLATE VERB','SPRING TANK','SHIMMER 1','SHIMMER 2','CAVE ECHO','MOD DELAY','TAPE SLAP','PING PONG'],D:['WAH CRYBABY','OCTAVE FUZ','RING MOD','TREMOLO','VIBRATO','PHASER 4ST','FLANGER JET','CHORUS 2V','ROTARY','UNIVIBE'],E:['LOOPER 1','LOOPER 2','PHRASE 1','PHRASE 2','MIDI CLK','SYNC BEAT','POLY LOOP','HALF SPEED','REVERSE','REBUILD']};
for(const b of ['F','G','H','I','J']) PATCH_NAMES[b]=PATCH_NAMES[BANKS_ALL[BANKS_ALL.indexOf(b)-5]].map(n=>n+' II');
const ZOOM_FX_DB={0x0001:{name:'Comp',cat:'dynamics',tap:null},0x0002:{name:'RackComp',cat:'dynamics',tap:null},0x0003:{name:'SlowATTCK',cat:'dynamics',tap:null},0x0004:{name:'ZNR',cat:'dynamics',tap:null},0x0005:{name:'NoiseGate',cat:'dynamics',tap:null},0x0008:{name:'GraphicEQ',cat:'filter',tap:null},0x0009:{name:'ParaEQ',cat:'filter',tap:null},0x000A:{name:'AutoWah',cat:'filter',tap:'Rate'},0x000B:{name:'Resonance',cat:'filter',tap:null},0x000C:{name:'Cry',cat:'filter',tap:null},0x0010:{name:'OverDrive',cat:'drive',tap:null},0x0011:{name:'Distortion',cat:'drive',tap:null},0x0012:{name:'TS Drive',cat:'drive',tap:null},0x0013:{name:'Guvnor',cat:'drive',tap:null},0x0014:{name:'MetalWRLD',cat:'drive',tap:null},0x0015:{name:'FuzzSmile',cat:'drive',tap:null},0x0016:{name:'GreatMuff',cat:'drive',tap:null},0x0020:{name:'FD Combo',cat:'amp',tap:null},0x0021:{name:'VX Combo',cat:'amp',tap:null},0x0022:{name:'US Blues',cat:'amp',tap:null},0x0023:{name:'BG Crunch',cat:'amp',tap:null},0x0024:{name:'HW Stack',cat:'amp',tap:null},0x0025:{name:'MS Crunch',cat:'amp',tap:null},0x0026:{name:'Rectifier',cat:'amp',tap:null},0x0030:{name:'Chorus',cat:'mod',tap:'Rate'},0x0031:{name:'StereoChorus',cat:'mod',tap:'Rate'},0x0032:{name:'SuperChorus',cat:'mod',tap:'Rate'},0x0033:{name:'Flanger',cat:'mod',tap:'Rate'},0x0034:{name:'Vibrato',cat:'mod',tap:'Rate'},0x0035:{name:'Phaser',cat:'mod',tap:'Rate'},0x0036:{name:'Step',cat:'mod',tap:'Rate'},0x0037:{name:'Tremolo',cat:'mod',tap:'Rate'},0x0038:{name:'AutoPan',cat:'mod',tap:'Rate'},0x0039:{name:'RingMod',cat:'mod',tap:'Rate'},0x003A:{name:'Detune',cat:'mod',tap:null},0x003B:{name:'PitchShift',cat:'mod',tap:null},0x0040:{name:'MonoPitch',cat:'pitch',tap:null},0x0041:{name:'HPS',cat:'pitch',tap:null},0x0042:{name:'Octave',cat:'pitch',tap:null},0x0050:{name:'Delay',cat:'delay',tap:'Time'},0x0051:{name:'AnalogDelay',cat:'delay',tap:'Time'},0x0052:{name:'TapeEcho',cat:'delay',tap:'Time'},0x0053:{name:'ModDelay',cat:'delay',tap:'Time'},0x0054:{name:'FilterDelay',cat:'delay',tap:'Time'},0x0055:{name:'PingPongDly',cat:'delay',tap:'Time'},0x0056:{name:'ReverseDelay',cat:'delay',tap:'Time'},0x0060:{name:'Hall',cat:'reverb',tap:null},0x0061:{name:'Room',cat:'reverb',tap:null},0x0062:{name:'Spring',cat:'reverb',tap:null},0x0063:{name:'Arena',cat:'reverb',tap:null},0x0064:{name:'EarlyRef',cat:'reverb',tap:null},0x0070:{name:'Air',cat:'ambience',tap:null}};
const FX_PRECISA_TIME=new Set(['delay']),FX_PRECISA_RATE=new Set(['mod','filter']);
function criarEstadoPadrao(){return{bank:'A',patch:0,bpm:120,bankGroup:0};}
let cam0=criarEstadoPadrao();
function salvarCamada(n,d){try{localStorage.setItem(`fmc_cam${n}`,JSON.stringify(d));}catch(e){}}
function lerCamada(n){try{const s=localStorage.getItem(`fmc_cam${n}`);return s?JSON.parse(s):null;}catch(e){return null;}}
function gravarEstado(){const snap={bank:cam0.bank,patch:cam0.patch,bpm:cam0.bpm,bankGroup:cam0.bankGroup};salvarCamada(1,snap);salvarCamada(2,snap);salvarCamada(3,snap);}
function carregarEstado(){for(let n=1;n<=3;n++){const d=lerCamada(n);if(d&&d.bank&&BANKS_ALL.includes(d.bank)){cam0={...criarEstadoPadrao(),...d};logMIDI({type:'sx',label:`MEM CAM${n}`});return;}}cam0=criarEstadoPadrao();}
setInterval(()=>{const c1=lerCamada(1);if(!c1){gravarEstado();return;}const div=c1.bank!==cam0.bank||c1.patch!==cam0.patch||c1.bpm!==cam0.bpm||c1.bankGroup!==cam0.bankGroup;if(div){gravarEstado();const el=document.getElementById('memStatus');if(el){el.textContent='SYNC!';setTimeout(()=>el.textContent='MEM OK',800);}}},MEM_CHECK_MS);
let patchAtual={nome:null,efeitos:[],temTime:false,temRate:false,precisaSincBpm:false,efeitosTime:[],efeitosRate:[]};
function parseZoomDump(data){if(!data||data.length<10)return null;if(data[0]!==0xF0||data[1]!==ZOOM_MFR_ID||data[4]!==ZOOM_CMD_DUMP_RESP)return null;const info={nome:'',efeitos:[]};for(let i=0;i<5;i++){const offset=9+(i*20);if(offset+2>=data.length)break;const effectID=(data[offset]<<7)|data[offset+1];const enabled=(data[offset+2]&0x01)===1;const fxInfo=ZOOM_FX_DB[effectID]||{name:`FX_${effectID.toString(16).toUpperCase()}`,cat:'unknown',tap:null};info.efeitos.push({slot:i+1,id:effectID,nome:fxInfo.name,cat:fxInfo.cat,tap:fxInfo.tap,enabled});}if(data.length>124){const nb=Array.from(data.slice(114,124));info.nome=nb.filter(b=>b>=0x20&&b<0x7F).map(b=>String.fromCharCode(b)).join('').trim();}return info;}
function aplicarDump(info){if(!info)return;patchAtual.nome=info.nome||null;patchAtual.efeitos=info.efeitos;patchAtual.efeitosTime=info.efeitos.filter(e=>e.enabled&&e.tap==='Time');patchAtual.efeitosRate=info.efeitos.filter(e=>e.enabled&&e.tap==='Rate');patchAtual.temTime=patchAtual.efeitosTime.length>0;patchAtual.temRate=patchAtual.efeitosRate.length>0;patchAtual.precisaSincBpm=patchAtual.temTime||patchAtual.temRate;atualizarFxIndicators();const tapBtn=fsEls[5];tapBtn.classList.toggle('delay-sync',patchAtual.temTime);tapBtn.classList.toggle('rate-sync',!patchAtual.temTime&&patchAtual.temRate);if(patchAtual.nome)document.getElementById('patchName').textContent=patchAtual.nome;const slotAtivos=info.efeitos.filter(e=>e.enabled).length;(document.getElementById('dumpStatus')||{}).textContent =`${slotAtivos}/5`+(patchAtual.temTime?' ♩TIME':'')+(patchAtual.temRate?' ∿RATE':'');logMIDI({type:'rx',label:`DUMP:"${info.nome||'?'}" ${slotAtivos}fx`});}
function atualizarFxIndicators(){const $ind=document.getElementById('fxIndicators');$ind.innerHTML='';for(const fx of patchAtual.efeitos){const tag=document.createElement('span');tag.className=`fx-tag ${fx.cat}${fx.enabled?'':' off'}`;tag.textContent=fx.nome.substring(0,7);$ind.appendChild(tag);}}


function onMidiStateChange(e){const p=e.port;if(p.type==='output'){if(p.state==='connected'&&!midiOut){midiOut=p;setMidiStatus(truncar(p.name),'connected');}if(p.state==='disconnected'&&midiOut?.id===p.id){midiOut=null;setMidiStatus('DESC.','error');autoSelecionarPorta();}}if(p.type==='input'&&p.state==='connected')p.onmidimessage=onMensagemMIDI;}
function onMensagemMIDI(event){const d=event.data;if(!d||d.length<5)return;piscarIndicador();if(d[0]===0xF0&&d[1]===ZOOM_MFR_ID&&d[4]===ZOOM_CMD_DUMP_RESP){logMIDI({type:'rx',label:`RX 0x28 (${d.length}b)`});aplicarDump(parseZoomDump(d));}}
function enviarMIDI(bytes,tipo,label){logMIDI({type:tipo||'sx',label});if(!midiOut||!midiReady)return;try{midiOut.send(bytes);}catch(e){logMIDI({type:'err',label:`TX ERR:${e.message}`});}}
function limparPatchAtual(){patchAtual.nome=null;patchAtual.efeitos=[];patchAtual.temTime=false;patchAtual.temRate=false;patchAtual.precisaSincBpm=false;patchAtual.efeitosTime=[];patchAtual.efeitosRate=[];(document.getElementById('fxIndicators')||{}).innerHTML ='';(document.getElementById('dumpStatus')||{}).textContent ='…';fsEls[5].classList.remove('delay-sync','rate-sync');}
function enviarProgramChange(pc){enviarMIDI([0xC0|MIDI_CH,pc],'pc',`PC ${pc} [${cam0.bank}${cam0.patch+1}]`);limparPatchAtual();if(dumpTimer)clearTimeout(dumpTimer);dumpTimer=setTimeout(requisitarDump,PC_TO_DUMP_MS);}
function requisitarDump(){enviarMIDI([0xF0,ZOOM_MFR_ID,ZOOM_DEV_ID,ZOOM_MODEL_ID,ZOOM_CMD_DUMP_REQ,0xF7],'sx','TX 0x29 DUMP REQ');}
let sysexIdleTimer=null;
function enviarSysExTapTempo(bpm){if(sysexIdleTimer)clearTimeout(sysexIdleTimer);sysexIdleTimer=setTimeout(()=>{enviarMIDI([0xB0|MIDI_CH,64,Math.min(127,Math.round(bpm))],'cc',`CC64 BPM→${bpm}`);if(!patchAtual.precisaSincBpm){logMIDI({type:'sx',label:'SX: sem efeito tempo'});return;}if(patchAtual.temTime){const ms=Math.round(60000/bpm);const lsb=ms&0x7F;const msb=(ms>>7)&0x7F;enviarMIDI([0xF0,ZOOM_MFR_ID,ZOOM_DEV_ID,ZOOM_MODEL_ID,0x31,msb,lsb,0xF7],'sx',`SX TIME:${ms}ms [${patchAtual.efeitosTime.map(e=>e.nome).join('+')}]`);}if(patchAtual.temRate){const hz=bpm/60;const valor=Math.min(127,Math.max(0,Math.round(hz*127/10)));enviarMIDI([0xB0|MIDI_CH,3,valor],'cc',`CC03 RATE:${hz.toFixed(2)}Hz [${patchAtual.efeitosRate.map(e=>e.nome).join('+')}]`);}},SYSEX_IDLE_MS);}
let midiBuffer=[],midiFlushTimer=null;
function enqueueMIDI(msg){midiBuffer.push(msg);if(!midiFlushTimer)midiFlushTimer=setTimeout(()=>{midiFlushTimer=null;while(midiBuffer.length)logMIDI(midiBuffer.shift());},0);}

function truncar(s){return s&&s.length>14?s.substring(0,12)+'…':s;}
let tapTimes=[],tapTimer=null,tapLedTimer=null,tapBeatTimer=null;
function registrarTap(){const now=performance.now();if(tapTimer)clearTimeout(tapTimer);tapTimer=setTimeout(resetarTap,TAP_TIMEOUT);if(tapTimes.length>0&&(now-tapTimes[tapTimes.length-1])<TAP_TIMEOUT){tapTimes.push(now);if(tapTimes.length>TAP_AVG_N+1)tapTimes.shift();if(tapTimes.length>=2){const intervals=[];for(let i=1;i<tapTimes.length;i++)intervals.push(tapTimes[i]-tapTimes[i-1]);const avg=intervals.reduce((a,b)=>a+b,0)/intervals.length;cam0.bpm=Math.min(BPM_MAX,Math.max(BPM_MIN,Math.round(60000/avg)));iniciarPiscarBeat(Math.round(60000/cam0.bpm));enviarSysExTapTempo(cam0.bpm);renderizar();}}else{tapTimes=[now];}piscarBeatManual();}

function iniciarPiscarBeat(intervalMs){if(tapBeatTimer)clearInterval(tapBeatTimer);const onMs=Math.min(80,intervalMs*0.15);tapBeatTimer=setInterval(()=>{if(bankSelect)return;const btn=fsEls[5];btn.classList.add('tap-beat');btn.classList.remove('tap-off');setTimeout(()=>{btn.classList.remove('tap-beat');btn.classList.add('tap-off');},onMs);},intervalMs);}

'preselect-mode');btn.style.borderColor='';btn.style.boxShadow='';btn.style.color='';btn.classList.toggle('lit-top',isTop);btn.classList.toggle('lit-bottom',isBot);btn.childNodes[0].textContent=`FS${i+1}`;if(bankInView){const next=(lastFsIdx===i&&fsToggle)?base+1:base;const show=isAny?cam0.patch:next;labelEls[i].textContent=(PATCH_NAMES[cam0.bank]?.[show]||`P${show+1}`).substring(0,9);}else{labelEls[i].textContent='· · ·';}}labelEls[5].textContent='TAP · HOLD';$modeBadge.className='mode-badge normal';$modeBadge.textContent='PERFORM';}}
const fsGrid=document.getElementById('fsGrid');const fsEls=[],labelEls=[];
for(let i=0;i<6;i++){const col=document.createElement('div');col.className='fs-col';const btn=document.createElement('div');btn.className='fs-btn';btn.setAttribute('role','button');btn.setAttribute('tabindex','0');btn.appendChild(document.createTextNode(i<5?`FS${i+1}`:'FS6'));if(i===5){const s=document.createElement('span');s.style.cssText='font-size:7px;opacity:.55;display:block;margin-top:2px;font-family:Share Tech Mono,monospace;';s.textContent='TAP';btn.appendChild(s);btn.classList.add('tap-btn');}const lbl=document.createElement('div');lbl.className='fs-label';col.appendChild(btn);col.appendChild(lbl);fsGrid.appendChild(col);fsEls.push(btn);labelEls.push(lbl);}
let bankSelect=false,preselectBank=null,preselectGrp=0,lastFsIdx=null,fsToggle=false;
const debounceTimers={},holdTimers={},pressTimes={};
function attachFS(idx,el){function onPress(){if(debounceTimers[idx])return;debounceTimers[idx]=setTimeout(()=>{debounceTimers[idx]=null;},DEBOUNCE_MS);el.classList.add('pressed');pressTimes[idx]=Date.now();if(idx===5)holdTimers[idx]=setTimeout(onFS6Hold,HOLD_MS);}function onRelease(){el.classList.remove('pressed');const held=Date.now()-(pressTimes[idx]||0);if(idx===5){clearTimeout(holdTimers[idx]);if(held<HOLD_MS)onFS6Tap();}else{onFSPatch(idx);}}el.addEventListener('mousedown',e=>{e.preventDefault();onPress();});el.addEventListener('mouseup',e=>{e.preventDefault();onRelease();});el.addEventListener('mouseleave',()=>{el.classList.remove('pressed');clearTimeout(holdTimers[idx]);});el.addEventListener('touchstart',e=>{e.preventDefault();onPress();},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();onRelease();},{passive:false});el.addEventListener('touchcancel',()=>{el.classList.remove('pressed');clearTimeout(holdTimers[idx]);});}
fsEls.forEach((el,i)=>attachFS(i,el));
function onFSPatch(idx){if(bankSelect&&preselectBank){const patchIdx=idx*2+(fsToggle?1:0);cam0.bank=preselectBank;cam0.patch=patchIdx;cam0.bankGroup=preselectGrp;bankSelect=false;preselectBank=null;lastFsIdx=idx;limparPatchAtual();const pc=BANKS_ALL.indexOf(cam0.bank)*10+patchIdx;enviarProgramChange(pc);flashConfirmRing(fsEls[idx]);showToast(`${cam0.bank}${patchIdx+1} — ${PATCH_NAMES[cam0.bank]?.[patchIdx]||''}`);gravarEstado();renderizar();return;}if(bankSelect){const grp=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);const escolhido=grp[idx];if(!escolhido)return;preselectBank=escolhido;fsToggle=false;showToast(`BANK ${escolhido} · CONFIRM WITH FS1–5`);renderizar();return;}const visGroup=BANKS_ALL.slice(cam0.bankGroup*5,cam0.bankGroup*5+5);if(!visGroup.includes(cam0.bank))return;const base=idx*2;if(lastFsIdx!==idx){lastFsIdx=idx;fsToggle=(cam0.patch===base)?true:false;}else{fsToggle=!fsToggle;}cam0.patch=base+(fsToggle?1:0);limparPatchAtual();const pc=BANKS_ALL.indexOf(cam0.bank)*10+cam0.patch;enviarProgramChange(pc);flashConfirmRing(fsEls[idx]);gravarEstado();renderizar();}
function onFS6Tap(){if(bankSelect){if(preselectBank){fsToggle=!fsToggle;showToast(`${preselectBank} · LAYER ${fsToggle?'ODD':'EVEN'}`);}else{preselectGrp=preselectGrp===0?1:0;const g=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);showToast(`GROUP ${g[0]}–${g[4]}`);}renderizar();return;}registrarTap();}
function onFS6Hold(){if(bankSelect){bankSelect=false;preselectBank=null;showToast('BANK SELECT CANCELLED');}else{bankSelect=true;preselectBank=null;preselectGrp=cam0.bankGroup;fsToggle=false;const g=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);showToast(`BANK SELECT · ${g[0]}–${g[4]}`);}renderizar();}

// ══════════════════════════════════════════════════════════════════
// MIDI — Conexão com gesto do usuário + detecção da G1On
// ══════════════════════════════════════════════════════════════════
let midiAccess = null;
let midiOut    = null;
let midiReady  = false;
let g1onDetectada = false;

// Palavras-chave para detectar a G1On pelo nome da porta
const ZOOM_PORT_KEYWORDS = ['zoom', 'g1on', 'g1xon', 'g1', 'g-1'];

function nomeContemZoom(nome){
  const lower = (nome||'').toLowerCase();
  return ZOOM_PORT_KEYWORDS.some(k => lower.includes(k));
}

function atualizarBarraMIDI(estado, texto){
  const dot = document.getElementById('midiBarDot');
  const txt = document.getElementById('midiBarTexto');
  const btn = document.getElementById('midiBarBtn');
  if(!dot||!txt) return;

  // Remove todas as classes de estado
  dot.className = 'midi-bar-dot ' + estado;
  txt.className = 'midi-bar-texto' + (estado==='g1on'?' g1on':estado==='erro'?' erro':'');
  txt.innerHTML = texto;

  if(btn){
    if(estado==='g1on' || estado==='conectado'){
      btn.textContent = 'CONECTADO ✓';
      btn.className = 'midi-bar-btn ' + (estado==='g1on'?'g1on':'ok');
    } else if(estado==='aguardando'){
      btn.textContent = 'AGUARDANDO…';
      btn.className = 'midi-bar-btn loading';
    } else if(estado==='erro'){
      btn.textContent = 'TENTAR NOVAMENTE';
      btn.className = 'midi-bar-btn';
    } else {
      btn.textContent = 'CONECTAR MIDI';
      btn.className = 'midi-bar-btn';
    }
  }
}

async function conectarMIDI(){
  if(!navigator.requestMIDIAccess){
    atualizarBarraMIDI('erro', 'Web MIDI API não suportada neste browser. Use Chrome.');
    return;
  }

  atualizarBarraMIDI('aguardando', 'Solicitando permissão MIDI…');

  // Tenta com sysex primeiro; fallback sem sysex
  let acesso = null;
  try {
    acesso = await navigator.requestMIDIAccess({ sysex: true });
  } catch(e1) {
    try {
      acesso = await navigator.requestMIDIAccess({ sysex: false });
      atualizarBarraMIDI('aguardando', 'Conectado sem SysEx (permissão limitada)');
    } catch(e2) {
      atualizarBarraMIDI('erro', 'Permissão negada. Verifique as permissões do browser.');
      return;
    }
  }

  midiAccess = acesso;
  midiReady  = true;
  midiAccess.onstatechange = onMidiStateChange;

  // Conecta entradas para receber mensagens
  for(const input of midiAccess.inputs.values()){
    input.onmidimessage = onMensagemMIDI;
  }

  verificarPortas();
}

function verificarPortas(){
  if(!midiAccess) return;

  const outputs = [...midiAccess.outputs.values()];
  const inputs  = [...midiAccess.inputs.values()];

  if(outputs.length === 0){
    atualizarBarraMIDI('aguardando', 'Nenhum dispositivo MIDI encontrado. Conecte a pedaleira e tente novamente.');
    midiOut = null;
    return;
  }

  // Procura especificamente pela G1On
  const zoomOut = outputs.find(o => nomeContemZoom(o.name));
  const zoomIn  = inputs.find(i  => nomeContemZoom(i.name));

  if(zoomOut){
    midiOut = zoomOut;
    g1onDetectada = true;
    atualizarBarraMIDI('g1on',
      `<strong>Zoom G1On detectada</strong> · ${zoomOut.name} · Pronta para envio`
    );
    // Requisita dump imediato ao conectar
    setTimeout(requisitarDump, 500);
  } else {
    // Usa primeira porta disponível
    midiOut = outputs[0];
    g1onDetectada = false;
    atualizarBarraMIDI('conectado',
      `<strong>${outputs.length} porta(s) MIDI</strong> · ${midiOut.name} · G1On não identificada`
    );
  }
}

function onMidiStateChange(e){
  const p = e.port;
  if(p.type === 'output'){
    if(p.state === 'connected'){
      if(!midiOut || nomeContemZoom(p.name)){
        midiOut = p;
      }
    }
    if(p.state === 'disconnected' && midiOut?.id === p.id){
      midiOut = null;
      g1onDetectada = false;
    }
    verificarPortas();
  }
  if(p.type === 'input' && p.state === 'connected'){
    p.onmidimessage = onMensagemMIDI;
  }
}

function iniciarMIDI(){
  // Não conecta automaticamente — aguarda gesto do usuário
  atualizarBarraMIDI('off', 'Toque em <strong>CONECTAR MIDI</strong> para iniciar');
}
