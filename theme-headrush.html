<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>HeadRush Prime · FMC-AM 6F</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   HeadRush Prime · FMC-AM 6F · v5.1-b20260317
   ═══════════════════════════════════════════════════════════════════ */
:root{
  --bg:#08080b;
  --border:#252530;
  --border2:#333342;
  --accent:#6c55f0;
  --accent-dim:rgba(108,85,240,.2);
  --cyan:#00b8e6;
  --cyan-dim:rgba(0,184,230,.18);
  --green:#00e87a;
  --red:#e83258;
  --yellow:#ffcc30;
  --orange:#ff7020;
  --text:#eaeaf4;
  --text-dim:#60607a;
  --text-mid:#9090b8;
  --oled-bg:#050509;
  --oled-border:#151520;
  --fs-h:82px;
  --fs-radius:8px;
  --display-bg:#05050a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:'Barlow',sans-serif;overflow:hidden;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}

body::before{content:'';position:fixed;inset:0;
  background-image:
    repeating-linear-gradient(45deg,rgba(255,255,255,.006) 0,rgba(255,255,255,.006) 1px,transparent 1px,transparent 9px),
    repeating-linear-gradient(-45deg,rgba(255,255,255,.006) 0,rgba(255,255,255,.006) 1px,transparent 1px,transparent 9px);
  pointer-events:none;z-index:0;}

/* ── Chassis ──────────────────────────────────────────────── */
.chassis{
  position:relative;z-index:1;
  width:min(99vw,960px);
  background:linear-gradient(180deg,#1e1e26 0%,#111115 20%,#0d0d11 100%);
  border:1px solid var(--border2);border-radius:16px;
  padding:14px 16px 12px;
  box-shadow:0 0 0 1px #07070a,0 0 100px rgba(108,85,240,.06),0 40px 100px rgba(0,0,0,.97),
    inset 0 1px 0 rgba(255,255,255,.05),inset 0 -1px 0 rgba(0,0,0,.5);
  display:flex;flex-direction:column;gap:10px;overflow:hidden;}
.chassis::before{content:'';position:absolute;top:0;left:100px;right:100px;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent) 25%,var(--cyan) 75%,transparent);
  opacity:.55;pointer-events:none;z-index:2;}
.chassis::after{content:'';position:absolute;inset:0;border-radius:16px;
  background:repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(255,255,255,.003) 5px,rgba(255,255,255,.003) 6px);
  pointer-events:none;z-index:0;}

.bolt{position:absolute;width:13px;height:13px;border-radius:50%;z-index:3;
  background:radial-gradient(circle at 38% 32%,#2a2a38,#0e0e14);
  border:1px solid #202030;box-shadow:inset 0 1px 3px rgba(0,0,0,.8),0 1px 0 rgba(255,255,255,.04);}
.bolt::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(45deg);
  width:55%;height:1.5px;background:rgba(255,255,255,.12);}
.bolt.tl{top:7px;left:7px;}.bolt.tr{top:7px;right:7px;}
.bolt.bl{bottom:7px;left:7px;}.bolt.br{bottom:7px;right:7px;}

/* ── Top bar ──────────────────────────────────────────────── */
.top-bar{position:relative;z-index:1;display:flex;align-items:center;gap:14px;padding:0 4px;}

.logo-wrap{display:flex;flex-direction:column;gap:0;flex-shrink:0;}
.logo-main{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(18px,2.5vw,26px);
  letter-spacing:.18em;text-transform:uppercase;color:#fff;line-height:1;white-space:nowrap;}
.logo-main em{color:var(--accent);font-style:normal;}
.logo-sub{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:clamp(8px,1vw,10px);
  letter-spacing:.3em;color:var(--text-dim);text-transform:uppercase;line-height:1;margin-top:1px;}

.header-chips{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap;}
.mode-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.16em;padding:3px 10px;border-radius:4px;text-transform:uppercase;flex-shrink:0;transition:all .2s;}
.mode-badge.normal    {background:#12121a;border:1px solid #222232;color:var(--text-dim);}
.mode-badge.banksel   {background:#1a1208;border:1px solid var(--orange);color:var(--orange);box-shadow:0 0 8px rgba(255,112,32,.15);}
.mode-badge.confirming{background:#10101c;border:1px solid var(--accent);color:var(--accent);animation:mode-pulse .6s ease-in-out infinite alternate;}
.mode-badge.tuner     {background:#060e16;border:1px solid var(--cyan);color:var(--cyan);box-shadow:0 0 8px var(--cyan-dim);}
@keyframes mode-pulse{from{box-shadow:0 0 4px rgba(108,85,240,.15);}to{box-shadow:0 0 14px rgba(108,85,240,.45);}}

.boost-btn{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 10px;border-radius:4px;border:1px solid #222232;background:#0c0c14;color:var(--text-dim);
  cursor:pointer;flex-shrink:0;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.boost-btn:hover{border-color:var(--yellow);color:var(--yellow);}
.boost-btn.boost-on{border-color:var(--yellow);color:var(--yellow);background:rgba(255,204,48,.07);
  box-shadow:0 0 10px rgba(255,204,48,.2);animation:boost-pulse .6s ease-in-out infinite alternate;}
@keyframes boost-pulse{from{box-shadow:0 0 4px rgba(255,204,48,.15);}to{box-shadow:0 0 14px rgba(255,204,48,.45);}}

.cal-btn{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 10px;border-radius:4px;border:1px solid #222232;background:#0c0c14;color:var(--text-dim);
  cursor:pointer;flex-shrink:0;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.cal-btn:hover{border-color:#00ffcc;color:#00ffcc;}
.cal-btn.cal-on{border-color:#00ffcc;color:#00ffcc;background:rgba(0,255,204,.06);
  box-shadow:0 0 8px rgba(0,255,204,.22);animation:cal-pulse .8s ease-in-out infinite alternate;}
@keyframes cal-pulse{from{box-shadow:0 0 4px rgba(0,255,204,.15);}to{box-shadow:0 0 14px rgba(0,255,204,.45);}}

.build-badge{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.1em;
  color:var(--text-dim);border:1px solid #1c1c2a;border-radius:3px;padding:1px 6px;background:#08080e;flex-shrink:0;}
.flash-health{font-family:'Share Tech Mono',monospace;font-size:8px;color:#1e1e2a;
  letter-spacing:.06em;cursor:pointer;transition:color .3s;white-space:nowrap;}
.flash-health:hover{color:var(--text-dim);}
.cache-btn{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.08em;cursor:pointer;
  padding:1px 5px;border:1px solid rgba(108,85,240,.2);border-radius:3px;
  color:rgba(108,85,240,.5);transition:all .2s;flex-shrink:0;}
.cache-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── Main display ─────────────────────────────────────────── */
.main-display{
  position:relative;z-index:1;
  background:var(--display-bg);
  border:1px solid #1a1a2a;border-radius:12px;
  overflow:hidden;
  box-shadow:inset 0 0 60px rgba(0,0,0,.8),0 0 0 1px #06060c,0 0 40px rgba(108,85,240,.04);}
.main-display::before{content:'';position:absolute;inset:0;z-index:20;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.055) 2px,rgba(0,0,0,.055) 3px);}
.main-display::after{content:'';position:absolute;inset:0;z-index:19;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 60%,rgba(0,0,0,.4) 100%);}

/* Patch info strip */
.patch-strip{
  position:relative;z-index:11;display:flex;align-items:center;gap:14px;
  padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.04);}
.patch-strip::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;
  background:var(--bank-color,var(--accent));border-radius:0 3px 3px 0;
  box-shadow:0 0 12px var(--bank-color,var(--accent));transition:background .25s,box-shadow .25s;}

.vol-display{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.2vw,11px);
  color:var(--text-dim);white-space:nowrap;border-right:1px solid var(--border);
  padding-right:14px;line-height:1.5;text-align:center;flex-shrink:0;transition:color .3s;}
.vol-val{font-family:'Barlow Condensed',sans-serif;font-size:clamp(22px,3vw,32px);font-weight:700;display:block;}

.patch-info{flex:1;min-width:0;padding-left:12px;}
.patch-id{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:900;
  color:var(--bank-color,#fff);
  text-shadow:0 0 20px var(--bank-color,transparent),0 0 60px var(--bank-color,transparent);
  letter-spacing:.08em;line-height:1;transition:color .2s,text-shadow .2s;}
.patch-id.blink{animation:blink-hr .38s linear infinite;}
@keyframes blink-hr{50%{opacity:.04;}}
.patch-name{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.3vw,11px);
  color:var(--text-dim);letter-spacing:.07em;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;}
.fx-indicators{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.fx-tag{font-family:'Share Tech Mono',monospace;font-size:8px;
  padding:1px 6px;border-radius:2px;border:1px solid;letter-spacing:.07em;transition:all .2s;}
.fx-tag.delay   {color:#00e5ff;border-color:#00e5ff44;background:rgba(0,229,255,.07);}
.fx-tag.mod     {color:#b388ff;border-color:#b388ff44;background:rgba(179,136,255,.07);}
.fx-tag.reverb  {color:#6eb5ff;border-color:#6eb5ff44;background:rgba(110,181,255,.07);}
.fx-tag.drive   {color:#ff7a50;border-color:#ff7a5044;background:rgba(255,122,80,.07);}
.fx-tag.dynamics{color:#ffd740;border-color:#ffd74044;background:rgba(255,215,64,.07);}
.fx-tag.filter  {color:#ff9e30;border-color:#ff9e3044;background:rgba(255,158,48,.07);}
.fx-tag.amp     {color:#ff6688;border-color:#ff668844;background:rgba(255,102,136,.07);}
.fx-tag.pitch   {color:#80ffea;border-color:#80ffea44;background:rgba(128,255,234,.07);}
.fx-tag.special {color:#cc55ff;border-color:#cc55ff44;background:rgba(204,85,255,.07);}
.fx-tag.unknown {color:#888;border-color:#44444488;background:rgba(80,80,80,.07);}
.fx-tag.off     {opacity:.2;filter:grayscale(1);}

.bpm-display{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.2vw,11px);
  color:var(--cyan);white-space:nowrap;border-left:1px solid var(--border);
  padding-left:14px;line-height:1.5;text-align:center;flex-shrink:0;}
.bpm-val{font-family:'Barlow Condensed',sans-serif;font-size:clamp(22px,3vw,32px);font-weight:700;display:block;}

/* ── ToneWebLib ────────────────────────────────────────────── */
.toneweblib{
  position:relative;z-index:11;
  padding:10px 16px 12px;min-height:100px;}

.twl-label{font-family:'Barlow Condensed',sans-serif;font-weight:600;
  font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-dim);opacity:.45;
  margin-bottom:8px;}

/* FX Chain scrollable row */
.fx-chain{
  display:flex;align-items:center;gap:6px;
  min-height:76px;overflow-x:auto;padding:2px 0 4px;
  scrollbar-width:none;}
.fx-chain::-webkit-scrollbar{display:none;}

.fx-arrow{color:var(--border2);font-size:11px;flex-shrink:0;opacity:.5;pointer-events:none;}
.fx-chain-in,.fx-chain-out{
  font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.1em;
  color:var(--text-dim);flex-shrink:0;padding:2px 7px;
  border:1px solid var(--border);border-radius:3px;background:rgba(0,0,0,.3);}
.fx-empty{flex-shrink:0;min-width:80px;height:70px;
  border:1px dashed var(--border);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--border2);letter-spacing:.08em;}

/* FX Block */
.fx-block{
  flex-shrink:0;min-width:84px;max-width:110px;
  background:linear-gradient(180deg,#161620 0%,#0f0f14 100%);
  border:1px solid var(--border2);border-radius:8px;
  padding:8px 10px 7px;cursor:pointer;
  position:relative;overflow:hidden;
  transition:border-color .12s,box-shadow .12s,transform .08s,opacity .15s;
  touch-action:none;-webkit-tap-highlight-color:transparent;}
.fx-block:active{transform:scale(.95);}

/* enabled = top color bar + full opacity */
.fx-block.enabled{
  border-color:var(--fx-color,var(--accent));
  opacity:1;}
.fx-block.enabled::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--fx-color,var(--accent));
  box-shadow:0 0 8px var(--fx-color,var(--accent));}

/* disabled = dim, no top bar */
.fx-block.disabled{
  opacity:.38;
  border-color:var(--border);}

/* editing = yellow highlight frame */
.fx-block.editing{
  border-color:var(--yellow) !important;
  box-shadow:0 0 14px rgba(255,204,48,.25) !important;
  opacity:1 !important;}

.fx-block.dragging{opacity:.4;transform:scale(.94);}
.fx-block.drag-over{border-color:var(--cyan) !important;box-shadow:0 0 12px var(--cyan-dim) !important;}

.fx-block-cat{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--fx-color,var(--text-dim));margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fx-block-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:clamp(13px,1.5vw,15px);letter-spacing:.04em;color:#fff;line-height:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fx-block-slot{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text-dim);
  margin-top:4px;opacity:.45;}
.fx-toggle{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;
  border:1px solid var(--border2);background:var(--border);transition:all .15s;}
.fx-block.enabled .fx-toggle{
  background:var(--fx-color,var(--accent));
  box-shadow:0 0 5px var(--fx-color,var(--accent));border-color:transparent;}

/* ── Param Editor — OVERLAY (not inline, no layout shift) ─── */
.twl-overlay{
  display:none;
  position:absolute;
  /* sits inside .main-display, covers the toneweblib area */
  bottom:0;left:0;right:0;
  background:linear-gradient(180deg,rgba(5,5,10,.97) 0%,rgba(5,5,10,1) 100%);
  border-top:1px solid var(--border2);
  border-radius:0 0 12px 12px;
  z-index:30;
  padding:10px 16px 12px;}
.twl-overlay.visible{display:block;}

.twl-overlay-header{
  display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.twl-overlay-name{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:16px;letter-spacing:.08em;color:#fff;flex:1;}
.twl-overlay-cat{
  font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.12em;
  padding:2px 8px;border-radius:3px;border:1px solid;color:var(--fx-color,var(--accent));
  border-color:var(--fx-color,var(--accent));background:rgba(0,0,0,.4);}
.twl-overlay-close{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:var(--text-dim);cursor:pointer;padding:3px 10px;
  border:1px solid var(--border);border-radius:3px;transition:all .2s;
  flex-shrink:0;}
.twl-overlay-close:hover{border-color:var(--red);color:var(--red);}

.twl-param-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:8px 14px;
  max-height:90px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}

.param-row{display:flex;flex-direction:column;gap:3px;}
.param-label{font-family:'Share Tech Mono',monospace;font-size:8px;
  color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;}
.param-label span{color:var(--text-mid);font-size:9px;}
.param-slider{-webkit-appearance:none;appearance:none;width:100%;height:3px;
  background:var(--border2);border-radius:2px;outline:none;cursor:pointer;}
.param-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;
  border-radius:50%;background:var(--fx-color,var(--accent));cursor:pointer;
  box-shadow:0 0 5px var(--fx-color,var(--accent-dim));}
.param-slider::-moz-range-thumb{width:13px;height:13px;border-radius:50%;
  background:var(--fx-color,var(--accent));cursor:pointer;border:none;}

/* ── Footswitch zone ──────────────────────────────────────── */
.fs-zone{position:relative;z-index:1;display:flex;flex-direction:column;gap:5px;}
.fs-zone-label{font-family:'Barlow Condensed',sans-serif;font-weight:600;
  font-size:8px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--text-dim);opacity:.4;text-align:center;}

.fs-grid{
  display:grid;grid-template-columns:repeat(6,1fr);
  gap:clamp(5px,1.1vw,9px);width:100%;align-items:end;justify-items:stretch;}
.fs-col{display:flex;flex-direction:column;align-items:stretch;gap:0;width:100%;}

/* OLED scribble strip */
.fs-label{
  min-height:26px;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 1px,rgba(0,0,0,.18) 1px,rgba(0,0,0,.18) 2px),
    linear-gradient(180deg,var(--oled-bg) 0%,#040408 100%);
  border:1px solid var(--oled-border);border-bottom:none;border-radius:4px 4px 0 0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1vw,9px);
  color:var(--text-dim);letter-spacing:.05em;text-align:center;
  padding:2px 3px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;
  text-transform:uppercase;transition:color .15s,text-shadow .15s;}

/* ── Footswitch button ────────────────────────────────────── */
.fs-btn{
  width:100%;height:var(--fs-h);
  background:linear-gradient(180deg,#1e1e28 0%,#141418 55%,#0f0f13 100%);
  border:1px solid var(--border2);border-top:none;
  border-radius:0 0 var(--fs-radius) var(--fs-radius);
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(11px,1.5vw,14px);font-weight:700;
  color:var(--text-dim);letter-spacing:.1em;
  position:relative;
  transition:border-color .1s,box-shadow .1s,background .1s,transform .07s;
  box-shadow:0 4px 12px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04),inset 0 -2px 6px rgba(0,0,0,.4);
  touch-action:none;-webkit-tap-highlight-color:transparent;flex-shrink:0;overflow:hidden;}
.fs-btn::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:64%;height:58%;border-radius:7px;
  background:radial-gradient(ellipse at 50% 35%,rgba(255,255,255,.035) 0%,transparent 70%);
  pointer-events:none;}
.fs-btn:active,.fs-btn.pressed{transform:translateY(2px) scale(.97);
  box-shadow:0 1px 4px rgba(0,0,0,.9),inset 0 3px 10px rgba(0,0,0,.55);}

.fs-btn.lit-top{
  border-color:var(--bank-color,var(--green));
  background:linear-gradient(180deg,#1c1c2e 0%,#141418 65%,#0f0f13 100%);
  color:#fff;
  box-shadow:0 -4px 16px -2px var(--bank-color,var(--green)),0 4px 10px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.07);}
.fs-btn.lit-top::after{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;
  background:var(--bank-color,var(--green));border-radius:0 0 4px 4px;
  box-shadow:0 0 10px 2px var(--bank-color,var(--green));}
.fs-col:has(.lit-top) .fs-label{
  color:var(--bank-color,var(--green));text-shadow:0 0 7px var(--bank-color,var(--green));}

.fs-btn.preselect-mode{border-color:var(--border);color:var(--text-mid);}
.fs-btn.tuner-on{border-color:var(--cyan);
  background:linear-gradient(180deg,#08141e 0%,#050c14 100%);color:var(--cyan);
  box-shadow:0 0 20px rgba(0,184,230,.18),inset 0 1px 0 rgba(0,184,230,.1);}
.fs-btn.tap-beat{border-color:var(--cyan);box-shadow:0 0 14px var(--cyan-dim);}
.fs-btn.tap-btn{border-color:#151a25;}
.fs-btn.delay-sync.tap-beat{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,184,230,.4);}
.fs-btn.rate-sync.tap-beat{border-color:var(--accent);box-shadow:0 0 18px var(--accent-dim);}

.confirm-ring{position:absolute;inset:0;border-radius:inherit;
  border:2px solid var(--bank-color,var(--green));
  animation:confirm-ring-hr .38s ease-out forwards;pointer-events:none;}
@keyframes confirm-ring-hr{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.08);}}

/* ── MIDI bar ─────────────────────────────────────────────── */
.midi-indicator,#midiPortLabel,#memStatus{display:none!important;}
.midi-bar{position:relative;z-index:2;width:min(99vw,960px);
  background:#06060a;border:1px solid #181824;border-radius:10px;
  padding:7px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  box-shadow:0 4px 20px rgba(0,0,0,.6);}
.midi-bar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:#18182a;transition:background .3s,box-shadow .3s;}
.midi-bar-dot.off       {background:#18182a;}
.midi-bar-dot.aguardando{background:#383850;animation:pulse-wait .9s ease-in-out infinite alternate;}
.midi-bar-dot.conectado {background:#00ff66;box-shadow:0 0 7px #00ff66;}
.midi-bar-dot.g1on      {background:#00d4b8;box-shadow:0 0 9px #00d4b8;animation:pulse-g1on 1.2s ease-in-out infinite alternate;}
.midi-bar-dot.erro      {background:#ff2244;box-shadow:0 0 7px #ff2244;}
@keyframes pulse-wait{from{opacity:.3;}to{opacity:1;}}
@keyframes pulse-g1on{from{box-shadow:0 0 5px #00d4b8;}to{box-shadow:0 0 14px #00d4b8;}}
.midi-bar-texto{font-family:'Share Tech Mono',monospace;font-size:11px;
  color:#484860;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em;}
.midi-bar-texto strong{color:#8080a8;}
.midi-bar-texto.g1on{color:#00d4b8;}
.midi-bar-texto.erro{color:#ff4455;}
.midi-bar-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;padding:5px 14px;border-radius:6px;
  border:1px solid #242436;background:#0a0a14;color:#565670;
  cursor:pointer;flex-shrink:0;transition:all .2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.midi-bar-btn:hover   {border-color:#383850;color:#8080a8;}
.midi-bar-btn.loading {border-color:#ff9900;color:#ff9900;animation:pulse-wait .6s ease-in-out infinite alternate;}
.midi-bar-btn.ok      {border-color:#00ff6633;color:#00ff66;pointer-events:none;}
.midi-bar-btn.g1on    {border-color:#00d4b855;color:#00d4b8;pointer-events:none;}

/* ── Toast ────────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(8,8,16,.97);border:1px solid var(--accent);color:var(--accent);
  font-family:'Share Tech Mono',monospace;font-size:11px;
  padding:7px 20px;border-radius:6px;letter-spacing:.1em;
  opacity:0;transition:all .28s;pointer-events:none;z-index:500;
  white-space:nowrap;box-shadow:0 0 24px var(--accent-dim);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

<div class="chassis" id="chassis">
  <div class="bolt tl"></div><div class="bolt tr"></div>
  <div class="bolt bl"></div><div class="bolt br"></div>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="logo-wrap">
      <div class="logo-main">Head<em>·</em>Rush</div>
      <div class="logo-sub">Prime · FMC-AM 6F</div>
    </div>
    <div class="header-chips">
      <div class="mode-badge normal" id="modeBadge">EXECUÇÃO</div>
      <button class="boost-btn" id="boostBtn" onclick="toggleBoost()">⬆ BOOST</button>
      <button class="cal-btn" id="calBtn" onclick="iniciarCalibracaoCompleta()" title="Calibrar Tap Tempo">⚙ CAL</button>
      <span style="flex:1"></span>
      <span class="cache-btn" onclick="limparCachePatches()" title="Limpar cache">↺</span>
      <span class="build-badge">v5.1-b20260317</span>
      <span class="flash-health" id="flashHealth" onclick="mostrarDetalhesSaude()">◌</span>
    </div>
  </div>

  <!-- Main display -->
  <div class="main-display" id="mainDisplay">

    <!-- Patch info strip -->
    <div class="patch-strip">
      <div class="vol-display">
        <span class="vol-val" id="patchVolume">---</span>
        <span>VOL</span>
      </div>
      <div class="patch-info">
        <div class="patch-id" id="patchId">A0</div>
        <div class="patch-name" id="patchName">CARREGANDO…</div>
        <div class="fx-indicators" id="fxIndicators"></div>
      </div>
      <div class="bpm-display">
        <span class="bpm-val" id="bpmVal">120</span>
        <span>BPM</span>
      </div>
    </div>

    <!-- ToneWebLib chain area -->
    <div class="toneweblib" id="toneWebLib">
      <div class="twl-label">SIGNAL CHAIN · tap = toggle · double-tap = edit · drag = reorder</div>
      <div class="fx-chain" id="fxChain">
        <div class="fx-chain-in">IN</div>
        <span class="fx-arrow">▶</span>
        <div class="fx-empty" id="fxChainEmpty" style="display:none">SEM EFEITOS</div>
        <span class="fx-arrow" id="fxChainArrowOut">▶</span>
        <div class="fx-chain-out">OUT</div>
      </div>
    </div>

    <!-- Param editor overlay (absolute, no layout shift) -->
    <div class="twl-overlay" id="twlOverlay">
      <div class="twl-overlay-header">
        <div class="twl-overlay-name" id="twlOverlayName">EFEITO</div>
        <div class="twl-overlay-cat" id="twlOverlayCat">cat</div>
        <div class="twl-overlay-close" onclick="twlFecharEditor()">✕ FECHAR</div>
      </div>
      <div class="twl-param-grid" id="twlParamGrid"></div>
    </div>

  </div><!-- /main-display -->

  <!-- Footswitch zone -->

    <div class="fs-zone-label">FS1–10: PATCHES · FS11: BANK / TUNER · FS12: TAP TEMPO</div>
    <div class="fs-grid" id="fsGrid"></div>
  </div>

  <!-- Hidden legacy refs required by engine -->
  <div class="midi-indicator" id="midiIndicator"></div>

<!-- ══════════════════════════════════════════════════════
     TONEWEBLIB v1.1 — all bugs fixed
     ══════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── Category colors ──────────────────────────────────────── */
const TWL_CAT_COLOR = {
  dynamics:'#ffd740', filter:'#ff9e30', drive:'#ff7a50', amp:'#ff6688',
  pitch:'#80ffea',   mod:'#b388ff',    delay:'#00e5ff', reverb:'#6eb5ff',
  special:'#cc55ff', unknown:'#888888',
};

/* ── Param name map (hybrid: real names where known) ───────── */
const TWL_PARAM_NAMES = {
  delay:   ['Time','Feedback','Mix','Tone','Mod.Depth','Mod.Rate','Tail','Level'],
  mod:     ['Rate','Depth','Mix','Tone','Resonance','Phase','Stereo','Level'],
  reverb:  ['Decay','Pre-Delay','Mix','Tone','Diffusion','Mod.','Early','Level'],
  drive:   ['Gain','Tone','Level','Mid','Bass','Treble','P7','P8'],
  amp:     ['Gain','Bass','Mid','Treble','Presence','Level','P7','P8'],
  dynamics:['Threshold','Ratio','Attack','Release','Level','P6','P7','P8'],
  filter:  ['Freq','Resonance','Mix','Env.Depth','Attack','Release','P7','P8'],
  pitch:   ['Pitch','Mix','Tracking','P4','P5','P6','P7','P8'],
};
function twlParamName(cat, idx){
  return (TWL_PARAM_NAMES[cat] || [])[idx] || `P${idx+1}`;
}

/* ── State ────────────────────────────────────────────────── */
let twlEditingIdx = null;
let twlTapTime    = {};   // { idx: timestamp } for double-tap detection
let twlDragSrc    = null;

/* ── toneWebLibAtualizar — called by engine after every patch change ── */
function toneWebLibAtualizar(){
  if(typeof patchAtual === 'undefined') return;

  const chain    = document.getElementById('fxChain');
  const emptyEl  = document.getElementById('fxChainEmpty');
  const arrowOut = document.getElementById('fxChainArrowOut');
  if(!chain) return;

  // Remove previous fx blocks and inter-arrows only
  chain.querySelectorAll('.fx-block,.fx-arrow.fx-mid').forEach(el => el.remove());

  const efeitos = patchAtual.efeitos || [];

  if(!efeitos.length){
    if(emptyEl) emptyEl.style.display = 'flex';
    // Close overlay if open
    if(twlEditingIdx !== null) twlFecharEditor();
    return;
  }
  if(emptyEl) emptyEl.style.display = 'none';

  efeitos.forEach((ef, i) => {
    if(i > 0){
      const arr = document.createElement('span');
      arr.className = 'fx-arrow fx-mid';
      arr.textContent = '▶';
      chain.insertBefore(arr, arrowOut);
    }
    chain.insertBefore(_criarFxBlock(ef, i), arrowOut);
  });

  // Close editor if the editing slot no longer exists
  if(twlEditingIdx !== null && twlEditingIdx >= efeitos.length){
    twlFecharEditor();
  }
}

function _criarFxBlock(ef, i){
  const cor = TWL_CAT_COLOR[ef.cat] || '#888888';
  const div = document.createElement('div');
  div.className = 'fx-block ' + (ef.enabled ? 'enabled' : 'disabled');
  if(twlEditingIdx === i) div.classList.add('editing');
  div.style.setProperty('--fx-color', cor);
  div.dataset.idx = i;

  div.innerHTML =
    `<div class="fx-block-cat">${ef.cat || '—'}</div>`+
    `<div class="fx-block-name">${ef.nome || '—'}</div>`+
    `<div class="fx-block-slot">SLOT ${ef.slot}</div>`+
    `<div class="fx-toggle"></div>`;

  // Pointer handling: single vs double-tap discrimination
  div.addEventListener('pointerdown', evt => {
    evt.preventDefault();
    const now  = Date.now();
    const last = twlTapTime[i] || 0;
    if(now - last < 380){
      // Double-tap
      twlTapTime[i] = 0;
      clearTimeout(twlTapTime['_t' + i]);
      twlAbrirEditor(i);
    } else {
      twlTapTime[i] = now;
      // Delayed single-tap (fires only if no second tap arrives)
      clearTimeout(twlTapTime['_t' + i]);
      twlTapTime['_t' + i] = setTimeout(() => {
        if(twlTapTime[i] === now) twlToggleFx(i);
      }, 390);
    }
  });

  // Drag & drop reorder
  div.setAttribute('draggable', true);
  div.addEventListener('dragstart', evt => {
    twlDragSrc = i;
    div.classList.add('dragging');
    evt.dataTransfer.effectAllowed = 'move';
  });
  div.addEventListener('dragend',  () => div.classList.remove('dragging'));
  div.addEventListener('dragover',  evt => { evt.preventDefault(); div.classList.add('drag-over'); });
  div.addEventListener('dragleave', ()  => div.classList.remove('drag-over'));
  div.addEventListener('drop', evt => {
    evt.preventDefault();
    div.classList.remove('drag-over');
    if(twlDragSrc !== null && twlDragSrc !== i) twlReorder(twlDragSrc, i);
  });

  return div;
}

/* ── Helper: rebuild and send full patch via write 0x28 ─────────
   Usa tapRawDump do engine como base, copia rawSlots atuais de
   patchAtual.efeitos, repacota e envia F0 52 00 63 28 ... F7.
   Retorna true se enviou, false se sem dump disponível.
   ──────────────────────────────────────────────────────────── */
function twlWritePatch(){
  if(typeof tapRawDump === 'undefined' || !tapRawDump) return false;
  if(typeof midiOut    === 'undefined' || !midiOut)    return false;
  if(typeof midiReady  === 'undefined' || !midiReady)  return false;
  try{
    const up    = unpack7bitStream(tapRawDump, 5);
    const newUp = Array.from(up);
    for(const ef of patchAtual.efeitos){
      if(!ef.rawSlot) continue;
      const off = ef.slotIdx * 18;
      if(off + 17 >= newUp.length) continue;
      for(let i = 0; i < 18 && (off+i) < newUp.length; i++)
        newUp[off+i] = ef.rawSlot[i];
    }
    const repacked = pack7bit(newUp);
    const newRaw   = Array.from(tapRawDump);
    for(let i = 0; i < repacked.length && (5+i) < 110; i++)
      newRaw[5+i] = repacked[i];
    midiOut.send(newRaw);
    tapRawDump = newRaw;
    return true;
  } catch(e){ return false; }
}

/* ── Toggle FX enabled/disabled ────────────────────────────
   enabled está em rawSlot[3] bit7 (confirmado v5.1).
   Modifica bit7, reenvia patch completo via write 0x28.
   Fallback para CMD_PARAM se dump não disponível.
   ──────────────────────────────────────────────────────── */
async function twlToggleFx(idx){
  if(typeof patchAtual === 'undefined') return;
  const ef = patchAtual.efeitos[idx];
  if(!ef) return;

  ef.enabled = !ef.enabled;
  if(ef.rawSlot && ef.rawSlot.length > 3){
    ef.rawSlot[3] = ef.enabled
      ? (ef.rawSlot[3] | 0x80)
      : (ef.rawSlot[3] & 0x7F);
  }

  const wrote = twlWritePatch();
  if(!wrote && typeof midiOut !== 'undefined' && midiOut &&
     typeof midiReady !== 'undefined' && midiReady){
    try{
      if(typeof garantirEditor === 'function') await garantirEditor();
      const val = ef.rawSlot ? ef.rawSlot[3] : (ef.enabled ? 0x80 : 0x00);
      midiOut.send([0xF0, ZOOM_MFR, ZOOM_DEV, ZOOM_MODEL, CMD_PARAM,
                    ef.slotIdx, 0, val & 0x7F, (val>>7) & 0x7F, 0xF7]);
    } catch(err){}
  }

  toneWebLibAtualizar();
  if(typeof showToast === 'function')
    showToast(`${ef.nome} ${ef.enabled ? 'ON' : 'OFF'}`);
}

/* ── Reorder slots (drag & drop) ────────────────────────── */
function twlReorder(from, to){
  if(typeof patchAtual === 'undefined') return;
  const arr = patchAtual.efeitos;
  if(from < 0 || to < 0 || from >= arr.length || to >= arr.length) return;
  const item = arr.splice(from, 1)[0];
  arr.splice(to, 0, item);
  arr.forEach((ef, i) => { ef.slot = i + 1; ef.slotIdx = i; });
  if(twlEditingIdx === from) twlEditingIdx = to;
  toneWebLibAtualizar();
  if(typeof showToast === 'function') showToast(`${item.nome} → slot ${to + 1}`);
}

/* ── Open param editor overlay ──────────────────────────── */
function twlAbrirEditor(idx){
  if(typeof patchAtual === 'undefined') return;
  const ef = patchAtual.efeitos[idx];
  if(!ef) return;

  twlEditingIdx = idx;

  const overlay = document.getElementById('twlOverlay');
  const nameEl  = document.getElementById('twlOverlayName');
  const catEl   = document.getElementById('twlOverlayCat');
  const gridEl  = document.getElementById('twlParamGrid');
  if(!overlay || !nameEl || !catEl || !gridEl) return;

  const cor = TWL_CAT_COLOR[ef.cat] || '#888888';
  overlay.style.setProperty('--fx-color', cor);
  nameEl.textContent = `${ef.nome.toUpperCase()}  ·  SLOT ${ef.slot}`;
  catEl.textContent  = ef.cat || '—';
  catEl.style.color  = cor;
  catEl.style.borderColor = cor;

  gridEl.innerHTML = '';

  // rawSlot layout (18 bytes unpacked):
  //   [0..2] = packing header     → ignorar
  //   [3]    = (en<<7) | id_hi   → skip (toggle pelo bloco)
  //   [4]    = id_lo (Time)      → skip (controlado pelo tap engine)
  //   [5]    = r2 discriminador  → skip
  //   [6..17] = 12 bytes de params reais → sliders aqui
  const rawSlot   = ef.rawSlot || [];
  const OFFSET    = 6;
  const numParams = Math.min(10, rawSlot.length - OFFSET);
  let hasParam    = false;

  for(let p = 0; p < numParams; p++){
    const label = twlParamName(ef.cat, p);
    const val   = rawSlot[OFFSET + p] & 0x7F;
    hasParam = true;

    const row = document.createElement('div');
    row.className = 'param-row';
    row.innerHTML =
      `<div class="param-label">${label}<span id="pv_${idx}_${p}">${val}</span></div>`+
      `<input type="range" class="param-slider" min="0" max="127" value="${val}"`+
      ` data-idx="${idx}" data-param="${p}">`;
    gridEl.appendChild(row);

    row.querySelector('input').addEventListener('input', function(){
      const newVal = parseInt(this.value);
      const pIdx   = parseInt(this.dataset.idx);
      const paramI = parseInt(this.dataset.param);
      const eff    = patchAtual.efeitos[pIdx];
      if(!eff) return;
      if(eff.rawSlot) eff.rawSlot[OFFSET + paramI] = newVal;
      const lbl = document.getElementById(`pv_${pIdx}_${paramI}`);
      if(lbl) lbl.textContent = newVal;
      twlWritePatch();  // live preview via write 0x28
    });
  }

  if(!hasParam){
    gridEl.innerHTML =
      '<div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;'+
      'color:#555;padding:6px">Parâmetros não mapeados.</div>';
  }

  overlay.classList.add('visible');
  toneWebLibAtualizar();
}

/* ── Close param editor ─────────────────────────────────── */
function twlFecharEditor(){
  twlEditingIdx = null;
  const overlay = document.getElementById('twlOverlay');
  if(overlay) overlay.classList.remove('visible');
  toneWebLibAtualizar();
}

</script>

<!-- Engine — THEME_FS must be declared before fmc-engine.js -->

  const THEME_NAME = 'HeadRush Prime · FMC-AM 6F';
  const THEME_FS   = 12;
</script>
