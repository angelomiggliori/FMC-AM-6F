<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FMC-AM 6F · Boss ME-90</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Share+Tech+Mono&family=Barlow:wght@400;500;600&display=swap');

:root {
  --bg:       #111111;
  --chassis:  #1a1a1a;
  --panel:    #222222;
  --ridge:    #2e2e2e;
  --boss-orange: #ff5500;
  --boss-red:    #cc2200;
  --lcd-bg:      #1a2010;
  --lcd-green:   #88dd44;
  --lcd-dim:     #3a5520;
  --led-red:     #ff2200;
  --led-green:   #44ff22;
  --led-yellow:  #ffcc00;
  --text:     #dddddd;
  --text-dim: #888888;
  --border:   #3a3a3a;
  --tap-color:#ff5500;
  --fs-w: 84px;
  --fs-h: 84px;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:100%; height:100%;
  background:#0a0a0a;
  color:var(--text);
  font-family:'Barlow', sans-serif;
  overflow:hidden;
  user-select:none; -webkit-user-select:none;
  touch-action:manipulation;
}
body { display:flex; flex-direction:column; align-items:center; justify-content:center; }

/* Metal texture bg */
body::before {
  content:'';
  position:fixed; inset:0;
  background:repeating-linear-gradient(
    -45deg,
    transparent, transparent 2px,
    rgba(255,255,255,.006) 2px, rgba(255,255,255,.006) 4px
  );
  pointer-events:none; z-index:0;
}

/* ── Chassis — ME-90 chunky body ─────────────── */
.chassis {
  position:relative; z-index:1;
  width:min(98vw, 820px);
  background:var(--chassis);
  border-radius:8px;
  padding:0;
  box-shadow:
    0 0 0 2px #111,
    0 0 0 4px #333,
    0 0 0 5px #111,
    0 8px 40px rgba(0,0,0,.9);
  display:flex; flex-direction:column;
  min-height:0; overflow:hidden;
}

/* Orange top stripe — Boss signature */
.boss-stripe {
  height:6px;
  background:linear-gradient(90deg, var(--boss-red) 0%, var(--boss-orange) 50%, var(--boss-red) 100%);
  flex-shrink:0;
}

.chassis-inner {
  padding:12px 14px 10px;
  display:flex; flex-direction:column; gap:10px;
}

/* Brushed metal ridges */
.chassis-inner::before {
  content:'';
  position:absolute; inset:6px 0 0;
  background:repeating-linear-gradient(90deg,
    transparent, transparent 3px,
    rgba(255,255,255,.015) 3px, rgba(255,255,255,.015) 4px
  );
  pointer-events:none;
}

/* ── Top bar ─────────────────────────────────── */
.top-bar { display:flex; align-items:center; gap:10px; }

.logo {
  font-family:'Barlow Condensed', sans-serif;
  font-weight:800; font-size:clamp(14px,2.5vw,20px);
  letter-spacing:.08em; color:#fff; text-transform:uppercase;
  white-space:nowrap; text-shadow:0 1px 3px rgba(0,0,0,.8);
}
.logo-model { color:var(--boss-orange); margin-left:2px; }

/* ── LCD Display — ME-90 style ───────────────── */
.display {
  flex:1;
  background:var(--lcd-bg);
  border:2px solid #0a0f05;
  border-radius:4px;
  padding:6px 12px;
  display:flex; align-items:center; gap:12px;
  min-width:0;
  box-shadow:
    inset 0 1px 3px rgba(0,0,0,.8),
    inset 0 0 20px rgba(0,0,0,.4),
    0 0 0 1px #0d1a08;
  position:relative; overflow:hidden;
}
/* LCD scanlines */
.display::after {
  content:'';
  position:absolute; inset:0;
  background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 3px);
  pointer-events:none;
}

.display-main { flex:1; min-width:0; }

.patch-id {
  font-family:'Share Tech Mono', monospace;
  font-size:clamp(24px,5.5vw,42px); font-weight:400;
  color:var(--lcd-green);
  text-shadow:0 0 10px rgba(136,221,68,.6), 0 0 20px rgba(136,221,68,.2);
  letter-spacing:.08em; line-height:1;
  transition:color .15s;
}
.patch-id.blink { animation:blink-lcd .5s step-end infinite; }
@keyframes blink-lcd { 50%{opacity:0;} }

.patch-name {
  font-family:'Share Tech Mono', monospace;
  font-size:clamp(8px,1.3vw,11px); color:var(--lcd-dim);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:2px; text-transform:uppercase; letter-spacing:.06em;
}
/* Active name lit up */
.patch-name.lit { color:var(--lcd-green); text-shadow:0 0 6px rgba(136,221,68,.4); }

.fx-indicators { display:flex; gap:3px; margin-top:4px; flex-wrap:wrap; }
.fx-tag {
  font-family:'Share Tech Mono',monospace; font-size:8px;
  padding:1px 5px; border-radius:2px; border:1px solid;
  letter-spacing:.06em; transition:all .2s;
}
.fx-tag.delay    { color:#88dd44; border-color:#88dd4433; background:rgba(136,221,68,.06); }
.fx-tag.mod      { color:#aaddff; border-color:#aaddff33; background:rgba(170,221,255,.06); }
.fx-tag.reverb   { color:#88aaff; border-color:#88aaff33; background:rgba(136,170,255,.06); }
.fx-tag.drive    { color:#ff8844; border-color:#ff884433; background:rgba(255,136,68,.06); }
.fx-tag.dynamics { color:#ffdd44; border-color:#ffdd4433; background:rgba(255,221,68,.06); }
.fx-tag.off      { opacity:.2; filter:grayscale(1); }

.bpm-display {
  font-family:'Share Tech Mono', monospace;
  font-size:clamp(9px,1.5vw,12px); color:var(--boss-orange);
  white-space:nowrap; border-left:2px solid #0d1a08;
  padding-left:12px; line-height:1.5; text-align:center;
  text-shadow:0 0 8px rgba(255,85,0,.4);
}
.bpm-val {
  font-size:clamp(16px,3vw,26px); font-weight:400; display:block;
  color:var(--lcd-green); text-shadow:0 0 10px rgba(136,221,68,.5);
}

/* ── Middle ─────────────────────────────────── */
.middle { display:flex; min-height:0; }

/* ── FS Grid ─────────────────────────────────── */
.fs-grid {
    flex:1; display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);
    gap:clamp(8px,2vw,16px); 
    align-content:center;
    justify-items:center; 
    padding:6px 4px;
    width:100%;
  }
.fs-col { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }

/* Boss-style: round rubber stomp buttons */
.fs-btn {
    width:clamp(72px, 22vw, 110px); height:clamp(72px, 22vw, 110px);
  width:var(--fs-w); height:var(--fs-h);
  background:radial-gradient(ellipse at 40% 30%, #3a3a3a 0%, #1c1c1c 65%, #141414 100%);
  border:3px solid #111;
  border-radius:50%;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Barlow Condensed', sans-serif;
  font-size:clamp(10px,1.6vw,13px); font-weight:700;
  color:#888; letter-spacing:.06em; text-transform:uppercase;
  position:relative;
  transition:border-color .1s, box-shadow .1s, transform .08s;
  box-shadow:
    0 4px 0 #0a0a0a,
    0 6px 12px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 -2px 6px rgba(0,0,0,.6);
  touch-action:none; -webkit-tap-highlight-color:transparent; flex-shrink:0; overflow:hidden;
}
.fs-btn:active, .fs-btn.pressed {
  transform:translateY(3px);
  box-shadow:0 1px 0 #0a0a0a, 0 2px 6px rgba(0,0,0,.8), inset 0 2px 8px rgba(0,0,0,.7);
}

/* LED ring top — par */
.fs-btn.lit-top {
  border-color:var(--bank-color,var(--led-green));
  background:radial-gradient(ellipse at 40% 30%, #2a3a2a 0%, #1a221a 65%, #121812 100%);
  color:#ccc;
  box-shadow:
    0 4px 0 #0a0a0a,
    0 6px 14px rgba(0,0,0,.6),
    0 -4px 12px -2px var(--bank-color,var(--led-green)),
    inset 0 1px 0 rgba(255,255,255,.06);
}
/* LED ring bottom — ímpar */
.fs-btn.lit-bottom {
  border-color:var(--bank-color,var(--led-green));
  background:radial-gradient(ellipse at 40% 70%, #2a3a2a 0%, #1a221a 65%, #121812 100%);
  color:#ccc;
  box-shadow:
    0 4px 0 #0a0a0a,
    0 6px 14px rgba(0,0,0,.6),
    0 4px 12px -2px var(--bank-color,var(--led-green)),
    inset 0 1px 0 rgba(255,255,255,.06);
}

/* Small LED dot top-center */
.fs-btn.lit-top::after, .fs-btn.lit-bottom::after {
  content:'';
  position:absolute;
  width:6px; height:6px; border-radius:50%;
  background:var(--bank-color,var(--led-green));
  box-shadow:0 0 8px var(--bank-color,var(--led-green));
}
.fs-btn.lit-top::after    { top:6px; left:50%; transform:translateX(-50%); }
.fs-btn.lit-bottom::after { bottom:6px; left:50%; transform:translateX(-50%); }

.fs-btn.preselect-mode {
  border-color:var(--boss-orange);
  animation:preselect-boss .4s ease-in-out infinite alternate;
}
@keyframes preselect-boss { from{opacity:.55;} to{opacity:1;} }

.fs-btn.tap-btn { border-color:#222; }
.fs-btn.tap-btn.tap-beat {
  background:radial-gradient(ellipse at 40% 30%, #3a2010 0%, #1e1008 65%, #140c04 100%);
  border-color:var(--tap-color); color:var(--tap-color);
  box-shadow:0 4px 0 #0a0a0a, 0 6px 14px rgba(0,0,0,.6), 0 0 16px rgba(255,85,0,.5), inset 0 1px 0 rgba(255,85,0,.08);
}
.fs-btn.tap-btn.tap-off {
  border-color:#181818;
  background:radial-gradient(ellipse at 40% 30%, #1a1a1a 0%, #111 65%, #0d0d0d 100%);
  color:#2a2a2a;
  box-shadow:0 4px 0 #080808, 0 6px 10px rgba(0,0,0,.8), inset 0 2px 6px rgba(0,0,0,.6);
}
.fs-btn.tap-btn.delay-sync { --tap-color:#88dd44; }
.fs-btn.tap-btn.rate-sync  { --tap-color:#aaddff; }

.fs-label {
  font-family:'Barlow Condensed',sans-serif; font-size:clamp(8px,1.1vw,10px);
  font-weight:600; color:var(--text-dim); letter-spacing:.06em; text-align:center;
  max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  text-transform:uppercase;
}



/* ── Status bar ─────────────────────────────── */
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:4px 8px; background:#111;
  border-top:2px solid #333; gap:6px;
}
.status-item { display:flex; align-items:center; gap:4px; font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); }
.midi-indicator { width:7px; height:7px; border-radius:50%; background:#222; transition:background .2s, box-shadow .2s; flex-shrink:0; border:1px solid #111; }
.midi-indicator.sim       { background:#333; }
.midi-indicator.connected { background:var(--led-green); box-shadow:0 0 5px var(--led-green); }
.midi-indicator.error     { background:var(--led-red); box-shadow:0 0 5px var(--led-red); }
.midi-indicator.activity  { background:var(--boss-orange); box-shadow:0 0 6px var(--boss-orange); }

.mode-badge {
  font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700;
  padding:2px 8px; border-radius:3px; letter-spacing:.1em; text-transform:uppercase;
}
.mode-badge.normal     { background:#1a1a1a; color:#888; border:1px solid #333; }
.mode-badge.banksel    { background:rgba(255,85,0,.12); color:var(--boss-orange); border:1px solid rgba(255,85,0,.3); animation:preselect-boss .4s ease-in-out infinite alternate; }
.mode-badge.confirming { background:rgba(255,204,0,.1); color:var(--led-yellow); border:1px solid rgba(255,204,0,.3); animation:preselect-boss .4s ease-in-out infinite alternate; }

.confirm-ring { position:absolute; inset:-4px; border-radius:50%; border:2px solid rgba(255,85,0,.5); animation:confirmRing-boss .4s ease forwards; pointer-events:none; }
@keyframes confirmRing-boss { 0%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(1.35);} }

.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#111; border:2px solid var(--boss-orange);
  color:var(--boss-orange); font-family:'Share Tech Mono',monospace; font-size:11px;
  padding:6px 16px; border-radius:3px; letter-spacing:.1em;
  opacity:0; transition:all .25s; pointer-events:none; z-index:100; white-space:nowrap;
  box-shadow:0 0 20px rgba(255,85,0,.2);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media(max-width:600px){ :root{--fs-w:60px;--fs-h:60px;} }
@media(max-width:400px){ :root{--fs-w:50px;--fs-h:50px;} }
@media(max-height:500px) and (orientation:landscape){ :root{--fs-w:55px;--fs-h:55px;} .chassis-inner{padding:6px 10px;gap:7px;} }
</style>
</head>
<body>
<div class="chassis">
  <div class="boss-stripe"></div>
  <div class="chassis-inner">
    <div class="top-bar">
      <div class="logo">FMC·AM <span class="logo-model">6F</span></div>
      <div class="display" id="mainDisplay">
        <div class="display-main">
          <div class="patch-id" id="patchId">A0</div>
          <div class="patch-name lit" id="patchName">CLEAN BOOST</div>
          <div class="fx-indicators" id="fxIndicators"></div>
        </div>
        <div class="bpm-display">
          <span class="bpm-val" id="bpmVal">120</span>
          <span>BPM</span>
        </div>
      </div>
    </div>
    <div class="middle">
      <div class="fs-grid" id="fsGrid"></div>
  </div>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-item">
        <div class="midi-indicator sim" id="midiIndicator"></div>
        <span id="midiPortLabel">SIM</span>
      </div>
      <div class="mode-badge normal" id="modeBadge">PLAY</div>
      <div class="status-item">
        <div class="midi-indicator connected"></div>
        <span id="memStatus">MEM OK</span>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
'use strict';
// ═══════════════════════════════════════════
// FMC-AM 6F · TEMA BOSS ME-90
// Motor v4 completo
// ═══════════════════════════════════════════
const DEBOUNCE_MS=30,HOLD_MS=900,TAP_AVG_N=4,TAP_TIMEOUT=2000,BPM_MIN=30,BPM_MAX=240,SYSEX_IDLE_MS=600,SYSEX_DELAY=40,PC_TO_DUMP_MS=400,MEM_CHECK_MS=5000,MIDI_CH=0;
const ZOOM_MFR_ID=0x52,ZOOM_DEV_ID=0x00,ZOOM_MODEL_ID=0x5E,ZOOM_CMD_DUMP_REQ=0x29,ZOOM_CMD_DUMP_RESP=0x28;
const BANKS_ALL=['A','B','C','D','E','F','G','H','I','J'];
const BANK_COLOR={A:'#44ff22',B:'#ffcc00',C:'#ff2200',D:'#44aaff',E:'#ffffff',F:'#44ff22',G:'#ffcc00',H:'#ff2200',I:'#44aaff',J:'#ffffff'};
const PATCH_NAMES={A:['CLEAN BOOST','TUBE DRIVE','OCTO VERB','SHIMMER PAD','TAPE ECHO','HEAVY GATE','DUAL CHORUS','POLY DETUNE','PITCH SHIFT','DIRT BOX'],B:['BLUES JR','TWEED 4X10','AC SPANK','VOX CLEAN','BRIT CRUNCH','PLEXI ROAR','MESA TIGHT','SOLDANO HI','FRIEDMAN BE','BOGNER ECST'],C:['SMALL ROOM','LARGE HALL','PLATE VERB','SPRING TANK','SHIMMER 1','SHIMMER 2','CAVE ECHO','MOD DELAY','TAPE SLAP','PING PONG'],D:['WAH CRYBABY','OCTAVE FUZ','RING MOD','TREMOLO','VIBRATO','PHASER 4ST','FLANGER JET','CHORUS 2V','ROTARY','UNIVIBE'],E:['LOOPER 1','LOOPER 2','PHRASE 1','PHRASE 2','MIDI CLK','SYNC BEAT','POLY LOOP','HALF SPEED','REVERSE','REBUILD']};
for(const b of ['F','G','H','I','J']) PATCH_NAMES[b]=PATCH_NAMES[BANKS_ALL[BANKS_ALL.indexOf(b)-5]].map(n=>n+' II');
const ZOOM_FX_DB={0x0001:{name:'Comp',cat:'dynamics',tap:null},0x0002:{name:'RackComp',cat:'dynamics',tap:null},0x0003:{name:'SlowATTCK',cat:'dynamics',tap:null},0x0004:{name:'ZNR',cat:'dynamics',tap:null},0x0005:{name:'NoiseGate',cat:'dynamics',tap:null},0x0008:{name:'GraphicEQ',cat:'filter',tap:null},0x0009:{name:'ParaEQ',cat:'filter',tap:null},0x000A:{name:'AutoWah',cat:'filter',tap:'Rate'},0x000B:{name:'Resonance',cat:'filter',tap:null},0x000C:{name:'Cry',cat:'filter',tap:null},0x0010:{name:'OverDrive',cat:'drive',tap:null},0x0011:{name:'Distortion',cat:'drive',tap:null},0x0012:{name:'TS Drive',cat:'drive',tap:null},0x0013:{name:'Guvnor',cat:'drive',tap:null},0x0014:{name:'MetalWRLD',cat:'drive',tap:null},0x0015:{name:'FuzzSmile',cat:'drive',tap:null},0x0016:{name:'GreatMuff',cat:'drive',tap:null},0x0020:{name:'FD Combo',cat:'amp',tap:null},0x0021:{name:'VX Combo',cat:'amp',tap:null},0x0022:{name:'US Blues',cat:'amp',tap:null},0x0023:{name:'BG Crunch',cat:'amp',tap:null},0x0024:{name:'HW Stack',cat:'amp',tap:null},0x0025:{name:'MS Crunch',cat:'amp',tap:null},0x0026:{name:'Rectifier',cat:'amp',tap:null},0x0030:{name:'Chorus',cat:'mod',tap:'Rate'},0x0031:{name:'StereoChorus',cat:'mod',tap:'Rate'},0x0032:{name:'SuperChorus',cat:'mod',tap:'Rate'},0x0033:{name:'Flanger',cat:'mod',tap:'Rate'},0x0034:{name:'Vibrato',cat:'mod',tap:'Rate'},0x0035:{name:'Phaser',cat:'mod',tap:'Rate'},0x0036:{name:'Step',cat:'mod',tap:'Rate'},0x0037:{name:'Tremolo',cat:'mod',tap:'Rate'},0x0038:{name:'AutoPan',cat:'mod',tap:'Rate'},0x0039:{name:'RingMod',cat:'mod',tap:'Rate'},0x003A:{name:'Detune',cat:'mod',tap:null},0x003B:{name:'PitchShift',cat:'mod',tap:null},0x0040:{name:'MonoPitch',cat:'pitch',tap:null},0x0041:{name:'HPS',cat:'pitch',tap:null},0x0042:{name:'Octave',cat:'pitch',tap:null},0x0050:{name:'Delay',cat:'delay',tap:'Time'},0x0051:{name:'AnalogDelay',cat:'delay',tap:'Time'},0x0052:{name:'TapeEcho',cat:'delay',tap:'Time'},0x0053:{name:'ModDelay',cat:'delay',tap:'Time'},0x0054:{name:'FilterDelay',cat:'delay',tap:'Time'},0x0055:{name:'PingPongDly',cat:'delay',tap:'Time'},0x0056:{name:'ReverseDelay',cat:'delay',tap:'Time'},0x0060:{name:'Hall',cat:'reverb',tap:null},0x0061:{name:'Room',cat:'reverb',tap:null},0x0062:{name:'Spring',cat:'reverb',tap:null},0x0063:{name:'Arena',cat:'reverb',tap:null},0x0064:{name:'EarlyRef',cat:'reverb',tap:null},0x0070:{name:'Air',cat:'ambience',tap:null}};
const FX_PRECISA_TIME=new Set(['delay']),FX_PRECISA_RATE=new Set(['mod','filter']);
function criarEstadoPadrao(){return{bank:'A',patch:0,bpm:120,bankGroup:0};}
let cam0=criarEstadoPadrao();
function salvarCamada(n,d){try{localStorage.setItem(`fmc_cam${n}`,JSON.stringify(d));}catch(e){}}
function lerCamada(n){try{const s=localStorage.getItem(`fmc_cam${n}`);return s?JSON.parse(s):null;}catch(e){return null;}}
function gravarEstado(){const snap={bank:cam0.bank,patch:cam0.patch,bpm:cam0.bpm,bankGroup:cam0.bankGroup};salvarCamada(1,snap);salvarCamada(2,snap);salvarCamada(3,snap);}
function carregarEstado(){for(let n=1;n<=3;n++){const d=lerCamada(n);if(d&&d.bank&&BANKS_ALL.includes(d.bank)){cam0={...criarEstadoPadrao(),...d};logMIDI({type:'sx',label:`MEM CAM${n}`});return;}}cam0=criarEstadoPadrao();}
setInterval(()=>{const c1=lerCamada(1);if(!c1){gravarEstado();return;}const div=c1.bank!==cam0.bank||c1.patch!==cam0.patch||c1.bpm!==cam0.bpm||c1.bankGroup!==cam0.bankGroup;if(div){gravarEstado();const el=document.getElementById('memStatus');if(el){el.textContent='SYNC!';setTimeout(()=>el.textContent='MEM OK',800);}}},MEM_CHECK_MS);
let patchAtual={nome:null,efeitos:[],temTime:false,temRate:false,precisaSincBpm:false,efeitosTime:[],efeitosRate:[]};
function parseZoomDump(data){if(!data||data.length<10)return null;if(data[0]!==0xF0||data[1]!==ZOOM_MFR_ID||data[4]!==ZOOM_CMD_DUMP_RESP)return null;const info={nome:'',efeitos:[]};for(let i=0;i<5;i++){const offset=9+(i*20);if(offset+2>=data.length)break;const effectID=(data[offset]<<7)|data[offset+1];const enabled=(data[offset+2]&0x01)===1;const fxInfo=ZOOM_FX_DB[effectID]||{name:`FX_${effectID.toString(16).toUpperCase()}`,cat:'unknown',tap:null};info.efeitos.push({slot:i+1,id:effectID,nome:fxInfo.name,cat:fxInfo.cat,tap:fxInfo.tap,enabled});}if(data.length>124){const nb=Array.from(data.slice(114,124));info.nome=nb.filter(b=>b>=0x20&&b<0x7F).map(b=>String.fromCharCode(b)).join('').trim();}return info;}
function aplicarDump(info){if(!info)return;patchAtual.nome=info.nome||null;patchAtual.efeitos=info.efeitos;patchAtual.efeitosTime=info.efeitos.filter(e=>e.enabled&&e.tap==='Time');patchAtual.efeitosRate=info.efeitos.filter(e=>e.enabled&&e.tap==='Rate');patchAtual.temTime=patchAtual.efeitosTime.length>0;patchAtual.temRate=patchAtual.efeitosRate.length>0;patchAtual.precisaSincBpm=patchAtual.temTime||patchAtual.temRate;atualizarFxIndicators();const tapBtn=fsEls[5];tapBtn.classList.toggle('delay-sync',patchAtual.temTime);tapBtn.classList.toggle('rate-sync',!patchAtual.temTime&&patchAtual.temRate);if(patchAtual.nome){document.getElementById('patchName').textContent=patchAtual.nome;document.getElementById('patchName').classList.add('lit');}const slotAtivos=info.efeitos.filter(e=>e.enabled).length;(document.getElementById('dumpStatus')||{}).textContent =`${slotAtivos}/5`+(patchAtual.temTime?' TIME':'')+(patchAtual.temRate?' RATE':'');logMIDI({type:'rx',label:`DUMP:"${info.nome||'?'}" ${slotAtivos}fx`});}
function atualizarFxIndicators(){const $ind=document.getElementById('fxIndicators');$ind.innerHTML='';for(const fx of patchAtual.efeitos){const tag=document.createElement('span');tag.className=`fx-tag ${fx.cat}${fx.enabled?'':' off'}`;tag.textContent=fx.nome.substring(0,7);$ind.appendChild(tag);}}
let midiAccess=null,midiOut=null,midiReady=false,dumpTimer=null;
async function iniciarMIDI(){if(!navigator.requestMIDIAccess){setMidiStatus('SIM','sim');return;}try{midiAccess=await navigator.requestMIDIAccess({sysex:true});midiReady=true;midiAccess.onstatechange=onMidiStateChange;autoSelecionarPorta();for(const input of midiAccess.inputs.values())input.onmidimessage=onMensagemMIDI;setMidiStatus('READY','connected');}catch(e){setMidiStatus('DENIED','error');logMIDI({type:'err',label:`MIDI:${e.message}`});}}
function autoSelecionarPorta(){const outputs=[...midiAccess.outputs.values()];if(outputs.length>0){midiOut=outputs[0];setMidiStatus(truncar(midiOut.name),'connected');logMIDI({type:'sx',label:`PORT:${midiOut.name}`});}}
function onMidiStateChange(e){const p=e.port;if(p.type==='output'){if(p.state==='connected'&&!midiOut){midiOut=p;setMidiStatus(truncar(p.name),'connected');}if(p.state==='disconnected'&&midiOut?.id===p.id){midiOut=null;setMidiStatus('LOST','error');autoSelecionarPorta();}}if(p.type==='input'&&p.state==='connected')p.onmidimessage=onMensagemMIDI;}
function onMensagemMIDI(event){const d=event.data;if(!d||d.length<5)return;piscarIndicador();if(d[0]===0xF0&&d[1]===ZOOM_MFR_ID&&d[4]===ZOOM_CMD_DUMP_RESP){logMIDI({type:'rx',label:`RX 0x28 (${d.length}b)`});aplicarDump(parseZoomDump(d));}}
function enviarMIDI(bytes,tipo,label){logMIDI({type:tipo||'sx',label});if(!midiOut||!midiReady)return;try{midiOut.send(bytes);}catch(e){logMIDI({type:'err',label:`ERR:${e.message}`});}}
function limparPatchAtual(){patchAtual.nome=null;patchAtual.efeitos=[];patchAtual.temTime=false;patchAtual.temRate=false;patchAtual.precisaSincBpm=false;patchAtual.efeitosTime=[];patchAtual.efeitosRate=[];(document.getElementById('fxIndicators')||{}).innerHTML ='';(document.getElementById('dumpStatus')||{}).textContent ='…';fsEls[5].classList.remove('delay-sync','rate-sync');}
function enviarProgramChange(pc){enviarMIDI([0xC0|MIDI_CH,pc],'pc',`PC ${pc} [${cam0.bank}${cam0.patch+1}]`);limparPatchAtual();if(dumpTimer)clearTimeout(dumpTimer);dumpTimer=setTimeout(requisitarDump,PC_TO_DUMP_MS);}
function requisitarDump(){enviarMIDI([0xF0,ZOOM_MFR_ID,ZOOM_DEV_ID,ZOOM_MODEL_ID,ZOOM_CMD_DUMP_REQ,0xF7],'sx','TX 0x29 DUMP');}
let sysexIdleTimer=null;
function enviarSysExTapTempo(bpm){if(sysexIdleTimer)clearTimeout(sysexIdleTimer);sysexIdleTimer=setTimeout(()=>{enviarMIDI([0xB0|MIDI_CH,64,Math.min(127,Math.round(bpm))],'cc',`CC64 BPM→${bpm}`);if(!patchAtual.precisaSincBpm){logMIDI({type:'sx',label:'SX: no time fx'});return;}if(patchAtual.temTime){const ms=Math.round(60000/bpm);const lsb=ms&0x7F;const msb=(ms>>7)&0x7F;enviarMIDI([0xF0,ZOOM_MFR_ID,ZOOM_DEV_ID,ZOOM_MODEL_ID,0x31,msb,lsb,0xF7],'sx',`TIME:${ms}ms`);}if(patchAtual.temRate){const hz=bpm/60;const valor=Math.min(127,Math.max(0,Math.round(hz*127/10)));enviarMIDI([0xB0|MIDI_CH,3,valor],'cc',`RATE:${hz.toFixed(2)}Hz`),SYSEX_IDLE_MS;}},SYSEX_IDLE_MS);}
let midiBuffer=[],midiFlushTimer=null;
function logMIDI(msg){ piscarIndicador(); }
let indicadorTimer=null;
function piscarIndicador(){const el=document.getElementById('midiIndicator');if(!el)return;el.classList.add('activity');if(indicadorTimer)clearTimeout(indicadorTimer);indicadorTimer=setTimeout(()=>{el.classList.remove('activity');el.className='midi-indicator '+(midiReady?'connected':'sim');},120);}
function setMidiStatus(label,state){const el=document.getElementById('midiIndicator');const lbl=document.getElementById('midiPortLabel');if(el)el.className=`midi-indicator ${state}`;if(lbl)lbl.textContent=label;}
function truncar(s){return s&&s.length>14?s.substring(0,12)+'…':s;}
let tapTimes=[],tapTimer=null,tapLedTimer=null,tapBeatTimer=null;
function registrarTap(){const now=performance.now();if(tapTimer)clearTimeout(tapTimer);tapTimer=setTimeout(resetarTap,TAP_TIMEOUT);if(tapTimes.length>0&&(now-tapTimes[tapTimes.length-1])<TAP_TIMEOUT){tapTimes.push(now);if(tapTimes.length>TAP_AVG_N+1)tapTimes.shift();if(tapTimes.length>=2){const intervals=[];for(let i=1;i<tapTimes.length;i++)intervals.push(tapTimes[i]-tapTimes[i-1]);const avg=intervals.reduce((a,b)=>a+b,0)/intervals.length;cam0.bpm=Math.min(BPM_MAX,Math.max(BPM_MIN,Math.round(60000/avg)));iniciarPiscarBeat(Math.round(60000/cam0.bpm));enviarSysExTapTempo(cam0.bpm);renderizar();}}else{tapTimes=[now];}piscarBeatManual();}
function piscarBeatManual(){const btn=fsEls[5];btn.classList.add('tap-beat');btn.classList.remove('tap-off');if(tapLedTimer)clearTimeout(tapLedTimer);tapLedTimer=setTimeout(()=>{btn.classList.remove('tap-beat');btn.classList.add('tap-off');},80);}
function iniciarPiscarBeat(intervalMs){if(tapBeatTimer)clearInterval(tapBeatTimer);const onMs=Math.min(80,intervalMs*0.15);tapBeatTimer=setInterval(()=>{if(bankSelect)return;const btn=fsEls[5];btn.classList.add('tap-beat');btn.classList.remove('tap-off');setTimeout(()=>{btn.classList.remove('tap-beat');btn.classList.add('tap-off');},onMs);},intervalMs);}
function resetarTap(){tapTimes=[];if(tapBeatTimer){clearInterval(tapBeatTimer);tapBeatTimer=null;}iniciarPiscarBeat(Math.round(60000/cam0.bpm));}
const $patchId=document.getElementById('patchId'),$patchName=document.getElementById('patchName'),$bpmVal=document.getElementById('bpmVal'),$modeBadge=document.getElementById('modeBadge'),$toast=document.getElementById('toast'),$display=document.getElementById('mainDisplay');
function corDoBanco(bank){return BANK_COLOR[bank]||'#888';}
function renderizar(){const cor=corDoBanco(bankSelect&&preselectBank?preselectBank:cam0.bank);const bank=cam0.bank;$bpmVal.textContent=Math.round(cam0.bpm);if(bankSelect&&preselectBank){$patchId.textContent=preselectBank+'?';$patchId.className='patch-id blink';$patchId.style.setProperty('--bank-color',corDoBanco(preselectBank));$patchName.textContent='AGUARDANDO';$patchName.className='patch-name';$display.style.setProperty('--bank-color',corDoBanco(preselectBank));}else if(bankSelect){$patchId.textContent='??';$patchId.className='patch-id blink';$patchName.textContent='SEL BANCO';$patchName.className='patch-name';$display.style.setProperty('--bank-color','#ff5500');}else{$patchId.textContent=bank+cam0.patch;$patchId.className='patch-id';$patchId.style.setProperty('--bank-color',cor);if(!patchAtual.nome){$patchName.textContent=PATCH_NAMES[bank]?.[cam0.patch]||`PATCH ${cam0.patch+1}`;$patchName.className='patch-name lit';}$display.style.setProperty('--bank-color',cor);}const visGroup=BANKS_ALL.slice(cam0.bankGroup*5,cam0.bankGroup*5+5);const bankInView=visGroup.includes(cam0.bank);if(bankSelect){const grp=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);for(let i=0;i<5;i++){const b=grp[i];const bc=corDoBanco(b);const btn=fsEls[i];const isPresel=preselectBank===b;btn.style.setProperty('--bank-color',bc);btn.classList.remove('lit-top','lit-bottom');btn.classList.toggle('preselect-mode',true);btn.style.borderColor=isPresel?bc:'';btn.style.boxShadow=isPresel?`0 0 12px ${bc}55`:'';btn.style.color=isPresel?bc:'';labelEls[i].textContent=fsToggle&&isPresel?'IMPAR':isPresel?'CONFIRM':b;btn.childNodes[0].textContent=b;}labelEls[5].textContent='TAP LAYER';$modeBadge.className=preselectBank?'mode-badge confirming':'mode-badge banksel';$modeBadge.textContent=preselectBank?`CONF ${preselectBank}?`:'BANK SEL';}else{for(let i=0;i<5;i++){const base=i*2;const isTop=bankInView&&cam0.patch===base;const isBot=bankInView&&cam0.patch===base+1;const isAny=isTop||isBot;const btn=fsEls[i];btn.style.setProperty('--bank-color',cor);btn.classList.remove('preselect-mode');btn.style.borderColor='';btn.style.boxShadow='';btn.style.color='';btn.classList.toggle('lit-top',isTop);btn.classList.toggle('lit-bottom',isBot);btn.childNodes[0].textContent=`FS${i+1}`;if(bankInView){const next=(lastFsIdx===i&&fsToggle)?base+1:base;const show=isAny?cam0.patch:next;labelEls[i].textContent=(PATCH_NAMES[cam0.bank]?.[show]||`P${show+1}`).substring(0,9);}else{labelEls[i].textContent='- - -';}}labelEls[5].textContent='TAP / HOLD';$modeBadge.className='mode-badge normal';$modeBadge.textContent='PLAY';}}
const fsGrid=document.getElementById('fsGrid');const fsEls=[],labelEls=[];
for(let i=0;i<6;i++){const col=document.createElement('div');col.className='fs-col';const btn=document.createElement('div');btn.className='fs-btn';btn.setAttribute('role','button');btn.setAttribute('tabindex','0');btn.appendChild(document.createTextNode(i<5?`FS${i+1}`:'FS6'));if(i===5){const s=document.createElement('span');s.style.cssText='font-size:7px;opacity:.5;display:block;margin-top:2px;font-family:Share Tech Mono,monospace;letter-spacing:.05em;';s.textContent='TAP';btn.appendChild(s);btn.classList.add('tap-btn');}const lbl=document.createElement('div');lbl.className='fs-label';col.appendChild(btn);col.appendChild(lbl);fsGrid.appendChild(col);fsEls.push(btn);labelEls.push(lbl);}
let bankSelect=false,preselectBank=null,preselectGrp=0,lastFsIdx=null,fsToggle=false;
const debounceTimers={},holdTimers={},pressTimes={};
function attachFS(idx,el){function onPress(){if(debounceTimers[idx])return;debounceTimers[idx]=setTimeout(()=>{debounceTimers[idx]=null;},DEBOUNCE_MS);el.classList.add('pressed');pressTimes[idx]=Date.now();if(idx===5)holdTimers[idx]=setTimeout(onFS6Hold,HOLD_MS);}function onRelease(){el.classList.remove('pressed');const held=Date.now()-(pressTimes[idx]||0);if(idx===5){clearTimeout(holdTimers[idx]);if(held<HOLD_MS)onFS6Tap();}else{onFSPatch(idx);}}el.addEventListener('mousedown',e=>{e.preventDefault();onPress();});el.addEventListener('mouseup',e=>{e.preventDefault();onRelease();});el.addEventListener('mouseleave',()=>{el.classList.remove('pressed');clearTimeout(holdTimers[idx]);});el.addEventListener('touchstart',e=>{e.preventDefault();onPress();},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();onRelease();},{passive:false});el.addEventListener('touchcancel',()=>{el.classList.remove('pressed');clearTimeout(holdTimers[idx]);});}
fsEls.forEach((el,i)=>attachFS(i,el));
function onFSPatch(idx){if(bankSelect&&preselectBank){const patchIdx=idx*2+(fsToggle?1:0);cam0.bank=preselectBank;cam0.patch=patchIdx;cam0.bankGroup=preselectGrp;bankSelect=false;preselectBank=null;lastFsIdx=idx;limparPatchAtual();const pc=BANKS_ALL.indexOf(cam0.bank)*10+patchIdx;enviarProgramChange(pc);flashConfirmRing(fsEls[idx]);showToast(`${cam0.bank}${patchIdx+1} — ${PATCH_NAMES[cam0.bank]?.[patchIdx]||''}`);gravarEstado();renderizar();return;}if(bankSelect){const grp=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);const escolhido=grp[idx];if(!escolhido)return;preselectBank=escolhido;fsToggle=false;showToast(`BANK ${escolhido} · CONFIRM`);renderizar();return;}const visGroup=BANKS_ALL.slice(cam0.bankGroup*5,cam0.bankGroup*5+5);if(!visGroup.includes(cam0.bank))return;const base=idx*2;if(lastFsIdx!==idx){lastFsIdx=idx;fsToggle=(cam0.patch===base)?true:false;}else{fsToggle=!fsToggle;}cam0.patch=base+(fsToggle?1:0);limparPatchAtual();const pc=BANKS_ALL.indexOf(cam0.bank)*10+cam0.patch;enviarProgramChange(pc);flashConfirmRing(fsEls[idx]);gravarEstado();renderizar();}
function onFS6Tap(){if(bankSelect){if(preselectBank){fsToggle=!fsToggle;showToast(`${preselectBank} · ${fsToggle?'ODD':'EVEN'}`);}else{preselectGrp=preselectGrp===0?1:0;const g=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);showToast(`GROUP ${g[0]}-${g[4]}`);}renderizar();return;}registrarTap();}
function onFS6Hold(){if(bankSelect){bankSelect=false;preselectBank=null;showToast('CANCELLED');}else{bankSelect=true;preselectBank=null;preselectGrp=cam0.bankGroup;fsToggle=false;const g=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);showToast(`BANK SEL ${g[0]}-${g[4]}`);}renderizar();}
function flashConfirmRing(el){const r=document.createElement('div');r.className='confirm-ring';el.appendChild(r);setTimeout(()=>r.remove(),400);}
let toastTimer=null;
function showToast(msg){$toast.textContent=msg;$toast.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>$toast.classList.remove('show'),2200);}
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('gestureend',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
carregarEstado();
cam0.bankGroup=BANKS_ALL.indexOf(cam0.bank)>=5?1:0;
renderizar();
iniciarPiscarBeat(Math.round(60000/cam0.bpm));
iniciarMIDI();
showToast('BOSS ME-90 · FMC-AM 6F · READY');
</script>
