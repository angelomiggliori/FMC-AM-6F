<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FMC-AM 6F · v4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg:       #0a0a0c;
    --border:   #2a2a35;
    --dim:      #3a3a50;
    --text:     #e0e0f0;
    --text-dim: #6a6a88;
    --accent:   #e8e8e8;
    --accent2:  #ff6b00;
    --tap-color:#ff6b00;
    --bank-A:   #00ff66;
    --bank-B:   #ffaa00;
    --bank-C:   #ff0000;
    --bank-D:   #00ffff;
    --bank-E:   #ffffff;
    --fs-h: 90px;
    --fs-w: 90px;
    --glow: 0 0 10px rgba(232,232,232,0.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── Chassis ─────────────────────────────── */
  .chassis {
    position: relative; z-index: 1;
    width: min(98vw, 820px);
    background: linear-gradient(160deg, #1c1c24 0%, #0e0e14 60%, #14141c 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px 12px;
    box-shadow:
      0 0 0 1px #2a2a3a,
      0 4px 40px rgba(0,0,0,0.9),
      inset 0 1px 0 rgba(255,255,255,0.04),
      inset 0 -1px 0 rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
    overflow: hidden;
  }
  .chassis::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    border-radius: 14px;
    pointer-events: none; z-index: 10;
  }
  .screw {
    position: absolute; width: 10px; height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #3a3a4a, #1a1a22);
    border: 1px solid #2a2a36;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
  }
  .screw::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg); width:60%; height:1px; background:rgba(255,255,255,0.08); }
  .screw.tl{top:8px;left:8px;} .screw.tr{top:8px;right:8px;}
  .screw.bl{bottom:8px;left:8px;} .screw.br{bottom:8px;right:8px;}

  /* ── Top bar ─────────────────────────────── */
  .top-bar { display:flex; align-items:center; gap:8px; }
  .logo {
    font-family:'Orbitron',sans-serif; font-weight:900;
    font-size:clamp(13px,2.5vw,18px); letter-spacing:.12em;
    color:var(--accent); text-shadow:var(--glow); white-space:nowrap;
  }
  .logo span{color:var(--accent2);}

  /* ── Display ─────────────────────────────── */
  .display {
    flex:1; background:#060608;
    border:1px solid #1e1e2e; border-radius:8px;
    padding:6px 14px; display:flex; align-items:center;
    gap:12px; min-width:0;
    box-shadow:inset 0 2px 10px rgba(0,0,0,0.7);
    position:relative; overflow:hidden;
  }
  .display::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--bank-color,#333); border-radius:8px 0 0 8px;
    transition:background 0.3s;
  }
  .display-main { flex:1; min-width:0; }

  .patch-id {
    font-family:'Orbitron',sans-serif;
    font-size:clamp(20px,5vw,36px); font-weight:900;
    color:var(--bank-color,var(--accent));
    text-shadow:0 0 14px var(--bank-color,transparent),0 0 40px var(--bank-color,transparent);
    letter-spacing:.1em; line-height:1;
    transition:color .2s,text-shadow .2s;
  }
  .patch-id.blink { animation:blink-patch .45s linear infinite; }
  @keyframes blink-patch{ 50%{opacity:.08;} }

  .patch-name {
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(8px,1.4vw,11px); color:var(--text-dim);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    margin-top:2px;
  }
  /* Indicadores de efeitos ativos — linha abaixo do nome */
  .fx-indicators {
    display:flex; gap:4px; margin-top:3px; flex-wrap:wrap;
  }
  .fx-tag {
    font-family:'Share Tech Mono',monospace;
    font-size:8px; padding:1px 5px; border-radius:2px;
    border:1px solid; letter-spacing:.06em;
    transition:all .2s;
  }
  .fx-tag.delay    { color:#00ffcc; border-color:#00ffcc44; background:rgba(0,255,204,.08); }
  .fx-tag.mod      { color:#aa88ff; border-color:#aa88ff44; background:rgba(170,136,255,.08); }
  .fx-tag.reverb   { color:#4488ff; border-color:#4488ff44; background:rgba(68,136,255,.08); }
  .fx-tag.drive    { color:#ff6600; border-color:#ff660044; background:rgba(255,102,0,.08); }
  .fx-tag.dynamics { color:#ffcc00; border-color:#ffcc0044; background:rgba(255,204,0,.08); }
  .fx-tag.off      { opacity:.3; filter:grayscale(1); }

  .bpm-display {
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(10px,1.8vw,13px); color:var(--accent2);
    white-space:nowrap; border-left:1px solid var(--border);
    padding-left:12px; line-height:1.4; text-align:center;
  }
  .bpm-val { font-size:clamp(14px,2.5vw,20px); font-weight:700; display:block; }

  /* ── MIDI status ─────────────────────────── */
  
  .midi-indicator {
    width:8px; height:8px; border-radius:50%;
    background:var(--dim); flex-shrink:0;
    transition:background .2s, box-shadow .2s;
  }
  .midi-indicator.sim      { background:#555566; }
  .midi-indicator.connected{ background:#00ff66; box-shadow:0 0 6px #00ff66; }
  .midi-indicator.error    { background:#cc2233; box-shadow:0 0 6px #cc2233; }
  .midi-indicator.activity { background:#ff6b00; box-shadow:0 0 8px #ff6b00; }

  

  /* ── Middle ──────────────────────────────── */
  .middle { display:flex; min-height:0; }

  /* ── Grid 3×2 ────────────────────────────── */
  .fs-grid {
    flex:1; display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);
    gap:clamp(8px,2vw,16px); 
    align-content:center;
    justify-items:center; 
    padding:6px 4px;
    width:100%;
  }
  .fs-col { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }

  /* ── Botão ───────────────────────────────── */
  .fs-btn {
    width:clamp(72px, 22vw, 110px); height:clamp(72px, 22vw, 110px);
    width:var(--fs-w); height:var(--fs-h);
    background:radial-gradient(ellipse at 40% 35%,#2a2a36 0%,#161620 70%);
    border:2px solid #2e2e3e; border-radius:50%;
    cursor:pointer; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family:'Orbitron',sans-serif;
    font-size:clamp(9px,1.5vw,11px); font-weight:700;
    color:var(--text-dim); letter-spacing:.05em;
    position:relative;
    transition:border-color .12s,box-shadow .12s,background .12s,transform .08s;
    box-shadow:0 4px 12px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06),inset 0 -3px 8px rgba(0,0,0,.5);
    touch-action:none; -webkit-tap-highlight-color:transparent; flex-shrink:0; overflow:hidden;
  }
  .fs-btn:active,.fs-btn.pressed { transform:scale(.93); box-shadow:0 1px 4px rgba(0,0,0,.8),inset 0 3px 10px rgba(0,0,0,.6); }

  /* Iluminação de borda §2.1 */
  .fs-btn.lit-top {
    border-top-color:var(--bank-color,#00ff66); border-top-width:3px;
    box-shadow:0 2px 8px rgba(0,0,0,.5),0 -8px 18px -4px var(--bank-color,#00ff66),inset 0 1px 0 rgba(255,255,255,.06);
    background:radial-gradient(ellipse at 50% 50%,#1e1e28 0%,#0e0e14 70%); color:#ccc;
  }
  .fs-btn.lit-bottom {
    border-bottom-color:var(--bank-color,#00ff66); border-bottom-width:3px;
    box-shadow:0 2px 8px rgba(0,0,0,.5),0 8px 18px -4px var(--bank-color,#00ff66),inset 0 1px 0 rgba(255,255,255,.06);
    background:radial-gradient(ellipse at 50% 50%,#1e1e28 0%,#0e0e14 70%); color:#ccc;
  }

  /* Modo pré-seleção */
  .fs-btn.preselect-mode { animation:preselect-pulse .5s ease-in-out infinite alternate; }
  @keyframes preselect-pulse{ from{opacity:.65;} to{opacity:1;} }

  /* FS6 tap */
  .fs-btn.tap-btn { border-color:var(--dim); }
  .fs-btn.tap-btn.tap-beat {
    background:radial-gradient(ellipse at 40% 35%,#2a1a0a 0%,#160e04 70%);
    border-color:var(--tap-color); color:var(--tap-color);
    box-shadow:0 4px 12px rgba(0,0,0,.6),0 0 20px rgba(255,107,0,.65),0 0 50px rgba(255,107,0,.2),inset 0 1px 0 rgba(255,107,0,.1);
  }
  .fs-btn.tap-btn.tap-off {
    border-color:#1e1e2a;
    background:radial-gradient(ellipse at 40% 35%,#141414 0%,#0c0c10 70%);
    color:#2a2a36;
    box-shadow:0 2px 6px rgba(0,0,0,.8),inset 0 2px 6px rgba(0,0,0,.5);
  }

  /* Tap piscando na cor do delay quando delay está ativo */
  .fs-btn.tap-btn.delay-sync { --tap-color: #00ffcc; }

  /* Tap piscando em roxo quando só tem Rate (modulação) ativo */
  .fs-btn.tap-btn.rate-sync  { --tap-color: #aa88ff; }

  .fs-label {
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(7px,1.1vw,9px); color:var(--text-dim);
    letter-spacing:.04em; text-align:center;
    max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ── Middle ──────────────────────────────── */
  .middle { display:flex; min-height:0; }

  

  /* ── Status bar ──────────────────────────── */
  .status-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:4px 8px; background:#08080c;
    border:1px solid var(--border); border-radius:5px; gap:6px;
  }
  .status-item { display:flex; align-items:center; gap:4px; font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); }
  .status-dot { width:5px; height:5px; border-radius:50%; background:var(--dim); transition:background .2s,box-shadow .2s; }
  .status-dot.on   { background:#00ff66; box-shadow:0 0 5px #00ff66; }
  .status-dot.warn { background:#ffd600; box-shadow:0 0 5px #ffd600; }

  .mode-badge { font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700; padding:2px 7px; border-radius:3px; letter-spacing:.08em; }
  .mode-badge.normal     { background:rgba(232,232,232,.08); color:#aaa; border:1px solid #333; }
  .mode-badge.banksel    { background:rgba(255,107,0,.15); color:#ff6b00; border:1px solid rgba(255,107,0,.4); animation:preselect-pulse .5s ease-in-out infinite alternate; }
  .mode-badge.confirming { background:rgba(255,214,0,.15); color:#ffd600; border:1px solid rgba(255,214,0,.4); animation:preselect-pulse .45s ease-in-out infinite alternate; }

  /* ── Confirm ring ────────────────────────── */
  .confirm-ring { position:absolute; inset:-4px; border-radius:50%; border:2px solid #ffffff44; animation:confirmRing .4s ease forwards; pointer-events:none; }
  @keyframes confirmRing{ 0%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(1.4);} }

  /* ── Toast ───────────────────────────────── */
  .toast {
    position:fixed; bottom:20px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:rgba(20,20,28,.92); border:1px solid #ff6b00; color:#ff6b00;
    font-family:'Share Tech Mono',monospace; font-size:11px;
    padding:6px 16px; border-radius:20px; letter-spacing:.1em;
    opacity:0; transition:all .3s; pointer-events:none; z-index:100; white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── Responsivo ──────────────────────────── */
  @media(max-width:600px){ :root{--fs-w:62px;--fs-h:62px;} .logo{font-size:11px;} .patch-id{font-size:26px;} }
  @media(max-width:400px){ :root{--fs-w:52px;--fs-h:52px;} }
  @media(max-height:500px) and (orientation:landscape){ :root{--fs-w:58px;--fs-h:58px;} .chassis{padding:8px 12px;gap:6px;} }

  /* ── Barra MIDI externa (abaixo do chassis) ─── */
  .midi-bar {
    position:relative; z-index:2;
    width:min(98vw, 820px);
    margin-top:10px;
    background:#0a0a0e;
    border:1px solid #2a2a35;
    border-radius:10px;
    padding:8px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    box-shadow:0 4px 20px rgba(0,0,0,.6);
  }

  .midi-bar-dot {
    width:9px; height:9px; border-radius:50%;
    flex-shrink:0;
    background:#2a2a35;
    transition:background .3s, box-shadow .3s;
  }
  .midi-bar-dot.off        { background:#2a2a35; }
  .midi-bar-dot.aguardando { background:#555566; animation:pulse-wait .9s ease-in-out infinite alternate; }
  .midi-bar-dot.conectado  { background:#00ff66; box-shadow:0 0 8px #00ff66; }
  .midi-bar-dot.g1on       { background:#00ffcc; box-shadow:0 0 10px #00ffcc; animation:pulse-g1on 1.2s ease-in-out infinite alternate; }
  .midi-bar-dot.erro       { background:#ff2244; box-shadow:0 0 8px #ff2244; }
  @keyframes pulse-wait  { from{opacity:.3;} to{opacity:1;} }
  @keyframes pulse-g1on  { from{box-shadow:0 0 6px #00ffcc;} to{box-shadow:0 0 16px #00ffcc;} }

  .midi-bar-texto {
    font-family:'Share Tech Mono', monospace;
    font-size:11px;
    color:#666677;
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:.04em;
  }
  .midi-bar-texto strong { color:#aaaacc; }
  .midi-bar-texto.g1on   { color:#00ffcc; }
  .midi-bar-texto.erro   { color:#ff4455; }

  .midi-bar-btn {
    font-family:'Share Tech Mono', monospace;
    font-size:10px;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding:5px 14px;
    border-radius:6px;
    border:1px solid #333344;
    background:#111118;
    color:#888899;
    cursor:pointer;
    flex-shrink:0;
    transition:all .2s;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  }
  .midi-bar-btn:hover   { border-color:#555566; color:#aaaacc; }
  .midi-bar-btn.loading { border-color:#ffaa00; color:#ffaa00; animation:pulse-wait .6s ease-in-out infinite alternate; }
  .midi-bar-btn.ok      { border-color:#00ff6633; color:#00ff66; pointer-events:none; }
  .midi-bar-btn.g1on    { border-color:#00ffcc55; color:#00ffcc; pointer-events:none; }

</style>
</head>
<body>

<div class="chassis">
  <div class="screw tl"></div><div class="screw tr"></div>
  <div class="screw bl"></div><div class="screw br"></div>

  <div class="top-bar">
    <div class="logo">FMC<span>·</span>AM<span style="font-size:.7em;opacity:.6"> 6F</span></div>

    <div class="display" id="mainDisplay">
      <div class="display-main">
        <div class="patch-id" id="patchId">A0</div>
        <div class="patch-name" id="patchName">CLEAN BOOST</div>
        <div class="fx-indicators" id="fxIndicators"></div>
      </div>
      <div class="bpm-display">
        <span class="bpm-val" id="bpmVal">120</span>
        <span>BPM</span>
      </div>
    </div>
  </div>

  <div class="middle">
    <div class="fs-grid" id="fsGrid"></div>
  </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <div class="midi-indicator sim" id="midiIndicator"></div>
      <span id="midiPortLabel">SIM</span>
    </div>
    <div class="mode-badge normal" id="modeBadge">EXECUÇÃO</div>
    <div class="status-item">
      <div class="status-dot on"></div>
      <span id="memStatus">MEM OK</span>
    </div>
  </div>

<!-- Barra de status MIDI — fora do chassis -->
<div class="midi-bar" id="midiBar">
  <div class="midi-bar-dot off" id="midiBarDot"></div>
  <div class="midi-bar-texto" id="midiBarTexto">MIDI não iniciado</div>
  <button class="midi-bar-btn" id="midiBarBtn" onclick="conectarMIDI()">CONECTAR MIDI</button>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
// ══════════════════════════════════════════════════════════════════
// FMC-AM 6F  —  Motor de Controle  v4
// Central de Inteligência: parser 0x28, Web MIDI bidirecional,
// sincronização inteligente de BPM por categoria de efeito
// ══════════════════════════════════════════════════════════════════

// ── Constantes operacionais ────────────────────────────────────
const DEBOUNCE_MS    = 30;    // §1.2
const HOLD_MS        = 900;   // §3.1
const TAP_AVG_N      = 4;     // §4.1
const TAP_TIMEOUT    = 2000;  // §4.1
const BPM_MIN        = 30;    // §4.1
const BPM_MAX        = 240;   // §4.1
const SYSEX_IDLE_MS  = 600;   // §4.2
const SYSEX_DELAY    = 40;    // §4.2 — pausa entre bytes SysEx
const PC_TO_DUMP_MS  = 400;   // G1On: respiração após Program Change
const MEM_CHECK_MS   = 5000;  // §5
const MIDI_CH        = 0;     // Canal 1

const ZOOM_MFR_ID    = 0x52;  // ID fabricante Zoom (confirmado)
const ZOOM_DEV_ID    = 0x00;  // ID do dispositivo
const ZOOM_MODEL_ID  = 0x5E;  // Família G1On / G1XOn
const ZOOM_CMD_DUMP_REQ  = 0x29; // Request Current Patch Dump
const ZOOM_CMD_DUMP_RESP = 0x28; // Current Patch Dump (resposta)

const BANKS_ALL = ['A','B','C','D','E','F','G','H','I','J'];

const BANK_COLOR = {
  A:'#00ff66', B:'#ffaa00', C:'#ff0000', D:'#00ffff', E:'#ffffff',
  F:'#00ff66', G:'#ffaa00', H:'#ff0000', I:'#00ffff', J:'#ffffff',
};

const PATCH_NAMES = {
  A:['CLEAN BOOST','TUBE DRIVE','OCTO VERB','SHIMMER PAD','TAPE ECHO','HEAVY GATE','DUAL CHORUS','POLY DETUNE','PITCH SHIFT','DIRT BOX'],
  B:['BLUES JR','TWEED 4X10','AC SPANK','VOX CLEAN','BRIT CRUNCH','PLEXI ROAR','MESA TIGHT','SOLDANO HI','FRIEDMAN BE','BOGNER ECST'],
  C:['SMALL ROOM','LARGE HALL','PLATE VERB','SPRING TANK','SHIMMER 1','SHIMMER 2','CAVE ECHO','MOD DELAY','TAPE SLAP','PING PONG'],
  D:['WAH CRYBABY','OCTAVE FUZ','RING MOD','TREMOLO','VIBRATO','PHASER 4ST','FLANGER JET','CHORUS 2V','ROTARY','UNIVIBE'],
  E:['LOOPER 1','LOOPER 2','PHRASE 1','PHRASE 2','MIDI CLK','SYNC BEAT','POLY LOOP','HALF SPEED','REVERSE','REBUILD'],
};
for(const b of ['F','G','H','I','J'])
  PATCH_NAMES[b] = PATCH_NAMES[BANKS_ALL[BANKS_ALL.indexOf(b)-5]].map(n=>n+' II');

// ══════════════════════════════════════════════════════════════════
// BANCO DE EFEITOS ZOOM G1On — Camada de Referência Estática
// Fonte: Angelo Miggliori / Gemini / ZoomGuitarLab
//
// tapParameter:
//   null  — efeito não sincronizável com BPM
//   "Time"— delay recebe milissegundos  → ms = round(60000 / bpm)
//   "Rate"— modulação recebe Hz         → hz = bpm / 60
//
// IDs hexadecimais: baseados em engenharia reversa da G1On.
// A captura MIDI real com 0x29/0x28 refinará esses valores.
// ══════════════════════════════════════════════════════════════════
const ZOOM_FX_DB = {
  // ── Dynamics (tapParameter: null) ──────────────────────────────
  0x0001:{ name:'Comp',         cat:'dynamics', tap:null },
  0x0002:{ name:'RackComp',     cat:'dynamics', tap:null },
  0x0003:{ name:'SlowATTCK',    cat:'dynamics', tap:null },
  0x0004:{ name:'ZNR',          cat:'dynamics', tap:null },
  0x0005:{ name:'NoiseGate',    cat:'dynamics', tap:null },

  // ── Filter ─────────────────────────────────────────────────────
  0x0008:{ name:'GraphicEQ',    cat:'filter',   tap:null },
  0x0009:{ name:'ParaEQ',       cat:'filter',   tap:null },
  0x000A:{ name:'AutoWah',      cat:'filter',   tap:'Rate' }, // LFO sincrona
  0x000B:{ name:'Resonance',    cat:'filter',   tap:null },

// Estado de patch atual (vindo do dump da G1On)

let patchAtual = {
  nome:          null,  // nome real vindo do dump 0x28
  efeitos:       [],    // [{ slot, id, nome, cat, tap, enabled }]
  temTime:       false, // tem delay ativo (recebe ms)
  temRate:       false, // tem mod/filter com LFO ativo (recebe Hz)

// ══════════════════════════════════════════════════════════════════
// PARSER DO DUMP 0x28 — O Garimpeiro de Dados
// Fonte: Gemini + análise da comunidade ZoomGuitarLab
// ══════════════════════════════════════════════════════════════════
function parseZoomDump(data){
  // Valida cabeçalho: F0 52 00 5E 28 ...
  if(!data || data.length < 10) return null;
  if(data[0]!==0xF0 || data[1]!==ZOOM_MFR_ID || data[4]!==ZOOM_CMD_DUMP_RESP) return null;

  const info = { nome:'', efeitos:[] };

  // Extração dos 5 slots de efeito
  // Offset base = 9; cada bloco = 20 bytes (lógica aproximada G1On)
  for(let i=0;i<5;i++){
    const offset = 9 + (i * 20);
    if(offset+2 >= data.length) break;

    const effectID = (data[offset] << 7) | data[offset+1];
    const enabled  = (data[offset+2] & 0x01) === 1;
    const fxInfo   = ZOOM_FX_DB[effectID] || { name:`FX_${effectID.toString(16).toUpperCase()}`, cat:'unknown', tap:null };

    info.efeitos.push({
      slot:    i+1,
      id:      effectID,
      nome:    fxInfo.name,
      cat:     fxInfo.cat,
      tap:     fxInfo.tap,   // null | "Time" | "Rate"
      enabled,
    });
  }

  // Extração do nome do patch (bytes 114–123, conforme Gemini)
  if(data.length > 124){
    const nameBytes = Array.from(data.slice(114,124));
    info.nome = nameBytes
      .filter(b => b >= 0x20 && b < 0x7F)  // ASCII imprimível
      .map(b => String.fromCharCode(b))
      .join('')
      .trim();
  }

  return info;
}

// Aplica o resultado do parse no estado patchAtual e atualiza a UI
function aplicarDump(info){
  if(!info) return;

  patchAtual.nome = info.nome || null;
  patchAtual.efeitos = info.efeitos;

  // Classifica efeitos ativos por tipo de parâmetro de tempo
  patchAtual.efeitosTime = info.efeitos.filter(e => e.enabled && e.tap === 'Time');
  patchAtual.efeitosRate = info.efeitos.filter(e => e.enabled && e.tap === 'Rate');
  patchAtual.temTime     = patchAtual.efeitosTime.length > 0;
  patchAtual.temRate     = patchAtual.efeitosRate.length > 0;
  patchAtual.precisaSincBpm = patchAtual.temTime || patchAtual.temRate;

  atualizarFxIndicators();

  // Cor do FS6: ciano se tem delay (Time), roxo se só tem Rate, laranja se nenhum
  const tapBtn = fsEls[5];
  tapBtn.classList.toggle('delay-sync', patchAtual.temTime);
  tapBtn.classList.toggle('rate-sync',  !patchAtual.temTime && patchAtual.temRate);

  if(patchAtual.nome)
    document.getElementById('patchName').textContent = patchAtual.nome;

  // Status do dump: mostra quais tipos de sincronização estão ativos
  const partes = [];
  if(patchAtual.temTime) partes.push(`♩TIME(${patchAtual.efeitosTime.map(e=>e.nome).join(',')})`);
  if(patchAtual.temRate) partes.push(`∿RATE(${patchAtual.efeitosRate.map(e=>e.nome).join(',')})`);
  const slotAtivos = info.efeitos.filter(e=>e.enabled).length;
  (document.getElementById('dumpStatus')||{}).textContent =
    `${slotAtivos}/5` + (partes.length ? ' '+partes.join(' ') : ' —');

  logMIDI({type:'rx', label:`DUMP: "${info.nome||'?'}" ${slotAtivos}fx${patchAtual.temTime?' TIME':''}${patchAtual.temRate?' RATE':''}`});
}

function atualizarFxIndicators(){
  const $ind = document.getElementById('fxIndicators');
  $ind.innerHTML = '';
  for(const fx of patchAtual.efeitos){
    const tag = document.createElement('span');
    tag.className = `fx-tag ${fx.cat}${fx.enabled?'':' off'}`;
    tag.textContent = fx.nome.substring(0,7);
    tag.title = `Slot ${fx.slot}: ${fx.nome} [${fx.cat}] ${fx.enabled?'ON':'OFF'}`;
    $ind.appendChild(tag);
  }
}

// WEB MIDI API — Bidirecional
// ══════════════════════════════════════════════════════════════════
let dumpTimer   = null;  // timer para requisitar dump após PC


function onMidiStateChange(e){
  const p=e.port;
  if(p.type==='output'){
    if(p.state==='connected' && !midiOut){ midiOut=p; setMidiStatus(truncar(p.name),'connected'); }
    if(p.state==='disconnected' && midiOut?.id===p.id){ midiOut=null; setMidiStatus('DESCONECTADO','error'); autoSelecionarPorta(); }
  }
  if(p.type==='input' && p.state==='connected') conectarEntrada(p);
}

// Conecta uma entrada MIDI para receber mensagens da G1On
function conectarEntrada(input){
  input.onmidimessage = onMensagemMIDI;
}

// Handler de mensagens recebidas da G1On
function onMensagemMIDI(event){
  const d = event.data;
  if(!d || d.length<5) return;

  // Pisca indicador de atividade RX
  piscarIndicador();

  // Detecta resposta de dump 0x28
  if(d[0]===0xF0 && d[1]===ZOOM_MFR_ID && d[4]===ZOOM_CMD_DUMP_RESP){
    logMIDI({type:'rx',label:`RX 0x28 (${d.length}b)`});
    const info = parseZoomDump(d);
    aplicarDump(info);
  }
}

// ── Envio real de MIDI ──────────────────────────────────────────
function enviarMIDI(bytes, tipo, label){
  logMIDI({type:tipo||'sx', label});
  if(!midiOut || !midiReady) return;
  try{ midiOut.send(bytes); }
  catch(e){ logMIDI({type:'err',label:`TX ERR: ${e.message}`}); }
}

// Limpa estado do patch anterior — chamado antes de enviar PC
function limparPatchAtual(){
  patchAtual.nome=null; patchAtual.efeitos=[];
  patchAtual.temTime=false; patchAtual.temRate=false;
  patchAtual.precisaSincBpm=false;
  patchAtual.efeitosTime=[]; patchAtual.efeitosRate=[];
  (document.getElementById('fxIndicators')||{}).innerHTML ='';
  (document.getElementById('dumpStatus')||{}).textContent ='…';
  fsEls[5].classList.remove('delay-sync','rate-sync');
}

// Program Change + requisita dump após respiração da G1On
function enviarProgramChange(pc){
  const bytes = [0xC0|MIDI_CH, pc];
  enviarMIDI(bytes,'pc',`PC ${pc} [${cam0.bank}${cam0.patch+1}]`);

  // Limpa dump anterior e agenda requisição
  limparPatchAtual();

  if(dumpTimer) clearTimeout(dumpTimer);
  dumpTimer = setTimeout(requisitarDump, PC_TO_DUMP_MS);
}

// §4 — Requisição SysEx 0x29 — Current Patch Dump Request
function requisitarDump(){
  const msg = [0xF0, ZOOM_MFR_ID, ZOOM_DEV_ID, ZOOM_MODEL_ID, ZOOM_CMD_DUMP_REQ, 0xF7];
  enviarMIDI(msg,'sx','TX 0x29 DUMP REQ');
}

// §4.2 — Sincronização inteligente de BPM
// Dois caminhos matemáticos distintos por tipo de parâmetro:
//
//   Time (Delay) → ms = round(60000 / BPM)
//                  fragmentado em LSB/MSB de 7 bits para SysEx
//
//   Rate (Mod/Filter) → Hz = BPM / 60
//                       mapeado para escala 0–127 da G1On (0–10Hz)
//                       valor_midi = round(Hz * 127 / 10)
//
function enviarSysExTapTempo(bpm){
  if(sysexIdleTimer) clearTimeout(sysexIdleTimer);
  sysexIdleTimer = setTimeout(()=>{

    // CC64 sempre como fallback universal
    enviarMIDI([0xB0|MIDI_CH, 64, Math.min(127,Math.round(bpm))], 'cc', `CC64 BPM→${bpm}`);

    if(!patchAtual.precisaSincBpm){
      logMIDI({type:'sx', label:'SX: sem efeito de tempo ativo — omitido'});
      return;
    }

    // ── Caminho TIME (Delay) ───────────────────────────────────────
    // Envia uma mensagem SysEx com o tempo em milissegundos
    if(patchAtual.temTime){
      const ms  = Math.round(60000 / bpm);
      const lsb = ms & 0x7F;
      const msb = (ms >> 7) & 0x7F;
      const msg = [0xF0, ZOOM_MFR_ID, ZOOM_DEV_ID, ZOOM_MODEL_ID, 0x31, msb, lsb, 0xF7];
      enviarMIDI(
        msg, 'sx',
        `SX TIME: ${msb.toString(16).padStart(2,'0')} ${lsb.toString(16).padStart(2,'0')} → ${ms}ms [${patchAtual.efeitosTime.map(e=>e.nome).join('+')}]`
      );
    }

    // ── Caminho RATE (Modulação / Filter com LFO) ─────────────────
    // BPM → Hz: rate_hz = BPM / 60
    // Escala G1On: 0–10 Hz mapeado para 0–127 MIDI
    // valor_midi = round((BPM / 60) * 127 / 10)  →  clamp 0–127
    if(patchAtual.temRate){
      const hz    = bpm / 60;
      const valor = Math.min(127, Math.max(0, Math.round(hz * 127 / 10)));
      // CC03 é o CC genérico de Rate em muitas implementações Zoom
      // (a confirmar com captura MIDI da G1On — usar CC03 como placeholder)
      enviarMIDI(
        [0xB0|MIDI_CH, 3, valor], 'cc',
        `CC03 RATE: ${hz.toFixed(2)}Hz → val${valor} [${patchAtual.efeitosRate.map(e=>e.nome).join('+')}]`
      );
    }

  }, SYSEX_IDLE_MS);
}

let midiBuffer     = [];
let midiFlushTimer = null;
let sysexIdleTimer = null;

function enqueueMIDI(msg){ midiBuffer.push(msg); if(!midiFlushTimer) midiFlushTimer=setTimeout(flushMIDI,0); }
function flushMIDI(){ midiFlushTimer=null; while(midiBuffer.length) logMIDI(midiBuffer.shift()); }

function logMIDI(msg){
  piscarIndicador();
}

let indicadorTimer=null;
function piscarIndicador(){
  const el=document.getElementById('midiIndicator');
  if(!el) return;
  el.classList.add('activity');
  if(indicadorTimer) clearTimeout(indicadorTimer);
  indicadorTimer=setTimeout(()=>{
    el.classList.remove('activity');
    el.className='midi-indicator '+(midiReady?'connected':'sim');
  },120);
}

function setMidiStatus(label,state){
  const el=document.getElementById('midiIndicator');
  const lbl=document.getElementById('midiPortLabel');
  if(el) el.className=`midi-indicator ${state}`;
  if(lbl) lbl.textContent=label;
}

function truncar(s){ return s && s.length>16 ? s.substring(0,14)+'…' : s; }

// ══════════════════════════════════════════════════════════════════
// §4.1 — Tap Tempo (performance.now para monotonicidade)
// ══════════════════════════════════════════════════════════════════
let tapTimes    = [];
let tapTimer    = null;
let tapLedTimer = null;
let tapBeatTimer= null;

function registrarTap(){
  const now = performance.now();  // monotônico — protege contra ajuste de relógio
  if(tapTimer) clearTimeout(tapTimer);
  tapTimer = setTimeout(resetarTap, TAP_TIMEOUT);

  if(tapTimes.length>0 && (now-tapTimes[tapTimes.length-1])<TAP_TIMEOUT){
    tapTimes.push(now);
    if(tapTimes.length>TAP_AVG_N+1) tapTimes.shift();
    if(tapTimes.length>=2){
      const intervals=[];
      for(let i=1;i<tapTimes.length;i++) intervals.push(tapTimes[i]-tapTimes[i-1]);
      const avg=intervals.reduce((a,b)=>a+b,0)/intervals.length;
      cam0.bpm=Math.min(BPM_MAX,Math.max(BPM_MIN,Math.round(60000/avg)));
      iniciarPiscarBeat(Math.round(60000/cam0.bpm));
      enviarSysExTapTempo(cam0.bpm);
      renderizar();
    }
  } else {
    tapTimes=[now];
  }
  piscarBeatManual();
}

function piscarBeatManual(){
  const btn=fsEls[5];
  btn.classList.add('tap-beat'); btn.classList.remove('tap-off');
  if(tapLedTimer) clearTimeout(tapLedTimer);
  tapLedTimer=setTimeout(()=>{ btn.classList.remove('tap-beat'); btn.classList.add('tap-off'); },80);
}

function iniciarPiscarBeat(intervalMs){
  if(tapBeatTimer) clearInterval(tapBeatTimer);
  const onMs=Math.min(80,intervalMs*0.15);
  tapBeatTimer=setInterval(()=>{
    if(bankSelect) return;
    const btn=fsEls[5];
    btn.classList.add('tap-beat'); btn.classList.remove('tap-off');
    setTimeout(()=>{ btn.classList.remove('tap-beat'); btn.classList.add('tap-off'); },onMs);
  },intervalMs);
}

function resetarTap(){
  tapTimes=[];
  if(tapBeatTimer){ clearInterval(tapBeatTimer); tapBeatTimer=null; }
  iniciarPiscarBeat(Math.round(60000/cam0.bpm));
}

function corDoBanco(bank){ return BANK_COLOR[bank]||'#888'; }

function renderizar(){
  const cor  = corDoBanco(bankSelect && preselectBank ? preselectBank : cam0.bank);
  const bank = cam0.bank;
  $bpmVal.textContent = Math.round(cam0.bpm);

  if(bankSelect && preselectBank){
    $patchId.textContent = preselectBank+'?';
    $patchId.className   = 'patch-id blink';
    $patchId.style.setProperty('--bank-color', corDoBanco(preselectBank));
    $patchName.textContent = 'AGUARDANDO CONFIRMAÇÃO';
    $display.style.setProperty('--bank-color', corDoBanco(preselectBank));
  } else if(bankSelect){
    $patchId.textContent = '??';
    $patchId.className   = 'patch-id blink';
    $patchName.textContent = 'SELECIONE O BANCO';
    $display.style.setProperty('--bank-color','#ff6b00');
  } else {
    $patchId.textContent = bank+cam0.patch;
    $patchId.className   = 'patch-id';
    $patchId.style.setProperty('--bank-color', cor);
    // Nome: dump real tem prioridade; senão usa tabela local
    if(!patchAtual.nome)
      $patchName.textContent = PATCH_NAMES[bank]?.[cam0.patch]||`PATCH ${cam0.patch+1}`;
    $display.style.setProperty('--bank-color', cor);
  }

  // Botões FS1–5
  const visGroup  = BANKS_ALL.slice(cam0.bankGroup*5,cam0.bankGroup*5+5);
  const bankInView= visGroup.includes(cam0.bank);

  if(bankSelect){
    const grp=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);
    for(let i=0;i<5;i++){
      const b=grp[i]; const bc=corDoBanco(b); const btn=fsEls[i];
      const isPresel=preselectBank===b;
      btn.style.setProperty('--bank-color',bc);
      btn.classList.remove('lit-top','lit-bottom');
      btn.classList.toggle('preselect-mode',true);
      btn.style.borderColor=isPresel?bc:'';
      btn.style.boxShadow=isPresel?`0 0 16px ${bc}88,0 0 40px ${bc}33`:'';
      btn.style.color=isPresel?bc:'';
      labelEls[i].textContent=fsToggle&&isPresel?'ÍMPARES':isPresel?'CONFIRMAR':b;
      btn.childNodes[0].textContent=b;
    }
    labelEls[5].textContent='TAP=LAYER HOLD=SAIR';
    $modeBadge.className=preselectBank?'mode-badge confirming':'mode-badge banksel';
    $modeBadge.textContent=preselectBank?`CONF ${preselectBank}?`:'BANK SEL';
  } else {
    for(let i=0;i<5;i++){
      const base=i*2;
      const isTop=bankInView&&cam0.patch===base;
      const isBot=bankInView&&cam0.patch===base+1;
      const isAny=isTop||isBot;
      const btn=fsEls[i];
      btn.style.setProperty('--bank-color',cor);
      btn.classList.remove('preselect-mode');
      btn.style.borderColor=''; btn.style.boxShadow=''; btn.style.color='';
      btn.classList.toggle('lit-top',isTop);
      btn.classList.toggle('lit-bottom',isBot);
      btn.childNodes[0].textContent=`FS${i+1}`;
      if(bankInView){
        const next=(lastFsIdx===i&&fsToggle)?base+1:base;
        const show=isAny?cam0.patch:next;
        labelEls[i].textContent=(PATCH_NAMES[cam0.bank]?.[show]||`P${show+1}`).substring(0,9);
      } else {
        labelEls[i].textContent='· · ·';
      }
    }
    labelEls[5].textContent='TAP · HOLD';
    $modeBadge.className='mode-badge normal';
    $modeBadge.textContent='EXECUÇÃO';
  }
}

  const btn=document.createElement('div'); btn.className='fs-btn';
  btn.setAttribute('role','button'); btn.setAttribute('tabindex','0');
  btn.appendChild(document.createTextNode(i<5?`FS${i+1}`:'FS6'));
  if(i===5){ const s=document.createElement('span'); s.style.cssText='font-size:7px;opacity:.6;display:block;margin-top:1px'; s.textContent='TAP'; btn.appendChild(s); btn.classList.add('tap-btn'); }
  const lbl=document.createElement('div'); lbl.className='fs-label';
  col.appendChild(btn); col.appendChild(lbl); fsGrid.appendChild(col);
  fsEls.push(btn); labelEls.push(lbl);
}

// ══════════════════════════════════════════════════════════════════
// Estado de navegação
// ══════════════════════════════════════════════════════════════════
let bankSelect   =false;
let preselectBank=null;
let preselectGrp =0;
let lastFsIdx    =null;
let fsToggle     =false;

// Handlers de debounce
const debounceTimers={},holdTimers={},pressTimes={};
function attachFS(idx,el){
  function onPress(){ if(debounceTimers[idx]) return; debounceTimers[idx]=setTimeout(()=>{debounceTimers[idx]=null;},DEBOUNCE_MS); el.classList.add('pressed'); pressTimes[idx]=Date.now(); if(idx===5) holdTimers[idx]=setTimeout(onFS6Hold,HOLD_MS); }
  function onRelease(){ el.classList.remove('pressed'); const held=Date.now()-(pressTimes[idx]||0); if(idx===5){ clearTimeout(holdTimers[idx]); if(held<HOLD_MS) onFS6Tap(); } else{ onFSPatch(idx); } }
  el.addEventListener('mousedown', e=>{e.preventDefault();onPress();});
  el.addEventListener('mouseup',   e=>{e.preventDefault();onRelease();});
  el.addEventListener('mouseleave',()=>{el.classList.remove('pressed');clearTimeout(holdTimers[idx]);});
  el.addEventListener('touchstart',e=>{e.preventDefault();onPress();},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();onRelease();},{passive:false});
  el.addEventListener('touchcancel',()=>{el.classList.remove('pressed');clearTimeout(holdTimers[idx]);});
}
fsEls.forEach((el,i)=>attachFS(i,el));

// ══════════════════════════════════════════════════════════════════
// §3 — Lógica de navegação
// ══════════════════════════════════════════════════════════════════
function onFSPatch(idx){
  if(bankSelect && preselectBank){
    const patchIdx=idx*2+(fsToggle?1:0);
    cam0.bank=preselectBank; cam0.patch=patchIdx; cam0.bankGroup=preselectGrp;
    bankSelect=false; preselectBank=null; lastFsIdx=idx;
    limparPatchAtual();
    const pc=BANKS_ALL.indexOf(cam0.bank)*10+patchIdx;
    enviarProgramChange(pc);
    flashConfirmRing(fsEls[idx]);
    showToast(`${cam0.bank}${patchIdx+1} — ${PATCH_NAMES[cam0.bank]?.[patchIdx]||''}`);
    gravarEstado(); renderizar(); return;
  }
  if(bankSelect){
    const grp=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);
    const escolhido=grp[idx]; if(!escolhido) return;
    preselectBank=escolhido; fsToggle=false;
    showToast(`BANCO ${escolhido} · CONFIRME COM FS1–5`);
    renderizar(); return;
  }
  // Modo de execução — toggle par/ímpar
  const visGroup=BANKS_ALL.slice(cam0.bankGroup*5,cam0.bankGroup*5+5);
  if(!visGroup.includes(cam0.bank)) return;
  const base=idx*2;
  if(lastFsIdx!==idx){ lastFsIdx=idx; fsToggle=(cam0.patch===base)?true:false; }
  else{ fsToggle=!fsToggle; }
  cam0.patch=base+(fsToggle?1:0);
  limparPatchAtual();
  const pc=BANKS_ALL.indexOf(cam0.bank)*10+cam0.patch;
  enviarProgramChange(pc);
  flashConfirmRing(fsEls[idx]);
  gravarEstado(); renderizar();
}

function onFS6Tap(){
  if(bankSelect){
    if(preselectBank){ fsToggle=!fsToggle; showToast(`${preselectBank} · LAYER ${fsToggle?'ÍMPAR':'PAR'}`); }
    else{ preselectGrp=preselectGrp===0?1:0; const g=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5); showToast(`GRUPO ${g[0]}–${g[4]}`); }
    renderizar(); return;
  }
  registrarTap();
}

function onFS6Hold(){
  if(bankSelect){ bankSelect=false; preselectBank=null; showToast('BANK SELECT CANCELADO'); }
  else{ bankSelect=true; preselectBank=null; preselectGrp=cam0.bankGroup; fsToggle=false; const g=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5); showToast(`BANK SELECT · ${g[0]}–${g[4]}`); }
  renderizar();
}

// ── Efeitos visuais ─────────────────────────────────────────────
function flashConfirmRing(el){ const r=document.createElement('div'); r.className='confirm-ring'; el.appendChild(r); setTimeout(()=>r.remove(),400); }
let toastTimer=null;
function showToast(msg){ $toast.textContent=msg; $toast.classList.add('show'); if(toastTimer) clearTimeout(toastTimer); toastTimer=setTimeout(()=>$toast.classList.remove('show'),2200); }

// ── Bloqueios ───────────────────────────────────────────────────
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('gestureend',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{ if(e.touches.length>1) e.preventDefault(); },{passive:false});

// ══════════════════════════════════════════════════════════════════
// Inicialização
// ══════════════════════════════════════════════════════════════════
carregarEstado();
cam0.bankGroup = BANKS_ALL.indexOf(cam0.bank)>=5?1:0;
renderizar();
iniciarPiscarBeat(Math.round(60000/cam0.bpm));
iniciarMIDI();
showToast('FMC-AM 6F v4 · PRONTO');

// ══════════════════════════════════════════════════════════════════
// MIDI — Conexão com gesto do usuário + detecção da G1On
// ══════════════════════════════════════════════════════════════════
let midiAccess = null;
let midiOut    = null;
let midiReady  = false;
let g1onDetectada = false;

// Palavras-chave para detectar a G1On pelo nome da porta
const ZOOM_PORT_KEYWORDS = ['zoom', 'g1on', 'g1xon', 'g1', 'g-1'];

function nomeContemZoom(nome){
  const lower = (nome||'').toLowerCase();
  return ZOOM_PORT_KEYWORDS.some(k => lower.includes(k));
}

function atualizarBarraMIDI(estado, texto){
  const dot = document.getElementById('midiBarDot');
  const txt = document.getElementById('midiBarTexto');
  const btn = document.getElementById('midiBarBtn');
  if(!dot||!txt) return;

  // Remove todas as classes de estado
  dot.className = 'midi-bar-dot ' + estado;
  txt.className = 'midi-bar-texto' + (estado==='g1on'?' g1on':estado==='erro'?' erro':'');
  txt.innerHTML = texto;

  if(btn){
    if(estado==='g1on' || estado==='conectado'){
      btn.textContent = 'CONECTADO ✓';
      btn.className = 'midi-bar-btn ' + (estado==='g1on'?'g1on':'ok');
    } else if(estado==='aguardando'){
      btn.textContent = 'AGUARDANDO…';
      btn.className = 'midi-bar-btn loading';
    } else if(estado==='erro'){
      btn.textContent = 'TENTAR NOVAMENTE';
      btn.className = 'midi-bar-btn';
    } else {
      btn.textContent = 'CONECTAR MIDI';
      btn.className = 'midi-bar-btn';
    }
  }
}

async function conectarMIDI(){
  if(!navigator.requestMIDIAccess){
    atualizarBarraMIDI('erro', 'Web MIDI API não suportada neste browser. Use Chrome.');
    return;
  }

  atualizarBarraMIDI('aguardando', 'Solicitando permissão MIDI…');

  // Tenta com sysex primeiro; fallback sem sysex
  let acesso = null;
  try {
    acesso = await navigator.requestMIDIAccess({ sysex: true });
  } catch(e1) {
    try {
      acesso = await navigator.requestMIDIAccess({ sysex: false });
      atualizarBarraMIDI('aguardando', 'Conectado sem SysEx (permissão limitada)');
    } catch(e2) {
      atualizarBarraMIDI('erro', 'Permissão negada. Verifique as permissões do browser.');
      return;
    }
  }

  midiAccess = acesso;
  midiReady  = true;
  midiAccess.onstatechange = onMidiStateChange;

  // Conecta entradas para receber mensagens
  for(const input of midiAccess.inputs.values()){
    input.onmidimessage = onMensagemMIDI;
  }

  verificarPortas();
}

function verificarPortas(){
  if(!midiAccess) return;

  const outputs = [...midiAccess.outputs.values()];
  const inputs  = [...midiAccess.inputs.values()];

  if(outputs.length === 0){
    atualizarBarraMIDI('aguardando', 'Nenhum dispositivo MIDI encontrado. Conecte a pedaleira e tente novamente.');
    midiOut = null;
    return;
  }

  // Procura especificamente pela G1On
  const zoomOut = outputs.find(o => nomeContemZoom(o.name));
  const zoomIn  = inputs.find(i  => nomeContemZoom(i.name));

  if(zoomOut){
    midiOut = zoomOut;
    g1onDetectada = true;
    atualizarBarraMIDI('g1on',
      `<strong>Zoom G1On detectada</strong> · ${zoomOut.name} · Pronta para envio`
    );
    // Requisita dump imediato ao conectar
    setTimeout(requisitarDump, 500);
  } else {
    // Usa primeira porta disponível
    midiOut = outputs[0];
    g1onDetectada = false;
    atualizarBarraMIDI('conectado',
      `<strong>${outputs.length} porta(s) MIDI</strong> · ${midiOut.name} · G1On não identificada`
    );
  }
}

function onMidiStateChange(e){
  const p = e.port;
  if(p.type === 'output'){
    if(p.state === 'connected'){
      if(!midiOut || nomeContemZoom(p.name)){
        midiOut = p;
      }
    }
    if(p.state === 'disconnected' && midiOut?.id === p.id){
      midiOut = null;
      g1onDetectada = false;
    }
    verificarPortas();
  }
  if(p.type === 'input' && p.state === 'connected'){
    p.onmidimessage = onMensagemMIDI;
  }
}

function iniciarMIDI(){
  // Não conecta automaticamente — aguarda gesto do usuário
  atualizarBarraMIDI('off', 'Toque em <strong>CONECTAR MIDI</strong> para iniciar');
}

</script>
