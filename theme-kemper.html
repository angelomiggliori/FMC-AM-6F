<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FMC-AM 6F · Kemper Stage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap');

:root {
  --bg:         #0c0c0e;
  --chassis:    #161618;
  --surface:    #1e1e22;
  --surface2:   #26262c;
  --border:     #323238;
  --border2:    #3e3e46;
  --amber:      #ffb930;
  --amber-dim:  #6b4c10;
  --amber-glow: rgba(255,185,48,.15);
  --white-text: #f0f0f0;
  --gray-text:  #8888a0;
  --led-a:      #00ff88;
  --led-b:      #ff9900;
  --led-c:      #ff2244;
  --led-d:      #00ddff;
  --led-e:      #ffffff;
  --tap-color:  #ffb930;
  --fs-w: 86px;
  --fs-h: 86px;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--white-text);
  font-family:'DM Sans', sans-serif;
  overflow:hidden;
  user-select:none; -webkit-user-select:none;
  touch-action:manipulation;
}
body { display:flex; flex-direction:column; align-items:center; justify-content:center; }

/* Very subtle noise */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}

/* ── Chassis — Kemper's minimalist aluminum slab ─ */
.chassis {
  position:relative; z-index:1;
  width:min(98vw, 820px);
  background:var(--chassis);
  border:1px solid var(--border);
  border-radius:6px;
  padding:16px 18px 14px;
  box-shadow:
    0 0 0 1px #0a0a0c,
    0 1px 0 rgba(255,255,255,.04) inset,
    0 -1px 0 rgba(0,0,0,.4) inset,
    0 12px 60px rgba(0,0,0,.9);
  display:flex; flex-direction:column; gap:12px;
  min-height:0; overflow:hidden;
}

/* Ultra-thin amber accent line at top */
.chassis::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent 0%, var(--amber) 30%, var(--amber) 70%, transparent 100%);
  border-radius:6px 6px 0 0;
  opacity:.6;
}

/* ── Top bar ─────────────────────────────────── */
.top-bar { display:flex; align-items:center; gap:12px; }

.logo {
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(14px,2.2vw,20px);
  letter-spacing:.14em; color:var(--amber);
  text-shadow:0 0 20px var(--amber-glow);
  white-space:nowrap;
}
.logo-sub {
  font-family:'DM Mono', monospace;
  font-size:clamp(9px,1.4vw,12px); font-weight:400;
  color:var(--gray-text); letter-spacing:.1em;
  margin-left:6px; vertical-align:middle;
}

/* ── Main display — Kemper's large central screen ─ */
.display {
  flex:1;
  background:#0e0e12;
  border:1px solid var(--border);
  border-radius:5px;
  padding:8px 16px;
  display:flex; align-items:center; gap:14px;
  min-width:0;
  box-shadow:inset 0 0 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.02);
  position:relative; overflow:hidden;
}
/* Bank color left edge — thicker, more pronounced */
.display::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
  background:var(--bank-color,var(--amber));
  box-shadow:0 0 16px var(--bank-color,var(--amber)), 4px 0 20px var(--bank-color,rgba(255,185,48,.1));
  transition:background .3s, box-shadow .3s;
}

.display-main { flex:1; min-width:0; padding-left:6px; }

.patch-id {
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(26px,6vw,48px);
  color:var(--bank-color, var(--amber));
  text-shadow:0 0 24px var(--bank-color,var(--amber-glow)), 0 0 60px var(--bank-color,transparent);
  letter-spacing:.1em; line-height:1;
  transition:color .2s, text-shadow .2s;
}
.patch-id.blink { animation:blink-kemper .5s ease-in-out infinite; }
@keyframes blink-kemper { 0%,100%{opacity:1;} 50%{opacity:.05;} }

.patch-name {
  font-family:'DM Sans', sans-serif; font-weight:300;
  font-size:clamp(9px,1.5vw,13px); color:var(--gray-text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:3px; letter-spacing:.08em; text-transform:uppercase;
}

.fx-indicators { display:flex; gap:4px; margin-top:5px; flex-wrap:wrap; }
.fx-tag {
  font-family:'DM Mono',monospace; font-size:8px;
  padding:1px 6px; border-radius:2px; border:1px solid;
  letter-spacing:.08em; transition:all .2s;
}
.fx-tag.delay    { color:#00ffcc; border-color:#00ffcc22; background:rgba(0,255,204,.05); }
.fx-tag.mod      { color:#cc99ff; border-color:#cc99ff22; background:rgba(204,153,255,.05); }
.fx-tag.reverb   { color:#6699ff; border-color:#6699ff22; background:rgba(102,153,255,.05); }
.fx-tag.drive    { color:#ff9944; border-color:#ff994422; background:rgba(255,153,68,.05); }
.fx-tag.dynamics { color:#ffdd44; border-color:#ffdd4422; background:rgba(255,221,68,.05); }
.fx-tag.off      { opacity:.2; filter:grayscale(1); }

.bpm-display {
  font-family:'DM Mono', monospace; font-weight:500;
  font-size:clamp(9px,1.5vw,12px); color:var(--amber);
  white-space:nowrap; border-left:1px solid var(--border);
  padding-left:14px; line-height:1.6; text-align:center;
}
.bpm-val {
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(20px,3.5vw,32px); display:block;
  text-shadow:0 0 16px var(--amber-glow);
}

/* ── Middle ─────────────────────────────────── */
.middle { display:flex; min-height:0; }

/* ── FS Grid ─────────────────────────────────── */
.fs-grid {
    flex:1; display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);
    gap:clamp(8px,2vw,16px); 
    align-content:center;
    justify-items:center; 
    padding:6px 4px;
    width:100%;
  }
.fs-col { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }

/* Kemper Stage footswitches: flat rectangular with colored LED ring */
.fs-btn {
    width:clamp(72px, 22vw, 110px); height:clamp(72px, 22vw, 110px);
  width:var(--fs-w); height:var(--fs-h);
  background:linear-gradient(170deg, #242428 0%, #18181c 100%);
  border:1px solid var(--border2);
  border-radius:8px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'DM Mono', monospace; font-weight:500;
  font-size:clamp(10px,1.5vw,12px);
  color:var(--gray-text); letter-spacing:.06em;
  position:relative;
  transition:border-color .1s, box-shadow .1s, background .1s, transform .08s;
  box-shadow:
    0 2px 6px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.04),
    inset 0 -1px 0 rgba(0,0,0,.3);
  touch-action:none; -webkit-tap-highlight-color:transparent; flex-shrink:0; overflow:hidden;
}
.fs-btn:active, .fs-btn.pressed {
  transform:scale(.94);
  box-shadow:0 1px 3px rgba(0,0,0,.8), inset 0 1px 6px rgba(0,0,0,.5);
}

/* Colored LED bar — PAR: top */
.fs-btn.lit-top {
  border-color:var(--bank-color,var(--led-a));
  background:linear-gradient(170deg, #202028 0%, #161620 100%);
  color:var(--white-text);
  box-shadow:
    0 2px 6px rgba(0,0,0,.5),
    0 -6px 14px -4px var(--bank-color,var(--led-a)),
    inset 0 1px 0 rgba(255,255,255,.04);
}
.fs-btn.lit-top::after {
  content:''; position:absolute;
  top:0; left:10px; right:10px; height:2px;
  background:var(--bank-color,var(--led-a));
  border-radius:0 0 4px 4px;
  box-shadow:0 0 10px var(--bank-color,var(--led-a)), 0 2px 8px var(--bank-color,var(--led-a));
}
/* ÍMPAR: bottom */
.fs-btn.lit-bottom {
  border-color:var(--bank-color,var(--led-a));
  background:linear-gradient(170deg, #161620 0%, #202028 100%);
  color:var(--white-text);
  box-shadow:
    0 2px 6px rgba(0,0,0,.5),
    0 6px 14px -4px var(--bank-color,var(--led-a)),
    inset 0 -1px 0 rgba(255,255,255,.02);
}
.fs-btn.lit-bottom::before {
  content:''; position:absolute;
  bottom:0; left:10px; right:10px; height:2px;
  background:var(--bank-color,var(--led-a));
  border-radius:4px 4px 0 0;
  box-shadow:0 0 10px var(--bank-color,var(--led-a)), 0 -2px 8px var(--bank-color,var(--led-a));
  z-index:1;
}

.fs-btn.preselect-mode {
  border-color:var(--amber);
  background:linear-gradient(170deg, #201c10 0%, #161408 100%);
  animation:preselect-kemper .6s ease-in-out infinite alternate;
}
@keyframes preselect-kemper { from{opacity:.55;} to{opacity:1;} }

/* FS6 — TAP */
.fs-btn.tap-btn { border-color:var(--border); }
.fs-btn.tap-btn.tap-beat {
  background:linear-gradient(170deg, #201a08 0%, #161204 100%);
  border-color:var(--tap-color); color:var(--tap-color);
  box-shadow:0 2px 6px rgba(0,0,0,.5), 0 0 18px rgba(255,185,48,.4), inset 0 1px 0 rgba(255,185,48,.06);
}
.fs-btn.tap-btn.tap-off {
  border-color:#222228;
  background:linear-gradient(170deg, #111116 0%, #0d0d10 100%);
  color:#2a2a30;
  box-shadow:0 2px 4px rgba(0,0,0,.8);
}
.fs-btn.tap-btn.delay-sync { --tap-color:#00ffcc; }
.fs-btn.tap-btn.rate-sync  { --tap-color:#cc99ff; }

.fs-label {
  font-family:'DM Sans',sans-serif; font-weight:300;
  font-size:clamp(7px,1vw,9px); color:var(--gray-text);
  letter-spacing:.05em; text-align:center;
  max-width:82px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  text-transform:uppercase;
}



/* ── Status bar ─────────────────────────────── */
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:5px 10px; background:#0e0e12;
  border:1px solid var(--border); border-radius:5px; gap:6px;
}
.status-item { display:flex; align-items:center; gap:5px; font-family:'DM Mono',monospace; font-size:9px; color:var(--gray-text); }
.midi-indicator { width:7px; height:7px; border-radius:50%; background:#222; transition:background .2s, box-shadow .2s; flex-shrink:0; }
.midi-indicator.sim       { background:#2a2a38; }
.midi-indicator.connected { background:var(--led-a); box-shadow:0 0 6px var(--led-a); }
.midi-indicator.error     { background:var(--led-c); box-shadow:0 0 6px var(--led-c); }
.midi-indicator.activity  { background:var(--amber); box-shadow:0 0 8px var(--amber); }

.mode-badge {
  font-family:'DM Mono',sans-serif; font-size:9px; font-weight:500;
  padding:2px 10px; border-radius:3px; letter-spacing:.1em; text-transform:uppercase;
}
.mode-badge.normal     { background:rgba(255,185,48,.06); color:var(--amber-dim); border:1px solid rgba(255,185,48,.15); }
.mode-badge.banksel    { background:rgba(255,185,48,.1); color:var(--amber); border:1px solid rgba(255,185,48,.3); animation:preselect-kemper .6s ease-in-out infinite alternate; }
.mode-badge.confirming { background:rgba(255,255,255,.06); color:#f0f0f0; border:1px solid rgba(255,255,255,.2); animation:preselect-kemper .5s ease-in-out infinite alternate; }

.confirm-ring { position:absolute; inset:-4px; border-radius:8px; border:1px solid rgba(255,185,48,.5); animation:confirmRing-kemper .5s ease forwards; pointer-events:none; }
@keyframes confirmRing-kemper { 0%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(1.06);} }

.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#161618; border:1px solid var(--amber);
  color:var(--amber); font-family:'DM Mono',monospace; font-size:11px;
  padding:7px 18px; border-radius:4px; letter-spacing:.1em;
  opacity:0; transition:all .3s; pointer-events:none; z-index:100; white-space:nowrap;
  box-shadow:0 0 24px var(--amber-glow);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media(max-width:600px){ :root{--fs-w:60px;--fs-h:60px;} }
@media(max-width:400px){ :root{--fs-w:50px;--fs-h:50px;} }
@media(max-height:500px) and (orientation:landscape){ :root{--fs-w:56px;--fs-h:56px;} .chassis{padding:8px 12px;gap:8px;} }

  /* ── Barra MIDI externa (abaixo do chassis) ─── */
  .midi-bar {
    position:relative; z-index:2;
    width:min(98vw, 820px);
    margin-top:10px;
    background:#0a0a0e;
    border:1px solid #2a2a35;
    border-radius:10px;
    padding:8px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    box-shadow:0 4px 20px rgba(0,0,0,.6);
  }

  .midi-bar-dot {
    width:9px; height:9px; border-radius:50%;
    flex-shrink:0;
    background:#2a2a35;
    transition:background .3s, box-shadow .3s;
  }
  .midi-bar-dot.off        { background:#2a2a35; }
  .midi-bar-dot.aguardando { background:#555566; animation:pulse-wait .9s ease-in-out infinite alternate; }
  .midi-bar-dot.conectado  { background:#00ff66; box-shadow:0 0 8px #00ff66; }
  .midi-bar-dot.g1on       { background:#00ffcc; box-shadow:0 0 10px #00ffcc; animation:pulse-g1on 1.2s ease-in-out infinite alternate; }
  .midi-bar-dot.erro       { background:#ff2244; box-shadow:0 0 8px #ff2244; }
  @keyframes pulse-wait  { from{opacity:.3;} to{opacity:1;} }
  @keyframes pulse-g1on  { from{box-shadow:0 0 6px #00ffcc;} to{box-shadow:0 0 16px #00ffcc;} }

  .midi-bar-texto {
    font-family:'Share Tech Mono', monospace;
    font-size:11px;
    color:#666677;
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:.04em;
  }
  .midi-bar-texto strong { color:#aaaacc; }
  .midi-bar-texto.g1on   { color:#00ffcc; }
  .midi-bar-texto.erro   { color:#ff4455; }

  .midi-bar-btn {
    font-family:'Share Tech Mono', monospace;
    font-size:10px;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding:5px 14px;
    border-radius:6px;
    border:1px solid #333344;
    background:#111118;
    color:#888899;
    cursor:pointer;
    flex-shrink:0;
    transition:all .2s;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  }
  .midi-bar-btn:hover   { border-color:#555566; color:#aaaacc; }
  .midi-bar-btn.loading { border-color:#ffaa00; color:#ffaa00; animation:pulse-wait .6s ease-in-out infinite alternate; }
  .midi-bar-btn.ok      { border-color:#00ff6633; color:#00ff66; pointer-events:none; }
  .midi-bar-btn.g1on    { border-color:#00ffcc55; color:#00ffcc; pointer-events:none; }


  /* ── Build badge ─────────────────────────── */
  .build-badge {
    font-family:'Share Tech Mono',monospace;
    font-size:8px; letter-spacing:.12em;
    color:#ffffff; background:#2a2a3a;
    border:1px solid #3a3a50;
    border-radius:3px;
    padding:1px 6px;
    white-space:nowrap;
    flex-shrink:0;
  }


  /* ── Volume display ──────────────────────── */
  .vol-display {
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(10px,1.8vw,13px);
    white-space:nowrap;
    border-right:1px solid var(--border);
    padding-right:12px;
    line-height:1.4;
    text-align:center;
    color:var(--text-dim);
    transition:color .3s;
  }
  .vol-val {
    font-size:clamp(14px,2.5vw,20px);
    font-weight:700;
    display:block;
    font-family:'Orbitron',sans-serif;
  }
</style>
</head>
<body>
<div class="chassis">
  <div class="top-bar">
    <div class="logo">FMC·AM<span class="logo-sub">6F</span></div>
    <div class="display" id="mainDisplay">
      <div class="vol-display">
        <span class="vol-val" id="patchVolume">---</span>
        <span>VOL</span>
      </div>
      <div class="display-main">
        <div class="patch-id" id="patchId">A0</div>
        <div class="patch-name" id="patchName">CLEAN BOOST</div>
        <div class="fx-indicators" id="fxIndicators"></div>
      </div>
      <div class="bpm-display">
        <span class="bpm-val" id="bpmVal">120</span>
        <span>BPM</span>
      </div>
    </div>
  </div>
  <div class="middle">
    <div class="fs-grid" id="fsGrid"></div>
  </div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-item">
      <div class="midi-indicator sim" id="midiIndicator"></div>
      <span id="midiPortLabel">SIM</span>
    </div>
    <div class="mode-badge normal" id="modeBadge">PERFORM</div>
    <div class="status-item">
      <div class="midi-indicator connected"></div>
      <span id="memStatus">MEM OK</span>
    </div>
  </div>
  <div class="status-bar" style="margin-top:-6px;border-top:none;border-radius:0 0 5px 5px;padding:2px 8px;justify-content:space-between;">
    <span class="build-badge" title="Build ID">v4.2-b20260316-tap3</span>
    <span style="cursor:pointer;font-size:9px;color:#ff6b00;letter-spacing:.08em;padding:2px 6px;border:1px solid #ff6b00;border-radius:3px;" onclick="limparCachePatches()" title="Apaga cache de patches e recarrega seed">↺ CACHE</span>
    <span class="flash-health" id="flashHealth" onclick="mostrarDetalhesSaude()" title="Clique para detalhes">◌ carregando…</span>
  </div>

<!-- Barra de status MIDI — fora do chassis -->
<div class="midi-bar" id="midiBar">
  <div class="midi-bar-dot off" id="midiBarDot"></div>
  <div class="midi-bar-texto" id="midiBarTexto">MIDI não iniciado</div>
  <button class="midi-bar-btn" id="midiBarBtn" onclick="conectarMIDI()">CONECTAR MIDI</button>
</div>

</div>
<div class="toast" id="toast"></div>


<script>
// Tema: KEMPER STAGE · FMC-AM 6F
// Motor: fmc-engine.js (não edite aqui — edite o engine)
const THEME_NAME = 'KEMPER STAGE · FMC-AM 6F';
</script>
<script src="fmc-engine.js"></script>
</body>
