<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FMC-AM 6F · Kemper Stage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap');

:root {
  --bg:         #0c0c0e;
  --chassis:    #161618;
  --surface:    #1e1e22;
  --surface2:   #26262c;
  --border:     #323238;
  --border2:    #3e3e46;
  --amber:      #ffb930;
  --amber-dim:  #6b4c10;
  --amber-glow: rgba(255,185,48,.15);
  --white-text: #f0f0f0;
  --gray-text:  #8888a0;
  --led-a:      #00ff88;
  --led-b:      #ff9900;
  --led-c:      #ff2244;
  --led-d:      #00ddff;
  --led-e:      #ffffff;
  --tap-color:  #ffb930;
  --fs-w: 86px;
  --fs-h: 86px;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--white-text);
  font-family:'DM Sans', sans-serif;
  overflow:hidden;
  user-select:none; -webkit-user-select:none;
  touch-action:manipulation;
}
body { display:flex; flex-direction:column; align-items:center; justify-content:center; }

/* Very subtle noise */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}

/* ── Chassis — Kemper's minimalist aluminum slab ─ */
.chassis {
  position:relative; z-index:1;
  width:min(98vw, 820px);
  background:var(--chassis);
  border:1px solid var(--border);
  border-radius:6px;
  padding:16px 18px 14px;
  box-shadow:
    0 0 0 1px #0a0a0c,
    0 1px 0 rgba(255,255,255,.04) inset,
    0 -1px 0 rgba(0,0,0,.4) inset,
    0 12px 60px rgba(0,0,0,.9);
  display:flex; flex-direction:column; gap:12px;
  min-height:0; overflow:hidden;
}

/* Ultra-thin amber accent line at top */
.chassis::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent 0%, var(--amber) 30%, var(--amber) 70%, transparent 100%);
  border-radius:6px 6px 0 0;
  opacity:.6;
}

/* ── Top bar ─────────────────────────────────── */
.top-bar { display:flex; align-items:center; gap:12px; }

.logo {
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(14px,2.2vw,20px);
  letter-spacing:.14em; color:var(--amber);
  text-shadow:0 0 20px var(--amber-glow);
  white-space:nowrap;
}
.logo-sub {
  font-family:'DM Mono', monospace;
  font-size:clamp(9px,1.4vw,12px); font-weight:400;
  color:var(--gray-text); letter-spacing:.1em;
  margin-left:6px; vertical-align:middle;
}

/* ── Main display — Kemper's large central screen ─ */
.display {
  flex:1;
  background:#0e0e12;
  border:1px solid var(--border);
  border-radius:5px;
  padding:8px 16px;
  display:flex; align-items:center; gap:14px;
  min-width:0;
  box-shadow:inset 0 0 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.02);
  position:relative; overflow:hidden;
}
/* Bank color left edge — thicker, more pronounced */
.display::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
  background:var(--bank-color,var(--amber));
  box-shadow:0 0 16px var(--bank-color,var(--amber)), 4px 0 20px var(--bank-color,rgba(255,185,48,.1));
  transition:background .3s, box-shadow .3s;
}

.display-main { flex:1; min-width:0; padding-left:6px; }

.patch-id {
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(26px,6vw,48px);
  color:var(--bank-color, var(--amber));
  text-shadow:0 0 24px var(--bank-color,var(--amber-glow)), 0 0 60px var(--bank-color,transparent);
  letter-spacing:.1em; line-height:1;
  transition:color .2s, text-shadow .2s;
}
.patch-id.blink { animation:blink-kemper .5s ease-in-out infinite; }
@keyframes blink-kemper { 0%,100%{opacity:1;} 50%{opacity:.05;} }

.patch-name {
  font-family:'DM Sans', sans-serif; font-weight:300;
  font-size:clamp(9px,1.5vw,13px); color:var(--gray-text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:3px; letter-spacing:.08em; text-transform:uppercase;
}

.fx-indicators { display:flex; gap:4px; margin-top:5px; flex-wrap:wrap; }
.fx-tag {
  font-family:'DM Mono',monospace; font-size:8px;
  padding:1px 6px; border-radius:2px; border:1px solid;
  letter-spacing:.08em; transition:all .2s;
}
.fx-tag.delay    { color:#00ffcc; border-color:#00ffcc22; background:rgba(0,255,204,.05); }
.fx-tag.mod      { color:#cc99ff; border-color:#cc99ff22; background:rgba(204,153,255,.05); }
.fx-tag.reverb   { color:#6699ff; border-color:#6699ff22; background:rgba(102,153,255,.05); }
.fx-tag.drive    { color:#ff9944; border-color:#ff994422; background:rgba(255,153,68,.05); }
.fx-tag.dynamics { color:#ffdd44; border-color:#ffdd4422; background:rgba(255,221,68,.05); }
.fx-tag.off      { opacity:.2; filter:grayscale(1); }

.bpm-display {
  font-family:'DM Mono', monospace; font-weight:500;
  font-size:clamp(9px,1.5vw,12px); color:var(--amber);
  white-space:nowrap; border-left:1px solid var(--border);
  padding-left:14px; line-height:1.6; text-align:center;
}
.bpm-val {
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(20px,3.5vw,32px); display:block;
  text-shadow:0 0 16px var(--amber-glow);
}

/* ── Middle ─────────────────────────────────── */
.middle { display:flex; min-height:0; }

/* ── FS Grid ─────────────────────────────────── */
.fs-grid {
    flex:1; display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,1fr);
    gap:clamp(8px,2vw,16px); 
    align-content:center;
    justify-items:center; 
    padding:6px 4px;
    width:100%;
  }
.fs-col { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }

/* Kemper Stage footswitches: flat rectangular with colored LED ring */
.fs-btn {
    width:clamp(72px, 22vw, 110px); height:clamp(72px, 22vw, 110px);
  width:var(--fs-w); height:var(--fs-h);
  background:linear-gradient(170deg, #242428 0%, #18181c 100%);
  border:1px solid var(--border2);
  border-radius:8px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'DM Mono', monospace; font-weight:500;
  font-size:clamp(10px,1.5vw,12px);
  color:var(--gray-text); letter-spacing:.06em;
  position:relative;
  transition:border-color .1s, box-shadow .1s, background .1s, transform .08s;
  box-shadow:
    0 2px 6px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.04),
    inset 0 -1px 0 rgba(0,0,0,.3);
  touch-action:none; -webkit-tap-highlight-color:transparent; flex-shrink:0; overflow:hidden;
}
.fs-btn:active, .fs-btn.pressed {
  transform:scale(.94);
  box-shadow:0 1px 3px rgba(0,0,0,.8), inset 0 1px 6px rgba(0,0,0,.5);
}

/* Colored LED bar — PAR: top */
.fs-btn.lit-top {
  border-color:var(--bank-color,var(--led-a));
  background:linear-gradient(170deg, #202028 0%, #161620 100%);
  color:var(--white-text);
  box-shadow:
    0 2px 6px rgba(0,0,0,.5),
    0 -6px 14px -4px var(--bank-color,var(--led-a)),
    inset 0 1px 0 rgba(255,255,255,.04);
}
.fs-btn.lit-top::after {
  content:''; position:absolute;
  top:0; left:10px; right:10px; height:2px;
  background:var(--bank-color,var(--led-a));
  border-radius:0 0 4px 4px;
  box-shadow:0 0 10px var(--bank-color,var(--led-a)), 0 2px 8px var(--bank-color,var(--led-a));
}
/* ÍMPAR: bottom */
.fs-btn.lit-bottom {
  border-color:var(--bank-color,var(--led-a));
  background:linear-gradient(170deg, #161620 0%, #202028 100%);
  color:var(--white-text);
  box-shadow:
    0 2px 6px rgba(0,0,0,.5),
    0 6px 14px -4px var(--bank-color,var(--led-a)),
    inset 0 -1px 0 rgba(255,255,255,.02);
}
.fs-btn.lit-bottom::before {
  content:''; position:absolute;
  bottom:0; left:10px; right:10px; height:2px;
  background:var(--bank-color,var(--led-a));
  border-radius:4px 4px 0 0;
  box-shadow:0 0 10px var(--bank-color,var(--led-a)), 0 -2px 8px var(--bank-color,var(--led-a));
  z-index:1;
}

.fs-btn.preselect-mode {
  border-color:var(--amber);
  background:linear-gradient(170deg, #201c10 0%, #161408 100%);
  animation:preselect-kemper .6s ease-in-out infinite alternate;
}
@keyframes preselect-kemper { from{opacity:.55;} to{opacity:1;} }

/* FS6 — TAP */
.fs-btn.tap-btn { border-color:var(--border); }
.fs-btn.tap-btn.tap-beat {
  background:linear-gradient(170deg, #201a08 0%, #161204 100%);
  border-color:var(--tap-color); color:var(--tap-color);
  box-shadow:0 2px 6px rgba(0,0,0,.5), 0 0 18px rgba(255,185,48,.4), inset 0 1px 0 rgba(255,185,48,.06);
}
.fs-btn.tap-btn.tap-off {
  border-color:#222228;
  background:linear-gradient(170deg, #111116 0%, #0d0d10 100%);
  color:#2a2a30;
  box-shadow:0 2px 4px rgba(0,0,0,.8);
}
.fs-btn.tap-btn.delay-sync { --tap-color:#00ffcc; }
.fs-btn.tap-btn.rate-sync  { --tap-color:#cc99ff; }

.fs-label {
  font-family:'DM Sans',sans-serif; font-weight:300;
  font-size:clamp(7px,1vw,9px); color:var(--gray-text);
  letter-spacing:.05em; text-align:center;
  max-width:82px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  text-transform:uppercase;
}



/* ── Status bar ─────────────────────────────── */
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:5px 10px; background:#0e0e12;
  border:1px solid var(--border); border-radius:5px; gap:6px;
}
.status-item { display:flex; align-items:center; gap:5px; font-family:'DM Mono',monospace; font-size:9px; color:var(--gray-text); }
.midi-indicator { width:7px; height:7px; border-radius:50%; background:#222; transition:background .2s, box-shadow .2s; flex-shrink:0; }
.midi-indicator.sim       { background:#2a2a38; }
.midi-indicator.connected { background:var(--led-a); box-shadow:0 0 6px var(--led-a); }
.midi-indicator.error     { background:var(--led-c); box-shadow:0 0 6px var(--led-c); }
.midi-indicator.activity  { background:var(--amber); box-shadow:0 0 8px var(--amber); }

.mode-badge {
  font-family:'DM Mono',sans-serif; font-size:9px; font-weight:500;
  padding:2px 10px; border-radius:3px; letter-spacing:.1em; text-transform:uppercase;
}
.mode-badge.normal     { background:rgba(255,185,48,.06); color:var(--amber-dim); border:1px solid rgba(255,185,48,.15); }
.mode-badge.banksel    { background:rgba(255,185,48,.1); color:var(--amber); border:1px solid rgba(255,185,48,.3); animation:preselect-kemper .6s ease-in-out infinite alternate; }
.mode-badge.confirming { background:rgba(255,255,255,.06); color:#f0f0f0; border:1px solid rgba(255,255,255,.2); animation:preselect-kemper .5s ease-in-out infinite alternate; }

.confirm-ring { position:absolute; inset:-4px; border-radius:8px; border:1px solid rgba(255,185,48,.5); animation:confirmRing-kemper .5s ease forwards; pointer-events:none; }
@keyframes confirmRing-kemper { 0%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(1.06);} }

.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#161618; border:1px solid var(--amber);
  color:var(--amber); font-family:'DM Mono',monospace; font-size:11px;
  padding:7px 18px; border-radius:4px; letter-spacing:.1em;
  opacity:0; transition:all .3s; pointer-events:none; z-index:100; white-space:nowrap;
  box-shadow:0 0 24px var(--amber-glow);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media(max-width:600px){ :root{--fs-w:60px;--fs-h:60px;} }
@media(max-width:400px){ :root{--fs-w:50px;--fs-h:50px;} }
@media(max-height:500px) and (orientation:landscape){ :root{--fs-w:56px;--fs-h:56px;} .chassis{padding:8px 12px;gap:8px;} }
</style>
</head>
<body>
<div class="chassis">
  <div class="top-bar">
    <div class="logo">FMC·AM<span class="logo-sub">6F</span></div>
    <div class="display" id="mainDisplay">
      <div class="display-main">
        <div class="patch-id" id="patchId">A0</div>
        <div class="patch-name" id="patchName">CLEAN BOOST</div>
        <div class="fx-indicators" id="fxIndicators"></div>
      </div>
      <div class="bpm-display">
        <span class="bpm-val" id="bpmVal">120</span>
        <span>BPM</span>
      </div>
    </div>
  </div>
  <div class="middle">
    <div class="fs-grid" id="fsGrid"></div>
  </div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-item">
      <div class="midi-indicator sim" id="midiIndicator"></div>
      <span id="midiPortLabel">SIM</span>
    </div>
    <div class="mode-badge normal" id="modeBadge">PERFORM</div>
    <div class="status-item">
      <div class="midi-indicator connected"></div>
      <span id="memStatus">MEM OK</span>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
'use strict';
// ═══════════════════════════════════════════
// FMC-AM 6F · TEMA KEMPER STAGE
// Motor v4 completo
// ═══════════════════════════════════════════
const DEBOUNCE_MS=30,HOLD_MS=900,TAP_AVG_N=4,TAP_TIMEOUT=2000,BPM_MIN=30,BPM_MAX=240,SYSEX_IDLE_MS=600,SYSEX_DELAY=40,PC_TO_DUMP_MS=400,MEM_CHECK_MS=5000,MIDI_CH=0;
const ZOOM_MFR_ID=0x52,ZOOM_DEV_ID=0x00,ZOOM_MODEL_ID=0x5E,ZOOM_CMD_DUMP_REQ=0x29,ZOOM_CMD_DUMP_RESP=0x28;
const BANKS_ALL=['A','B','C','D','E','F','G','H','I','J'];
const BANK_COLOR={A:'#00ff88',B:'#ff9900',C:'#ff2244',D:'#00ddff',E:'#f0f0f0',F:'#00ff88',G:'#ff9900',H:'#ff2244',I:'#00ddff',J:'#f0f0f0'};
const PATCH_NAMES={A:['CLEAN BOOST','TUBE DRIVE','OCTO VERB','SHIMMER PAD','TAPE ECHO','HEAVY GATE','DUAL CHORUS','POLY DETUNE','PITCH SHIFT','DIRT BOX'],B:['BLUES JR','TWEED 4X10','AC SPANK','VOX CLEAN','BRIT CRUNCH','PLEXI ROAR','MESA TIGHT','SOLDANO HI','FRIEDMAN BE','BOGNER ECST'],C:['SMALL ROOM','LARGE HALL','PLATE VERB','SPRING TANK','SHIMMER 1','SHIMMER 2','CAVE ECHO','MOD DELAY','TAPE SLAP','PING PONG'],D:['WAH CRYBABY','OCTAVE FUZ','RING MOD','TREMOLO','VIBRATO','PHASER 4ST','FLANGER JET','CHORUS 2V','ROTARY','UNIVIBE'],E:['LOOPER 1','LOOPER 2','PHRASE 1','PHRASE 2','MIDI CLK','SYNC BEAT','POLY LOOP','HALF SPEED','REVERSE','REBUILD']};
for(const b of ['F','G','H','I','J']) PATCH_NAMES[b]=PATCH_NAMES[BANKS_ALL[BANKS_ALL.indexOf(b)-5]].map(n=>n+' II');
const ZOOM_FX_DB={0x0001:{name:'Comp',cat:'dynamics',tap:null},0x0002:{name:'RackComp',cat:'dynamics',tap:null},0x0003:{name:'SlowATTCK',cat:'dynamics',tap:null},0x0004:{name:'ZNR',cat:'dynamics',tap:null},0x0005:{name:'NoiseGate',cat:'dynamics',tap:null},0x0008:{name:'GraphicEQ',cat:'filter',tap:null},0x0009:{name:'ParaEQ',cat:'filter',tap:null},0x000A:{name:'AutoWah',cat:'filter',tap:'Rate'},0x000B:{name:'Resonance',cat:'filter',tap:null},0x000C:{name:'Cry',cat:'filter',tap:null},0x0010:{name:'OverDrive',cat:'drive',tap:null},0x0011:{name:'Distortion',cat:'drive',tap:null},0x0012:{name:'TS Drive',cat:'drive',tap:null},0x0013:{name:'Guvnor',cat:'drive',tap:null},0x0014:{name:'MetalWRLD',cat:'drive',tap:null},0x0015:{name:'FuzzSmile',cat:'drive',tap:null},0x0016:{name:'GreatMuff',cat:'drive',tap:null},0x0020:{name:'FD Combo',cat:'amp',tap:null},0x0021:{name:'VX Combo',cat:'amp',tap:null},0x0022:{name:'US Blues',cat:'amp',tap:null},0x0023:{name:'BG Crunch',cat:'amp',tap:null},0x0024:{name:'HW Stack',cat:'amp',tap:null},0x0025:{name:'MS Crunch',cat:'amp',tap:null},0x0026:{name:'Rectifier',cat:'amp',tap:null},0x0030:{name:'Chorus',cat:'mod',tap:'Rate'},0x0031:{name:'StereoChorus',cat:'mod',tap:'Rate'},0x0032:{name:'SuperChorus',cat:'mod',tap:'Rate'},0x0033:{name:'Flanger',cat:'mod',tap:'Rate'},0x0034:{name:'Vibrato',cat:'mod',tap:'Rate'},0x0035:{name:'Phaser',cat:'mod',tap:'Rate'},0x0036:{name:'Step',cat:'mod',tap:'Rate'},0x0037:{name:'Tremolo',cat:'mod',tap:'Rate'},0x0038:{name:'AutoPan',cat:'mod',tap:'Rate'},0x0039:{name:'RingMod',cat:'mod',tap:'Rate'},0x003A:{name:'Detune',cat:'mod',tap:null},0x003B:{name:'PitchShift',cat:'mod',tap:null},0x0040:{name:'MonoPitch',cat:'pitch',tap:null},0x0041:{name:'HPS',cat:'pitch',tap:null},0x0042:{name:'Octave',cat:'pitch',tap:null},0x0050:{name:'Delay',cat:'delay',tap:'Time'},0x0051:{name:'AnalogDelay',cat:'delay',tap:'Time'},0x0052:{name:'TapeEcho',cat:'delay',tap:'Time'},0x0053:{name:'ModDelay',cat:'delay',tap:'Time'},0x0054:{name:'FilterDelay',cat:'delay',tap:'Time'},0x0055:{name:'PingPongDly',cat:'delay',tap:'Time'},0x0056:{name:'ReverseDelay',cat:'delay',tap:'Time'},0x0060:{name:'Hall',cat:'reverb',tap:null},0x0061:{name:'Room',cat:'reverb',tap:null},0x0062:{name:'Spring',cat:'reverb',tap:null},0x0063:{name:'Arena',cat:'reverb',tap:null},0x0064:{name:'EarlyRef',cat:'reverb',tap:null},0x0070:{name:'Air',cat:'ambience',tap:null}};
const FX_PRECISA_TIME=new Set(['delay']),FX_PRECISA_RATE=new Set(['mod','filter']);
function criarEstadoPadrao(){return{bank:'A',patch:0,bpm:120,bankGroup:0};}
let cam0=criarEstadoPadrao();
function salvarCamada(n,d){try{localStorage.setItem(`fmc_cam${n}`,JSON.stringify(d));}catch(e){}}
function lerCamada(n){try{const s=localStorage.getItem(`fmc_cam${n}`);return s?JSON.parse(s):null;}catch(e){return null;}}
function gravarEstado(){const snap={bank:cam0.bank,patch:cam0.patch,bpm:cam0.bpm,bankGroup:cam0.bankGroup};salvarCamada(1,snap);salvarCamada(2,snap);salvarCamada(3,snap);}
function carregarEstado(){for(let n=1;n<=3;n++){const d=lerCamada(n);if(d&&d.bank&&BANKS_ALL.includes(d.bank)){cam0={...criarEstadoPadrao(),...d};logMIDI({type:'sx',label:`MEM CAM${n}`});return;}}cam0=criarEstadoPadrao();}
setInterval(()=>{const c1=lerCamada(1);if(!c1){gravarEstado();return;}const div=c1.bank!==cam0.bank||c1.patch!==cam0.patch||c1.bpm!==cam0.bpm||c1.bankGroup!==cam0.bankGroup;if(div){gravarEstado();const el=document.getElementById('memStatus');if(el){el.textContent='SYNC!';setTimeout(()=>el.textContent='MEM OK',800);}}},MEM_CHECK_MS);
let patchAtual={nome:null,efeitos:[],temTime:false,temRate:false,precisaSincBpm:false,efeitosTime:[],efeitosRate:[]};
function parseZoomDump(data){if(!data||data.length<10)return null;if(data[0]!==0xF0||data[1]!==ZOOM_MFR_ID||data[4]!==ZOOM_CMD_DUMP_RESP)return null;const info={nome:'',efeitos:[]};for(let i=0;i<5;i++){const offset=9+(i*20);if(offset+2>=data.length)break;const effectID=(data[offset]<<7)|data[offset+1];const enabled=(data[offset+2]&0x01)===1;const fxInfo=ZOOM_FX_DB[effectID]||{name:`FX_${effectID.toString(16).toUpperCase()}`,cat:'unknown',tap:null};info.efeitos.push({slot:i+1,id:effectID,nome:fxInfo.name,cat:fxInfo.cat,tap:fxInfo.tap,enabled});}if(data.length>124){const nb=Array.from(data.slice(114,124));info.nome=nb.filter(b=>b>=0x20&&b<0x7F).map(b=>String.fromCharCode(b)).join('').trim();}return info;}
function aplicarDump(info){if(!info)return;patchAtual.nome=info.nome||null;patchAtual.efeitos=info.efeitos;patchAtual.efeitosTime=info.efeitos.filter(e=>e.enabled&&e.tap==='Time');patchAtual.efeitosRate=info.efeitos.filter(e=>e.enabled&&e.tap==='Rate');patchAtual.temTime=patchAtual.efeitosTime.length>0;patchAtual.temRate=patchAtual.efeitosRate.length>0;patchAtual.precisaSincBpm=patchAtual.temTime||patchAtual.temRate;atualizarFxIndicators();const tapBtn=fsEls[5];tapBtn.classList.toggle('delay-sync',patchAtual.temTime);tapBtn.classList.toggle('rate-sync',!patchAtual.temTime&&patchAtual.temRate);if(patchAtual.nome)document.getElementById('patchName').textContent=patchAtual.nome;const slotAtivos=info.efeitos.filter(e=>e.enabled).length;(document.getElementById('dumpStatus')||{}).textContent =`${slotAtivos}/5`+(patchAtual.temTime?' ♩':' ')+(patchAtual.temRate?'∿':'');logMIDI({type:'rx',label:`DUMP:"${info.nome||'?'}" ${slotAtivos}fx`});}
function atualizarFxIndicators(){const $ind=document.getElementById('fxIndicators');$ind.innerHTML='';for(const fx of patchAtual.efeitos){const tag=document.createElement('span');tag.className=`fx-tag ${fx.cat}${fx.enabled?'':' off'}`;tag.textContent=fx.nome.substring(0,7);$ind.appendChild(tag);}}
let midiAccess=null,midiOut=null,midiReady=false,dumpTimer=null;
async function iniciarMIDI(){if(!navigator.requestMIDIAccess){setMidiStatus('SIM','sim');return;}try{midiAccess=await navigator.requestMIDIAccess({sysex:true});midiReady=true;midiAccess.onstatechange=onMidiStateChange;autoSelecionarPorta();for(const input of midiAccess.inputs.values())input.onmidimessage=onMensagemMIDI;setMidiStatus('READY','connected');}catch(e){setMidiStatus('DENIED','error');logMIDI({type:'err',label:`MIDI:${e.message}`});}}
function autoSelecionarPorta(){const outputs=[...midiAccess.outputs.values()];if(outputs.length>0){midiOut=outputs[0];setMidiStatus(truncar(midiOut.name),'connected');}}
function onMidiStateChange(e){const p=e.port;if(p.type==='output'){if(p.state==='connected'&&!midiOut){midiOut=p;setMidiStatus(truncar(p.name),'connected');}if(p.state==='disconnected'&&midiOut?.id===p.id){midiOut=null;setMidiStatus('—','error');autoSelecionarPorta();}}if(p.type==='input'&&p.state==='connected')p.onmidimessage=onMensagemMIDI;}
function onMensagemMIDI(event){const d=event.data;if(!d||d.length<5)return;piscarIndicador();if(d[0]===0xF0&&d[1]===ZOOM_MFR_ID&&d[4]===ZOOM_CMD_DUMP_RESP){logMIDI({type:'rx',label:`0x28 (${d.length}b)`});aplicarDump(parseZoomDump(d));}}
function enviarMIDI(bytes,tipo,label){logMIDI({type:tipo||'sx',label});if(!midiOut||!midiReady)return;try{midiOut.send(bytes);}catch(e){logMIDI({type:'err',label:`ERR:${e.message}`});}}
function limparPatchAtual(){patchAtual.nome=null;patchAtual.efeitos=[];patchAtual.temTime=false;patchAtual.temRate=false;patchAtual.precisaSincBpm=false;patchAtual.efeitosTime=[];patchAtual.efeitosRate=[];(document.getElementById('fxIndicators')||{}).innerHTML ='';(document.getElementById('dumpStatus')||{}).textContent ='…';fsEls[5].classList.remove('delay-sync','rate-sync');}
function enviarProgramChange(pc){enviarMIDI([0xC0|MIDI_CH,pc],'pc',`PC ${pc} [${cam0.bank}${cam0.patch+1}]`);limparPatchAtual();if(dumpTimer)clearTimeout(dumpTimer);dumpTimer=setTimeout(requisitarDump,PC_TO_DUMP_MS);}
function requisitarDump(){enviarMIDI([0xF0,ZOOM_MFR_ID,ZOOM_DEV_ID,ZOOM_MODEL_ID,ZOOM_CMD_DUMP_REQ,0xF7],'sx','0x29 DUMP REQ');}
let sysexIdleTimer=null;
function enviarSysExTapTempo(bpm){if(sysexIdleTimer)clearTimeout(sysexIdleTimer);sysexIdleTimer=setTimeout(()=>{enviarMIDI([0xB0|MIDI_CH,64,Math.min(127,Math.round(bpm))],'cc',`CC64 BPM→${bpm}`);if(!patchAtual.precisaSincBpm)return;if(patchAtual.temTime){const ms=Math.round(60000/bpm);const lsb=ms&0x7F;const msb=(ms>>7)&0x7F;enviarMIDI([0xF0,ZOOM_MFR_ID,ZOOM_DEV_ID,ZOOM_MODEL_ID,0x31,msb,lsb,0xF7],'sx',`TIME ${ms}ms`);}if(patchAtual.temRate){const hz=bpm/60;const valor=Math.min(127,Math.max(0,Math.round(hz*127/10)));enviarMIDI([0xB0|MIDI_CH,3,valor],'cc',`RATE ${hz.toFixed(2)}Hz`);}},SYSEX_IDLE_MS);}
function logMIDI(msg){ piscarIndicador(); }
let indicadorTimer=null;
function piscarIndicador(){const el=document.getElementById('midiIndicator');if(!el)return;el.classList.add('activity');if(indicadorTimer)clearTimeout(indicadorTimer);indicadorTimer=setTimeout(()=>{el.classList.remove('activity');el.className='midi-indicator '+(midiReady?'connected':'sim');},120);}
function setMidiStatus(label,state){const el=document.getElementById('midiIndicator');const lbl=document.getElementById('midiPortLabel');if(el)el.className=`midi-indicator ${state}`;if(lbl)lbl.textContent=label;}
function truncar(s){return s&&s.length>14?s.substring(0,12)+'…':s;}
let tapTimes=[],tapTimer=null,tapLedTimer=null,tapBeatTimer=null;
function registrarTap(){const now=performance.now();if(tapTimer)clearTimeout(tapTimer);tapTimer=setTimeout(resetarTap,TAP_TIMEOUT);if(tapTimes.length>0&&(now-tapTimes[tapTimes.length-1])<TAP_TIMEOUT){tapTimes.push(now);if(tapTimes.length>TAP_AVG_N+1)tapTimes.shift();if(tapTimes.length>=2){const intervals=[];for(let i=1;i<tapTimes.length;i++)intervals.push(tapTimes[i]-tapTimes[i-1]);const avg=intervals.reduce((a,b)=>a+b,0)/intervals.length;cam0.bpm=Math.min(BPM_MAX,Math.max(BPM_MIN,Math.round(60000/avg)));iniciarPiscarBeat(Math.round(60000/cam0.bpm));enviarSysExTapTempo(cam0.bpm);renderizar();}}else{tapTimes=[now];}piscarBeatManual();}
function piscarBeatManual(){const btn=fsEls[5];btn.classList.add('tap-beat');btn.classList.remove('tap-off');if(tapLedTimer)clearTimeout(tapLedTimer);tapLedTimer=setTimeout(()=>{btn.classList.remove('tap-beat');btn.classList.add('tap-off');},80);}
function iniciarPiscarBeat(intervalMs){if(tapBeatTimer)clearInterval(tapBeatTimer);const onMs=Math.min(80,intervalMs*0.15);tapBeatTimer=setInterval(()=>{if(bankSelect)return;const btn=fsEls[5];btn.classList.add('tap-beat');btn.classList.remove('tap-off');setTimeout(()=>{btn.classList.remove('tap-beat');btn.classList.add('tap-off');},onMs);},intervalMs);}
function resetarTap(){tapTimes=[];if(tapBeatTimer){clearInterval(tapBeatTimer);tapBeatTimer=null;}iniciarPiscarBeat(Math.round(60000/cam0.bpm));}
const $patchId=document.getElementById('patchId'),$patchName=document.getElementById('patchName'),$bpmVal=document.getElementById('bpmVal'),$modeBadge=document.getElementById('modeBadge'),$toast=document.getElementById('toast'),$display=document.getElementById('mainDisplay');
function corDoBanco(bank){return BANK_COLOR[bank]||'#888';}
function renderizar(){const cor=corDoBanco(bankSelect&&preselectBank?preselectBank:cam0.bank);const bank=cam0.bank;$bpmVal.textContent=Math.round(cam0.bpm);if(bankSelect&&preselectBank){$patchId.textContent=preselectBank+'?';$patchId.className='patch-id blink';$patchId.style.setProperty('--bank-color',corDoBanco(preselectBank));$patchName.textContent='AWAITING CONFIRM';$display.style.setProperty('--bank-color',corDoBanco(preselectBank));}else if(bankSelect){$patchId.textContent='??';$patchId.className='patch-id blink';$patchName.textContent='SELECT BANK';$display.style.setProperty('--bank-color','#ffb930');}else{$patchId.textContent=bank+cam0.patch;$patchId.className='patch-id';$patchId.style.setProperty('--bank-color',cor);if(!patchAtual.nome)$patchName.textContent=PATCH_NAMES[bank]?.[cam0.patch]||`PATCH ${cam0.patch+1}`;$display.style.setProperty('--bank-color',cor);}const visGroup=BANKS_ALL.slice(cam0.bankGroup*5,cam0.bankGroup*5+5);const bankInView=visGroup.includes(cam0.bank);if(bankSelect){const grp=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);for(let i=0;i<5;i++){const b=grp[i];const bc=corDoBanco(b);const btn=fsEls[i];const isPresel=preselectBank===b;btn.style.setProperty('--bank-color',bc);btn.classList.remove('lit-top','lit-bottom');btn.classList.toggle('preselect-mode',true);btn.style.borderColor=isPresel?bc:'';btn.style.boxShadow=isPresel?`0 0 14px ${bc}44`:'';btn.style.color=isPresel?bc:'';labelEls[i].textContent=fsToggle&&isPresel?'ODD':isPresel?'CONFIRM':b;btn.childNodes[0].textContent=b;}labelEls[5].textContent='TAP LAYER';$modeBadge.className=preselectBank?'mode-badge confirming':'mode-badge banksel';$modeBadge.textContent=preselectBank?`${preselectBank} ?`:'BANK SEL';}else{for(let i=0;i<5;i++){const base=i*2;const isTop=bankInView&&cam0.patch===base;const isBot=bankInView&&cam0.patch===base+1;const isAny=isTop||isBot;const btn=fsEls[i];btn.style.setProperty('--bank-color',cor);btn.classList.remove('preselect-mode');btn.style.borderColor='';btn.style.boxShadow='';btn.style.color='';btn.classList.toggle('lit-top',isTop);btn.classList.toggle('lit-bottom',isBot);btn.childNodes[0].textContent=`FS${i+1}`;if(bankInView){const next=(lastFsIdx===i&&fsToggle)?base+1:base;const show=isAny?cam0.patch:next;labelEls[i].textContent=(PATCH_NAMES[cam0.bank]?.[show]||`P${show+1}`).substring(0,9);}else{labelEls[i].textContent='· · ·';}}labelEls[5].textContent='TAP · HOLD';$modeBadge.className='mode-badge normal';$modeBadge.textContent='PERFORM';}}
const fsGrid=document.getElementById('fsGrid');const fsEls=[],labelEls=[];
for(let i=0;i<6;i++){const col=document.createElement('div');col.className='fs-col';const btn=document.createElement('div');btn.className='fs-btn';btn.setAttribute('role','button');btn.setAttribute('tabindex','0');btn.appendChild(document.createTextNode(i<5?`FS${i+1}`:'FS6'));if(i===5){const s=document.createElement('span');s.style.cssText='font-size:7px;opacity:.5;display:block;margin-top:2px;font-family:DM Mono,monospace;';s.textContent='TAP';btn.appendChild(s);btn.classList.add('tap-btn');}const lbl=document.createElement('div');lbl.className='fs-label';col.appendChild(btn);col.appendChild(lbl);fsGrid.appendChild(col);fsEls.push(btn);labelEls.push(lbl);}
let bankSelect=false,preselectBank=null,preselectGrp=0,lastFsIdx=null,fsToggle=false;
const debounceTimers={},holdTimers={},pressTimes={};
function attachFS(idx,el){function onPress(){if(debounceTimers[idx])return;debounceTimers[idx]=setTimeout(()=>{debounceTimers[idx]=null;},DEBOUNCE_MS);el.classList.add('pressed');pressTimes[idx]=Date.now();if(idx===5)holdTimers[idx]=setTimeout(onFS6Hold,HOLD_MS);}function onRelease(){el.classList.remove('pressed');const held=Date.now()-(pressTimes[idx]||0);if(idx===5){clearTimeout(holdTimers[idx]);if(held<HOLD_MS)onFS6Tap();}else{onFSPatch(idx);}}el.addEventListener('mousedown',e=>{e.preventDefault();onPress();});el.addEventListener('mouseup',e=>{e.preventDefault();onRelease();});el.addEventListener('mouseleave',()=>{el.classList.remove('pressed');clearTimeout(holdTimers[idx]);});el.addEventListener('touchstart',e=>{e.preventDefault();onPress();},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();onRelease();},{passive:false});el.addEventListener('touchcancel',()=>{el.classList.remove('pressed');clearTimeout(holdTimers[idx]);});}
fsEls.forEach((el,i)=>attachFS(i,el));
function onFSPatch(idx){if(bankSelect&&preselectBank){const patchIdx=idx*2+(fsToggle?1:0);cam0.bank=preselectBank;cam0.patch=patchIdx;cam0.bankGroup=preselectGrp;bankSelect=false;preselectBank=null;lastFsIdx=idx;limparPatchAtual();const pc=BANKS_ALL.indexOf(cam0.bank)*10+patchIdx;enviarProgramChange(pc);flashConfirmRing(fsEls[idx]);showToast(`${cam0.bank}${patchIdx+1} — ${PATCH_NAMES[cam0.bank]?.[patchIdx]||''}`);gravarEstado();renderizar();return;}if(bankSelect){const grp=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);const escolhido=grp[idx];if(!escolhido)return;preselectBank=escolhido;fsToggle=false;showToast(`BANK ${escolhido} · CONFIRM`);renderizar();return;}const visGroup=BANKS_ALL.slice(cam0.bankGroup*5,cam0.bankGroup*5+5);if(!visGroup.includes(cam0.bank))return;const base=idx*2;if(lastFsIdx!==idx){lastFsIdx=idx;fsToggle=(cam0.patch===base)?true:false;}else{fsToggle=!fsToggle;}cam0.patch=base+(fsToggle?1:0);limparPatchAtual();const pc=BANKS_ALL.indexOf(cam0.bank)*10+cam0.patch;enviarProgramChange(pc);flashConfirmRing(fsEls[idx]);gravarEstado();renderizar();}
function onFS6Tap(){if(bankSelect){if(preselectBank){fsToggle=!fsToggle;showToast(`${preselectBank} · ${fsToggle?'ODD':'EVEN'}`);}else{preselectGrp=preselectGrp===0?1:0;const g=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);showToast(`${g[0]}–${g[4]}`);}renderizar();return;}registrarTap();}
function onFS6Hold(){if(bankSelect){bankSelect=false;preselectBank=null;showToast('CANCELLED');}else{bankSelect=true;preselectBank=null;preselectGrp=cam0.bankGroup;fsToggle=false;const g=BANKS_ALL.slice(preselectGrp*5,preselectGrp*5+5);showToast(`BANK SEL · ${g[0]}–${g[4]}`);}renderizar();}
function flashConfirmRing(el){const r=document.createElement('div');r.className='confirm-ring';el.appendChild(r);setTimeout(()=>r.remove(),500);}
let toastTimer=null;
function showToast(msg){$toast.textContent=msg;$toast.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>$toast.classList.remove('show'),2200);}
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('gestureend',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
carregarEstado();
cam0.bankGroup=BANKS_ALL.indexOf(cam0.bank)>=5?1:0;
renderizar();
iniciarPiscarBeat(Math.round(60000/cam0.bpm));
iniciarMIDI();
showToast('KEMPER STAGE · FMC-AM 6F · READY');
</script>
